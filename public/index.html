<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SagrApp — Accesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060a12;
      --bg-surface: #0c1220;
      --bg-raised: #111827;
      --border: #1e293b;
      --green: #4ecca3;
      --green-glow: rgba(78, 204, 163, 0.35);
      --red: #e94560;
      --red-glow: rgba(233, 69, 96, 0.4);
      --text: #e2e8f0;
      --text-dim: rgba(226, 232, 240, 0.5);
      --text-muted: #475569;
    }

    html {
      font-size: 16px;
      background: var(--bg);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Sottile effetto scanline industriale */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(78, 204, 163, 0.008) 2px,
        rgba(78, 204, 163, 0.008) 4px
      );
      z-index: 9999;
    }

    /* ===== SCHERMATE ===== */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: opacity 300ms ease, transform 300ms ease;
    }

    .screen.hidden {
      opacity: 0;
      transform: scale(0.96);
      pointer-events: none;
    }

    /* ===== SCHERMATA PIN ===== */
    .login-box {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* Logo + titolo */
    .brand {
      text-align: center;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--green);
      color: var(--bg);
      border-radius: 12px;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.04em;
      box-shadow:
        0 0 30px var(--green-glow),
        0 0 80px rgba(78, 204, 163, 0.1);
      margin-bottom: 1rem;
    }

    .brand-title {
      font-weight: 800;
      font-size: 1.75rem;
      letter-spacing: -0.03em;
    }

    .brand-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      margin-top: 0.4rem;
    }

    /* PIN dots */
    .pin-display {
      display: flex;
      gap: 14px;
      padding: 1rem 0 0.5rem;
    }

    .pin-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      transition: all 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .pin-dot.filled {
      background: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 10px var(--green-glow);
      transform: scale(1.15);
    }

    .pin-dot.error {
      background: var(--red);
      border-color: var(--red);
      box-shadow: 0 0 10px var(--red-glow);
    }

    /* Messaggio errore sotto i dots */
    .pin-error {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--red);
      height: 1.2em;
      opacity: 0;
      transition: opacity 200ms ease;
    }

    .pin-error.visible { opacity: 1; }

    /* Shake animation per PIN errato */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-12px); }
      30% { transform: translateX(10px); }
      45% { transform: translateX(-8px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-3px); }
      90% { transform: translateX(2px); }
    }

    .pin-display.shake {
      animation: shake 500ms ease;
    }

    /* Tastierino numerico */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 280px;
    }

    .key {
      aspect-ratio: 1.4;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-raised);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.35rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 120ms ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      /* Profondita' tattile */
      box-shadow:
        0 2px 0 rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .key:active {
      transform: translateY(2px);
      box-shadow: none;
      background: rgba(78, 204, 163, 0.08);
      border-color: rgba(78, 204, 163, 0.3);
    }

    .key.fn {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .key.key-clear {
      color: var(--red);
      border-color: rgba(233, 69, 96, 0.15);
    }

    .key.key-clear:active {
      background: rgba(233, 69, 96, 0.1);
      border-color: rgba(233, 69, 96, 0.4);
    }

    .key.key-enter {
      color: var(--green);
      border-color: rgba(78, 204, 163, 0.2);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
    }

    .key.key-enter:active {
      background: rgba(78, 204, 163, 0.12);
      border-color: var(--green);
    }

    /* ===== SCHERMATA SCELTA RUOLO (PIN 0002) ===== */
    .role-screen {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .role-heading {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-dim);
    }

    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }

    .role-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1.75rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-raised);
      cursor: pointer;
      transition: all 180ms ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .role-btn:active {
      transform: scale(0.96);
    }

    .role-btn:hover {
      border-color: rgba(78, 204, 163, 0.4);
      background: rgba(78, 204, 163, 0.04);
      box-shadow: 0 0 24px rgba(78, 204, 163, 0.06);
    }

    .role-btn .role-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .role-btn .role-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text);
      text-align: center;
    }

    /* ===== FOOTER STATUS ===== */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .footer-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 300ms ease;
    }

    .footer-dot.online {
      background: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
    }

    .footer-dot.offline {
      background: var(--red);
      box-shadow: 0 0 6px var(--red-glow);
    }

    /* ===== MOBILE ===== */
    @media (max-width: 400px) {
      .login-box { gap: 1.5rem; }
      .brand-mark { width: 48px; height: 48px; font-size: 1.3rem; }
      .brand-title { font-size: 1.5rem; }
      .keypad { max-width: 260px; gap: 8px; }
      .key { font-size: 1.2rem; }
      .pin-dot { width: 15px; height: 15px; }
      .role-btn { padding: 1.25rem 0.75rem; }
    }
  </style>
</head>
<body>

  <!-- ===== SCREEN 1: PIN KEYPAD ===== -->
  <div class="screen" id="screenPin">
    <div class="login-box">

      <div class="brand">
        <div class="brand-mark">S</div>
        <div class="brand-title">SagrApp</div>
        <div class="brand-label">Inserisci il PIN di accesso</div>
      </div>

      <div>
        <div class="pin-display" id="pinDisplay">
          <div class="pin-dot" id="dot0"></div>
          <div class="pin-dot" id="dot1"></div>
          <div class="pin-dot" id="dot2"></div>
          <div class="pin-dot" id="dot3"></div>
        </div>
        <div class="pin-error" id="pinError">PIN errato</div>
      </div>

      <div class="keypad" id="keypad">
        <button class="key" data-val="1">1</button>
        <button class="key" data-val="2">2</button>
        <button class="key" data-val="3">3</button>
        <button class="key" data-val="4">4</button>
        <button class="key" data-val="5">5</button>
        <button class="key" data-val="6">6</button>
        <button class="key" data-val="7">7</button>
        <button class="key" data-val="8">8</button>
        <button class="key" data-val="9">9</button>
        <button class="key fn key-clear" data-val="C">C</button>
        <button class="key" data-val="0">0</button>
        <button class="key fn key-enter" data-val="ENTER">ENTRA</button>
      </div>

    </div>
  </div>

  <!-- ===== SCREEN 2: SCELTA RUOLO (PIN 0002) ===== -->
  <div class="screen hidden" id="screenRole">
    <div class="role-screen">
      <div class="role-heading">Seleziona il tuo ruolo</div>
      <div class="role-grid" id="roleGrid">
        <!-- Popolato via JS dopo login con destinations -->
      </div>
    </div>
  </div>

  <!-- Footer status -->
  <div class="footer">
    <span class="footer-dot" id="footerDot"></span>
    <span id="footerText">Connessione...</span>
    <span>&mdash; SagrApp v1.0</span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // =============================================
    // STATO
    // =============================================
    var pin = '';
    var locked = false; // blocca input durante animazione
    var loginToken = null;
    var loginData = null;

    // =============================================
    // PIN INPUT
    // =============================================
    function updateDots() {
      for (var i = 0; i < 4; i++) {
        var dot = document.getElementById('dot' + i);
        dot.classList.toggle('filled', i < pin.length);
        dot.classList.remove('error');
      }
      document.getElementById('pinError').classList.remove('visible');
    }

    function addDigit(d) {
      if (locked || pin.length >= 4) return;
      pin += d;
      updateDots();

      // Auto-submit a 4 cifre
      if (pin.length === 4) {
        submitPin();
      }
    }

    function clearPin() {
      if (locked) return;
      pin = '';
      updateDots();
    }

    async function submitPin() {
      if (locked || pin.length !== 4) return;
      locked = true;

      try {
        var res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: pin }),
        });
        var data = await res.json();

        if (!res.ok || !data.success) {
          // PIN errato: shake + dots rossi
          showPinError();
          return;
        }

        // Login riuscito: salva token
        sessionStorage.setItem('sagrapp_token', data.token);
        if (data.role === 'admin') {
          sessionStorage.setItem('admin_token', data.token);
        } else {
          // Rimuovi token admin da sessioni precedenti (stesso dispositivo/tab)
          sessionStorage.removeItem('admin_token');
        }

        loginToken = data.token;
        loginData = data;

        // Redirect in base al ruolo
        if (data.redirect) {
          // Ruoli con destinazione fissa (admin, cassa_generale)
          localStorage.setItem('sagrapp_role', data.redirect);
          window.location.href = data.redirect;
        } else if (data.destinations) {
          // Ruolo operatore: mostra scelta ruolo
          showRoleSelection(data.destinations);
        }

      } catch (e) {
        showPinError('Errore rete');
      }
    }

    function showPinError(msg) {
      var display = document.getElementById('pinDisplay');
      var errorEl = document.getElementById('pinError');

      // Dots rossi
      for (var i = 0; i < 4; i++) {
        var dot = document.getElementById('dot' + i);
        dot.classList.add('error');
        dot.classList.remove('filled');
      }

      // Shake
      display.classList.add('shake');

      // Messaggio
      if (msg) errorEl.textContent = msg;
      else errorEl.textContent = 'PIN errato';
      errorEl.classList.add('visible');

      // Reset dopo animazione
      setTimeout(function() {
        display.classList.remove('shake');
        pin = '';
        updateDots();
        locked = false;
      }, 700);
    }

    // =============================================
    // SCHERMATA SCELTA RUOLO (PIN 0002)
    // =============================================
    function showRoleSelection(destinations) {
      var grid = document.getElementById('roleGrid');
      grid.innerHTML = destinations.map(function(d) {
        return '<button class="role-btn" onclick="selectDestination(\'' + d.url + '\')">' +
          '<span class="role-icon">' + d.icon + '</span>' +
          '<span class="role-label">' + d.name + '</span>' +
        '</button>';
      }).join('');

      // Transizione tra schermate
      document.getElementById('screenPin').classList.add('hidden');
      document.getElementById('screenRole').classList.remove('hidden');
    }

    function selectDestination(url) {
      localStorage.setItem('sagrapp_role', url);
      window.location.href = url;
    }

    // =============================================
    // EVENT LISTENERS — tastierino
    // =============================================
    document.getElementById('keypad').addEventListener('click', function(e) {
      var btn = e.target.closest('.key');
      if (!btn) return;
      var val = btn.dataset.val;

      if (val === 'C') {
        clearPin();
      } else if (val === 'ENTER') {
        submitPin();
      } else {
        addDigit(val);
      }
    });

    // Tastiera fisica (per test desktop)
    document.addEventListener('keydown', function(e) {
      if (document.getElementById('screenPin').classList.contains('hidden')) return;

      if (e.key >= '0' && e.key <= '9') {
        addDigit(e.key);
      } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === 'Escape') {
        clearPin();
      } else if (e.key === 'Enter') {
        submitPin();
      }
    });

    // =============================================
    // SOCKET.IO — status footer
    // =============================================
    var socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    socket.on('connect', function() {
      document.getElementById('footerDot').className = 'footer-dot online';
      document.getElementById('footerText').textContent = 'Server online';
    });

    socket.on('disconnect', function() {
      document.getElementById('footerDot').className = 'footer-dot offline';
      document.getElementById('footerText').textContent = 'Server offline';
    });

    // =============================================
    // INIT
    // =============================================
  </script>
</body>
</html>
