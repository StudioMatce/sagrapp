<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SagrApp — Seleziona Ruolo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #060a12;
      --bg-base: #0a0e17;
      --bg-card: #111827;
      --bg-card-hover: #1a2332;
      --border: #1e293b;
      --border-active: #334155;
      --green: #4ecca3;
      --green-dim: rgba(78, 204, 163, 0.15);
      --red: #e94560;
      --red-dim: rgba(233, 69, 96, 0.15);
      --yellow: #ffd93d;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #64748b;
    }

    html { font-size: 15px; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Griglia sottile da control room */
      background-image:
        linear-gradient(rgba(78, 204, 163, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(78, 204, 163, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Forza sidebar chiusa su questa pagina: nasconde il toggle e impedisce il margine */
    .sa-sidebar { transform: translateX(-220px) !important; }
    .sa-sidebar-toggle { display: none !important; }
    .sa-sidebar-overlay { display: none !important; }
    .sa-page-content { margin-left: 0 !important; }

    /* ===== CONTAINER ===== */
    .landing-wrap {
      width: 100%;
      max-width: 880px;
      padding: 2.5rem 1.5rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== HEADER ===== */
    .landing-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: var(--green);
      color: var(--bg-deep);
      border-radius: 8px;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      box-shadow: 0 0 20px rgba(78, 204, 163, 0.25), 0 0 60px rgba(78, 204, 163, 0.08);
    }

    .logo-text {
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .landing-subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    /* Linea decorativa sotto il titolo */
    .header-line {
      width: 60px;
      height: 2px;
      background: var(--green);
      margin: 1rem auto 0;
      border-radius: 1px;
      opacity: 0.5;
    }

    /* ===== REDIRECT BANNER (appare se c'è un ruolo salvato) ===== */
    .redirect-banner {
      display: none;
      width: 100%;
      max-width: 480px;
      padding: 0.8rem 1.2rem;
      margin-bottom: 2rem;
      background: rgba(78, 204, 163, 0.06);
      border: 1px solid rgba(78, 204, 163, 0.2);
      border-radius: 8px;
      font-size: 0.85rem;
      color: var(--text-dim);
      text-align: center;
      animation: banner-in 300ms ease;
    }

    .redirect-banner.visible { display: block; }

    .redirect-banner .role-name {
      color: var(--green);
      font-weight: 600;
    }

    .redirect-banner .countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--green);
    }

    .redirect-banner .cancel-btn {
      display: inline-block;
      margin-left: 0.75rem;
      padding: 0.25rem 0.75rem;
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 4px;
      color: var(--red);
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .redirect-banner .cancel-btn:hover {
      background: rgba(233, 69, 96, 0.2);
      border-color: var(--red);
    }

    @keyframes banner-in {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== ROLE GRID ===== */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      width: 100%;
    }

    /* ===== ROLE CARD ===== */
    .role-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem 1.25rem;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: all 200ms ease;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      overflow: hidden;
    }

    /* Sottile linea superiore verde (spenta di default) */
    .role-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--green);
      opacity: 0;
      transition: opacity 200ms ease;
    }

    .role-card:hover {
      border-color: rgba(78, 204, 163, 0.4);
      background: var(--bg-card-hover);
      box-shadow: 0 0 20px rgba(78, 204, 163, 0.07), 0 0 40px rgba(78, 204, 163, 0.03);
    }

    .role-card:hover::before { opacity: 1; }

    .role-card:active {
      transform: scale(0.97);
      border-color: var(--green);
    }

    .role-card .card-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .role-card .card-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
      text-align: center;
    }

    .role-card .card-subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.3;
    }

    /* Badge lucchetto per card admin */
    .role-card .lock-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 0.7rem;
      opacity: 0.4;
    }

    /* Card admin con bordo leggermente diverso */
    .role-card.admin-card {
      border-color: rgba(255, 255, 255, 0.06);
    }

    .role-card.admin-card:hover {
      border-color: rgba(78, 204, 163, 0.3);
    }

    /* ===== FOOTER ===== */
    .landing-footer {
      margin-top: 2.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .footer-version {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      opacity: 0.5;
      letter-spacing: 0.05em;
    }

    .footer-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 300ms ease;
    }

    .status-dot.online {
      background: var(--green);
      box-shadow: 0 0 6px var(--green), 0 0 12px rgba(78, 204, 163, 0.3);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    .status-dot.offline {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ===== RESPONSIVE ===== */

    /* Tablet: 2 colonne */
    @media (max-width: 768px) {
      .role-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .landing-wrap {
        padding: 2rem 1rem 2.5rem;
      }

      .logo-text { font-size: 1.6rem; }
      .logo-icon { width: 38px; height: 38px; font-size: 1.1rem; }
    }

    /* Mobile: 1 colonna */
    @media (max-width: 480px) {
      .role-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      .role-card {
        flex-direction: row;
        justify-content: flex-start;
        padding: 1.1rem 1.25rem;
        min-height: auto;
        gap: 1rem;
      }

      .role-card .card-icon { font-size: 1.6rem; }

      .role-card .card-text {
        text-align: left;
      }

      .role-card .card-title {
        text-align: left;
        font-size: 0.72rem;
      }

      .role-card .card-subtitle {
        text-align: left;
        font-size: 0.75rem;
      }

      .landing-header { margin-bottom: 1.75rem; }
      .logo-text { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="landing-wrap">

    <!-- ===== HEADER ===== -->
    <header class="landing-header">
      <div class="logo-row">
        <span class="logo-icon">S</span>
        <span class="logo-text">SagrApp</span>
      </div>
      <div class="landing-subtitle">Seleziona il tuo dispositivo</div>
      <div class="header-line"></div>
    </header>

    <!-- ===== REDIRECT BANNER (visibile solo se ruolo salvato) ===== -->
    <div class="redirect-banner" id="redirectBanner">
      Ultimo ruolo: <span class="role-name" id="redirectRoleName">—</span>
      — redirect in <span class="countdown" id="redirectCountdown">3</span>s
      <button class="cancel-btn" id="redirectCancel">Annulla</button>
    </div>

    <!-- ===== ROLE GRID ===== -->
    <div class="role-grid" id="roleGrid">
      <!-- Generato da JS -->
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="landing-footer">
      <div class="footer-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connessione...</span>
      </div>
      <div class="footer-version">SAGRAPP v1.0 — Sagra M.D.G.</div>
    </footer>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // =============================================
    // CONFIGURAZIONE RUOLI
    // =============================================
    const ROLES = [
      { id: 'cassa',        icon: '🛒', title: 'Cassa Generale',  subtitle: 'Ordini cibo + bevande', url: '/cassa' },
      { id: 'cassa-bar',    icon: '🍺', title: 'Cassa Bar',       subtitle: 'Solo bevande',          url: '/cassa-bar' },
      { id: 'cassa-casetta',icon: '🏠', title: 'Cassa Casetta',   subtitle: 'Aperitivi e snack',     url: '/cassa-casetta' },
      { id: 'monitor',      icon: '📺', title: 'Monitor Cuochi',  subtitle: 'TV griglia',            url: '/monitor' },
      { id: 'scaldavivande',icon: '🔥', title: 'Scaldavivande',   subtitle: 'Tablet cuoco',          url: '/scaldavivande' },
      { id: 'controllo',    icon: '📋', title: 'Operatore',       subtitle: 'Evasione ordini',       url: '/controllo' },
      { id: 'admin',        icon: '📊', title: 'Admin',           subtitle: 'Dashboard gestione',    url: '/admin/login', admin: true },
      { id: 'hardware',     icon: '🔧', title: 'Hardware',        subtitle: 'Test e controllo',      url: '/admin/hardware', admin: true },
    ];

    // Mappa url → nome leggibile per il banner redirect
    const ROLE_NAMES = {};
    ROLES.forEach(r => { ROLE_NAMES[r.url] = r.title; });

    // =============================================
    // GENERA LE CARD
    // =============================================
    function renderCards() {
      const grid = document.getElementById('roleGrid');
      grid.innerHTML = ROLES.map(role => {
        const adminClass = role.admin ? ' admin-card' : '';
        const lockBadge = role.admin ? '<span class="lock-badge">🔒</span>' : '';
        return `
          <div class="role-card${adminClass}" data-url="${role.url}" data-admin="${!!role.admin}" onclick="selectRole(this)">
            ${lockBadge}
            <span class="card-icon">${role.icon}</span>
            <div class="card-text">
              <div class="card-title">${role.title}</div>
              <div class="card-subtitle">${role.subtitle}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // =============================================
    // SELEZIONE RUOLO
    // =============================================
    function selectRole(cardEl) {
      const url = cardEl.dataset.url;
      const isAdmin = cardEl.dataset.admin === 'true';

      // Per le card admin: se non ha il token, vai al login
      if (isAdmin && !sessionStorage.getItem('admin_token')) {
        // Salva la destinazione reale per redirect post-login
        sessionStorage.setItem('admin_redirect', url);
        localStorage.setItem('sagrapp_role', url);
        window.location.href = '/admin/login';
        return;
      }

      // Salva il ruolo selezionato e naviga
      localStorage.setItem('sagrapp_role', url);
      window.location.href = url;
    }

    // =============================================
    // AUTO-REDIRECT (se ruolo salvato)
    // =============================================
    let redirectTimer = null;
    let countdownValue = 3;

    function startAutoRedirect() {
      const savedRole = localStorage.getItem('sagrapp_role');
      if (!savedRole) return;

      const banner = document.getElementById('redirectBanner');
      const nameEl = document.getElementById('redirectRoleName');
      const countdownEl = document.getElementById('redirectCountdown');

      // Mostra il nome del ruolo salvato
      nameEl.textContent = ROLE_NAMES[savedRole] || savedRole;
      countdownValue = 3;
      countdownEl.textContent = countdownValue;
      banner.classList.add('visible');

      // Countdown
      redirectTimer = setInterval(() => {
        countdownValue--;
        countdownEl.textContent = countdownValue;

        if (countdownValue <= 0) {
          clearInterval(redirectTimer);
          // Controlla se è una pagina admin e serve il token
          const role = ROLES.find(r => r.url === savedRole);
          if (role && role.admin && !sessionStorage.getItem('admin_token')) {
            sessionStorage.setItem('admin_redirect', savedRole);
            window.location.href = '/admin/login';
          } else {
            window.location.href = savedRole;
          }
        }
      }, 1000);
    }

    function cancelRedirect() {
      if (redirectTimer) {
        clearInterval(redirectTimer);
        redirectTimer = null;
      }
      // Rimuovi il ruolo salvato così non fa redirect al prossimo refresh
      localStorage.removeItem('sagrapp_role');
      document.getElementById('redirectBanner').classList.remove('visible');
    }

    // =============================================
    // SOCKET.IO — solo per lo status in basso
    // =============================================
    const socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    socket.on('connect', () => {
      document.getElementById('statusDot').className = 'status-dot online';
      document.getElementById('statusText').textContent = 'Server online';
    });

    socket.on('disconnect', () => {
      document.getElementById('statusDot').className = 'status-dot offline';
      document.getElementById('statusText').textContent = 'Server offline';
    });

    // =============================================
    // INIT
    // =============================================
    renderCards();
    startAutoRedirect();
    document.getElementById('redirectCancel').addEventListener('click', cancelRedirect);
  </script>
  <script src="/js/sidebar.js"></script>
</body>
</html>
