<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SagrApp — Cassa Mobile</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060a12;
      --surface: #0c1220;
      --raised: #111827;
      --border: #1e293b;
      --green: #4ecca3;
      --green-dim: rgba(78,204,163,0.12);
      --green-strong: rgba(78,204,163,0.25);
      --red: #e94560;
      --red-dim: rgba(233,69,96,0.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,0.12);
      --text: #e2e8f0;
      --text-dim: rgba(226,232,240,0.45);
      --text-muted: #475569;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    html {
      background: var(--bg);
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: calc(68px + var(--safe-b));
    }

    /* ===== STICKY HEADER ===== */
    .header {
      position: sticky; top: 0; z-index: 80;
      background: rgba(6,10,18,0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      padding-top: calc(10px + env(safe-area-inset-top, 0px));
    }

    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }

    .header-title {
      font-weight: 700; font-size: 15px;
      display: flex; align-items: center; gap: 8px;
    }

    .header-title .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green);
      transition: all 300ms;
    }

    .header-title .dot.offline {
      background: var(--red); box-shadow: 0 0 8px var(--red);
    }

    .last-order {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 700;
      color: var(--green); opacity: 0;
      transition: opacity 200ms;
    }

    .last-order.visible { opacity: 1; }

    .btn-exit {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px; cursor: pointer;
    }

    /* cassa selector */
    .cassa-tabs {
      display: flex; gap: 6px;
    }

    .cassa-tab {
      flex: 1; padding: 9px 0; text-align: center;
      font-weight: 700; font-size: 13px; letter-spacing: 0.02em;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 150ms;
    }

    .cassa-tab.active {
      background: var(--green);
      border-color: var(--green);
      color: var(--bg);
    }

    /* offline banner */
    .offline-banner {
      display: none;
      background: var(--red-dim); border: 1px solid rgba(233,69,96,0.3);
      border-radius: 6px; padding: 8px 12px; margin-top: 8px;
      font-size: 12px; font-weight: 600; color: var(--red);
      text-align: center;
    }

    .offline-banner.visible { display: block; }

    /* ===== MENU AREA ===== */
    .menu-area {
      padding: 8px 10px 20px;
    }

    .cat-header {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--green); opacity: 0.7;
      padding: 14px 4px 6px;
      border-bottom: 1px solid rgba(78,204,163,0.1);
      margin-bottom: 4px;
    }

    .cat-header:first-child { padding-top: 6px; }

    /* item row */
    .item-row {
      display: flex; align-items: center;
      padding: 10px 6px;
      border-radius: 8px;
      transition: background 100ms;
      min-height: 50px;
      gap: 10px;
    }

    .item-row:active { background: rgba(255,255,255,0.03); }

    .item-row.exhausted {
      opacity: 0.3;
      pointer-events: none;
    }

    .item-row.has-qty {
      background: rgba(78,204,163,0.04);
    }

    .item-info { flex: 1; min-width: 0; }

    .item-name {
      font-weight: 600; font-size: 14px; line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .item-price {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 500;
      color: var(--text-dim); margin-top: 1px;
    }

    .item-tag {
      font-size: 10px; font-weight: 700; color: var(--red);
      text-transform: uppercase; margin-left: 6px;
    }

    /* qty control */
    .qty-ctrl {
      display: flex; align-items: center; gap: 0;
      flex-shrink: 0;
    }

    .qty-btn {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; line-height: 1;
      cursor: pointer; border: none;
      transition: all 100ms;
      -webkit-tap-highlight-color: transparent;
    }

    .qty-btn.add {
      background: var(--green-dim);
      color: var(--green);
      border: 1.5px solid rgba(78,204,163,0.2);
    }

    .qty-btn.add:active {
      background: var(--green-strong);
      transform: scale(0.92);
    }

    .qty-btn.minus {
      background: var(--red-dim);
      color: var(--red);
      border: 1.5px solid rgba(233,69,96,0.2);
      width: 30px; height: 30px; font-size: 18px;
    }

    .qty-btn.minus:active { transform: scale(0.9); }

    .qty-btn.plus {
      background: var(--green-dim);
      color: var(--green);
      border: 1.5px solid rgba(78,204,163,0.2);
      width: 30px; height: 30px; font-size: 18px;
    }

    .qty-btn.plus:active { transform: scale(0.9); }

    .qty-badge {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800; font-size: 14px;
      min-width: 28px; text-align: center;
      color: var(--green);
    }

    .qty-stepper {
      display: none;
      align-items: center; gap: 2px;
    }

    .item-row.has-qty .qty-btn.add { display: none; }
    .item-row.has-qty .qty-stepper { display: flex; }

    /* ===== BOTTOM BAR ===== */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 90;
      background: rgba(6,10,18,0.97);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      padding-bottom: calc(10px + var(--safe-b));
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
      transition: all 200ms;
    }

    .bottom-bar.has-items { border-top-color: rgba(78,204,163,0.2); }

    .bar-left {
      display: flex; flex-direction: column; gap: 1px;
    }

    .bar-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 700;
      color: var(--text-muted);
      transition: color 200ms;
    }

    .bottom-bar.has-items .bar-count { color: var(--text); }

    .bar-total {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px; font-weight: 800;
      color: var(--text-muted);
      letter-spacing: -0.02em;
      transition: color 200ms;
    }

    .bottom-bar.has-items .bar-total { color: var(--green); }

    .bar-btn {
      padding: 12px 24px;
      border-radius: 10px;
      background: var(--raised);
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif;
      font-weight: 700; font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 150ms;
    }

    .bottom-bar.has-items .bar-btn {
      background: var(--green);
      border-color: var(--green);
      color: var(--bg);
    }

    .bar-btn:active { transform: scale(0.96); }

    /* ===== BOTTOM SHEET ===== */
    .sheet-backdrop {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity 250ms;
    }

    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }

    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 101;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      max-height: 88vh;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 300ms cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: var(--safe-b);
    }

    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 8px;
      flex-shrink: 0;
    }

    .sheet-title { font-weight: 700; font-size: 16px; }

    .sheet-close {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--raised); border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .sheet-body {
      flex: 1; overflow-y: auto; padding: 0 16px 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* order items in sheet */
    .order-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(30,41,59,0.4);
      font-size: 13px;
    }

    .order-item:last-child { border-bottom: none; }

    .order-item-left {
      display: flex; align-items: center; gap: 6px;
      min-width: 0; flex: 1;
    }

    .order-item-qty {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700; font-size: 12px;
      color: var(--green); min-width: 24px;
    }

    .order-item-name {
      font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .order-item-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700; font-size: 13px;
      flex-shrink: 0; margin-left: 8px;
    }

    .order-item-remove {
      width: 26px; height: 26px; border-radius: 6px;
      background: transparent; border: none;
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-left: 4px;
    }

    .order-item-remove:active { color: var(--red); }

    /* form fields */
    .form-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .form-row {
      display: flex; gap: 8px; margin-bottom: 10px;
    }

    .form-group {
      flex: 1; display: flex; flex-direction: column; gap: 3px;
    }

    .form-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-dim);
    }

    .form-input {
      width: 100%; padding: 10px 12px;
      border-radius: 8px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 15px; font-weight: 500;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(78,204,163,0.12);
    }

    .form-input.error {
      border-color: var(--red);
      animation: shake 250ms;
    }

    @keyframes shake {
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }

    /* toggles row */
    .toggles-row {
      display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
    }

    .toggle-btn {
      padding: 8px 14px; border-radius: 8px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.02em; text-transform: uppercase;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 150ms;
      min-height: 38px;
    }

    .toggle-btn.active {
      border-color: var(--green);
      background: var(--green-dim);
      color: var(--green);
    }

    .toggle-btn.active.amber {
      border-color: var(--amber);
      background: var(--amber-dim);
      color: var(--amber);
    }

    .toggle-btn.active.red {
      border-color: var(--red);
      background: var(--red-dim);
      color: var(--red);
    }

    /* discount row */
    .discount-row {
      display: flex; gap: 6px; align-items: center; margin-bottom: 10px;
    }

    .discount-input {
      flex: 1; padding: 10px 12px;
      border-radius: 8px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 500;
      outline: none; width: 80px;
    }

    .discount-input:focus { border-color: var(--green); }

    .discount-toggle {
      width: 42px; height: 42px; border-radius: 8px;
      background: var(--raised); border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 800;
      cursor: pointer; flex-shrink: 0;
    }

    /* omaggio pills */
    .omaggio-row {
      display: flex; gap: 6px; margin-bottom: 10px;
    }

    .omaggio-pill {
      flex: 1; padding: 8px 6px; border-radius: 8px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      text-align: center;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 150ms;
      min-height: 38px;
    }

    .omaggio-pill.active {
      border-color: var(--amber);
      background: var(--amber-dim);
      color: var(--amber);
    }

    /* totale */
    .total-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0 12px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    .total-label {
      font-weight: 700; font-size: 15px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.04em;
    }

    .total-value {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800; font-size: 24px;
      color: var(--green);
    }

    .subtotal-row {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text-muted);
      padding: 2px 0;
    }

    .subtotal-row .val {
      font-family: 'JetBrains Mono', monospace; font-weight: 600;
    }

    /* submit button */
    .btn-submit {
      width: 100%; padding: 16px;
      border-radius: 12px;
      background: var(--green);
      border: none;
      color: var(--bg);
      font-family: 'Outfit', sans-serif;
      font-weight: 800; font-size: 16px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 150ms;
      min-height: 56px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .btn-submit:active { transform: scale(0.98); }
    .btn-submit.disabled { opacity: 0.35; pointer-events: none; }

    .btn-submit .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(6,10,18,0.3);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 600ms linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* feedback */
    .feedback {
      text-align: center; padding: 10px;
      border-radius: 8px; margin-top: 8px;
      font-weight: 700; font-size: 13px;
      display: none;
    }

    .feedback.visible { display: block; }
    .feedback.success { background: var(--green-dim); color: var(--green); border: 1px solid rgba(78,204,163,0.2); }
    .feedback.error { background: var(--red-dim); color: var(--red); border: 1px solid rgba(233,69,96,0.2); }

    /* empty order in sheet */
    .order-empty {
      text-align: center; padding: 24px 0;
      font-size: 13px; color: var(--text-muted);
    }

    /* pulse animation for badge */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .pulse { animation: pulse 200ms ease; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="header-title">
        <span class="dot" id="connDot"></span>
        Cassa Mobile
      </div>
      <span class="last-order" id="lastOrder"></span>
      <button class="btn-exit" onclick="exitMobile()">Esci</button>
    </div>
    <div class="cassa-tabs">
      <button class="cassa-tab active" data-cassa="generale" onclick="switchCassa('generale')">Generale</button>
      <button class="cassa-tab" data-cassa="bar" onclick="switchCassa('bar')">Bar</button>
      <button class="cassa-tab" data-cassa="casetta" onclick="switchCassa('casetta')">Casetta</button>
    </div>
    <div class="offline-banner" id="offlineBanner">Connessione persa — ordini bloccati</div>
  </div>

  <!-- MENU -->
  <div class="menu-area" id="menuArea"></div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar" id="bottomBar" onclick="openSheet()">
    <div class="bar-left">
      <span class="bar-count" id="barCount">Carrello vuoto</span>
      <span class="bar-total" id="barTotal">&euro;0,00</span>
    </div>
    <button class="bar-btn" id="barBtn">ORDINA</button>
  </div>

  <!-- BOTTOM SHEET BACKDROP -->
  <div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>

  <!-- BOTTOM SHEET -->
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">Riepilogo ordine</span>
      <button class="sheet-close" onclick="closeSheet()">&times;</button>
    </div>
    <div class="sheet-body" id="sheetBody">
      <!-- Popolato via JS -->
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ===== STATO =====
    var ITEMS = [];          // piatti filtrati per cassa corrente
    var ALL_ITEMS = [];      // tutti i piatti dal server
    var itemMap = {};
    var quantities = {};
    var connected = false;
    var submitting = false;
    var currentCassa = 'generale'; // generale | bar | casetta
    var activeCourtesy = null;
    var discountIsPercent = false;
    var asportoActive = false;
    var posActive = false;

    // Mappa cassa → source per API
    var CASSA_SOURCE = { generale: 'principale', bar: 'bar', casetta: 'casetta' };
    var CASSA_FILTER = { generale: 'cassa_generale', bar: 'cassa_bar', casetta: 'cassa_casetta' };

    // Categorie in ordine di visualizzazione
    var CATEGORIES = [
      { key: 'primo', label: 'Primi' },
      { key: 'secondo', label: 'Secondi' },
      { key: 'speciale', label: 'Speciale del giorno' },
      { key: 'contorno', label: 'Contorni' },
      { key: 'condimento', label: 'Condimenti' },
      { key: 'bevanda', label: 'Bevande' },
    ];

    // ===== HELPERS =====
    function fPrice(v) {
      return '\u20AC' + (v || 0).toFixed(2).replace('.', ',');
    }

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ===== CASSA SWITCH =====
    function switchCassa(cassa) {
      currentCassa = cassa;

      // Aggiorna tab attiva
      document.querySelectorAll('.cassa-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.cassa === cassa);
      });

      // Reset ordine quando cambi cassa
      resetOrder();
      filterAndRender();
    }

    // ===== MENU LOADING =====
    async function loadMenu() {
      try {
        var res = await fetch('/api/menu');
        ALL_ITEMS = await res.json();
        filterAndRender();
      } catch (e) {
        document.getElementById('menuArea').innerHTML =
          '<div style="text-align:center;padding:40px;color:var(--text-muted)">Errore caricamento menu</div>';
      }
    }

    function filterAndRender() {
      var today = new Date().toISOString().slice(0, 10);
      var cassaKey = CASSA_FILTER[currentCassa];

      ITEMS = ALL_ITEMS.filter(function(item) {
        if (!item.casses) return false;
        // Per cassa generale: mostra piatti assegnati + tutte le bevande
        if (currentCassa === 'generale') {
          if (item.category !== 'bevanda' && !item.casses.includes('cassa_generale')) return false;
        } else {
          if (!item.casses.includes(cassaKey)) return false;
        }
        return true;
      });

      itemMap = {};
      ITEMS.forEach(function(i) {
        if (!(i.id in quantities)) quantities[i.id] = 0;
        itemMap[i.id] = i;
      });

      renderMenu();
      updateBottomBar();
    }

    // ===== RENDER MENU =====
    function renderMenu() {
      var area = document.getElementById('menuArea');
      var today = new Date().toISOString().slice(0, 10);
      var html = '';

      CATEGORIES.forEach(function(cat) {
        var catItems = ITEMS.filter(function(i) {
          if (i.category !== cat.key) return false;
          if (i.available === false) return false;
          // Piatti speciali: solo se available_date = oggi
          if (i.special && i.available_date && i.available_date !== today) return false;
          return true;
        });

        if (catItems.length === 0) return;

        html += '<div class="cat-header">' + esc(cat.label) + '</div>';

        catItems.forEach(function(item) {
          var exhausted = item.status === 'exhausted';
          var qty = quantities[item.id] || 0;
          var hasQty = qty > 0;

          html += '<div class="item-row' + (exhausted ? ' exhausted' : '') + (hasQty ? ' has-qty' : '') + '" id="mcard-' + esc(item.id) + '">' +
            '<div class="item-info">' +
              '<div class="item-name">' + esc(item.name) +
                (exhausted ? '<span class="item-tag">Esaurito</span>' : '') +
              '</div>' +
              '<div class="item-price">' + fPrice(item.price) + '</div>' +
            '</div>' +
            '<div class="qty-ctrl">' +
              '<button class="qty-btn add" onclick="addItem(\'' + esc(item.id) + '\')">+</button>' +
              '<div class="qty-stepper">' +
                '<button class="qty-btn minus" onclick="changeQty(\'' + esc(item.id) + '\',-1)">&minus;</button>' +
                '<span class="qty-badge" id="mqty-' + esc(item.id) + '">' + qty + '</span>' +
                '<button class="qty-btn plus" onclick="changeQty(\'' + esc(item.id) + '\',1)">+</button>' +
              '</div>' +
            '</div>' +
          '</div>';
        });
      });

      if (!html) {
        html = '<div style="text-align:center;padding:40px;color:var(--text-muted)">Nessun piatto disponibile per questa cassa</div>';
      }

      area.innerHTML = html;
    }

    // ===== QTY LOGIC =====
    function addItem(id) {
      if (!connected || submitting) return;
      changeQty(id, 1);
    }

    function changeQty(id, delta) {
      if (!connected || submitting) return;
      var old = quantities[id] || 0;
      quantities[id] = Math.max(0, old + delta);
      var nw = quantities[id];

      // Aggiorna UI della riga
      var badge = document.getElementById('mqty-' + id);
      var row = document.getElementById('mcard-' + id);
      if (badge) badge.textContent = nw;
      if (row) {
        row.classList.toggle('has-qty', nw > 0);
        // Pulse animation
        if (nw > old && badge) {
          badge.classList.remove('pulse');
          void badge.offsetWidth;
          badge.classList.add('pulse');
        }
      }

      updateBottomBar();
    }

    function removeItem(id) {
      if (submitting) return;
      quantities[id] = 0;
      var badge = document.getElementById('mqty-' + id);
      var row = document.getElementById('mcard-' + id);
      if (badge) badge.textContent = '0';
      if (row) row.classList.remove('has-qty');
      updateBottomBar();
      renderSheet();
    }

    // ===== BOTTOM BAR =====
    function updateBottomBar() {
      var totalItems = 0;
      var subtotal = 0;
      ITEMS.forEach(function(i) {
        var q = quantities[i.id] || 0;
        totalItems += q;
        subtotal += q * i.price;
      });
      subtotal = Math.round(subtotal * 100) / 100;

      var bar = document.getElementById('bottomBar');
      var countEl = document.getElementById('barCount');
      var totalEl = document.getElementById('barTotal');

      bar.classList.toggle('has-items', totalItems > 0);
      countEl.textContent = totalItems === 0 ? 'Carrello vuoto' : totalItems + ' piatt' + (totalItems === 1 ? 'o' : 'i');
      totalEl.textContent = fPrice(subtotal);
    }

    // ===== CALC ORDER =====
    function calcOrder() {
      var totalItems = 0;
      var subtotal = 0;
      ITEMS.forEach(function(i) {
        var q = quantities[i.id] || 0;
        totalItems += q;
        subtotal += q * i.price;
      });
      subtotal = Math.round(subtotal * 100) / 100;

      if (activeCourtesy) {
        return { totalItems: totalItems, subtotal: subtotal, discount: 0, total: 0, courtesyType: activeCourtesy };
      }

      var discEl = document.getElementById('discountInput');
      var discountInput = discEl ? (parseFloat(discEl.value) || 0) : 0;
      var discount = 0;
      if (discountInput > 0) {
        if (discountIsPercent) {
          discount = subtotal * (discountInput / 100);
        } else {
          discount = discountInput;
        }
        discount = Math.min(discount, subtotal);
        discount = Math.round(discount * 100) / 100;
      }

      return {
        totalItems: totalItems,
        subtotal: subtotal,
        discount: discount,
        total: Math.round((subtotal - discount) * 100) / 100,
        courtesyType: null,
      };
    }

    // ===== BOTTOM SHEET =====
    function openSheet() {
      renderSheet();
      document.getElementById('sheetBackdrop').classList.add('open');
      document.getElementById('sheet').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeSheet() {
      document.getElementById('sheetBackdrop').classList.remove('open');
      document.getElementById('sheet').classList.remove('open');
      document.body.style.overflow = '';
    }

    function renderSheet() {
      var body = document.getElementById('sheetBody');
      var calc = calcOrder();

      if (calc.totalItems === 0) {
        body.innerHTML = '<div class="order-empty">Nessun piatto selezionato</div>';
        return;
      }

      // Righe ordine
      var html = '';
      ITEMS.forEach(function(i) {
        var q = quantities[i.id] || 0;
        if (q === 0) return;
        html += '<div class="order-item">' +
          '<div class="order-item-left">' +
            '<span class="order-item-qty">' + q + 'x</span>' +
            '<span class="order-item-name">' + esc(i.name) + '</span>' +
          '</div>' +
          '<span class="order-item-price">' + fPrice(q * i.price) + '</span>' +
          '<button class="order-item-remove" onclick="removeItem(\'' + esc(i.id) + '\')">&times;</button>' +
        '</div>';
      });

      // Form campi (diversi per cassa)
      html += '<div class="form-section">';

      if (currentCassa === 'generale') {
        // Tavolo + Coperti
        html += '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Tavolo</label>' +
            '<input class="form-input" id="tableInput" type="number" inputmode="numeric" min="1" placeholder="N.">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Coperti</label>' +
            '<input class="form-input" id="copertiInput" type="number" inputmode="numeric" min="0" placeholder="N.">' +
          '</div>' +
        '</div>';

        // Nome
        html += '<div class="form-group" style="margin-bottom:10px">' +
          '<label class="form-label">Nome (opzionale)</label>' +
          '<input class="form-input" id="nameInput" type="text" placeholder="Nome cliente" autocomplete="off">' +
        '</div>';

        // Toggle: Asporto, POS
        html += '<div class="toggles-row">' +
          '<button class="toggle-btn' + (asportoActive ? ' active red' : '') + '" onclick="toggleAsporto()">Asporto</button>' +
          '<button class="toggle-btn' + (posActive ? ' active amber' : '') + '" onclick="togglePos()">POS</button>' +
        '</div>';

        // Sconto
        html += '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Sconto</label>' +
            '<div class="discount-row" style="margin-bottom:0">' +
              '<input class="discount-input" id="discountInput" type="number" inputmode="decimal" min="0" step="0.5" placeholder="0" oninput="renderSheetTotal()">' +
              '<button class="discount-toggle" onclick="toggleDiscountType()">' + (discountIsPercent ? '%' : '\u20AC') + '</button>' +
            '</div>' +
          '</div>' +
        '</div>';

        // Omaggio
        html += '<label class="form-label" style="margin-bottom:4px">Omaggio</label>' +
        '<div class="omaggio-row">' +
          '<button class="omaggio-pill' + (activeCourtesy === 'sponsor' ? ' active' : '') + '" onclick="toggleCourtesy(\'sponsor\')">Sponsor</button>' +
          '<button class="omaggio-pill' + (activeCourtesy === 'don_pierino' ? ' active' : '') + '" onclick="toggleCourtesy(\'don_pierino\')">Don P.</button>' +
          '<button class="omaggio-pill' + (activeCourtesy === 'amici' ? ' active' : '') + '" onclick="toggleCourtesy(\'amici\')">Amici</button>' +
        '</div>';
      } else {
        // Bar e Casetta: solo Nome + POS
        html += '<div class="form-group" style="margin-bottom:10px">' +
          '<label class="form-label">Nome (opzionale)</label>' +
          '<input class="form-input" id="nameInput" type="text" placeholder="Nome cliente" autocomplete="off">' +
        '</div>';
        html += '<div class="toggles-row">' +
          '<button class="toggle-btn' + (posActive ? ' active amber' : '') + '" onclick="togglePos()">POS</button>' +
        '</div>';
      }

      html += '</div>'; // /form-section

      // Totale
      if (calc.discount > 0 || calc.courtesyType) {
        html += '<div class="subtotal-row"><span>Subtotale</span><span class="val">' + fPrice(calc.subtotal) + '</span></div>';
        if (calc.discount > 0) {
          html += '<div class="subtotal-row"><span>Sconto</span><span class="val" style="color:var(--amber)">-' + fPrice(calc.discount) + '</span></div>';
        }
        if (calc.courtesyType) {
          var courtesyNames = { sponsor: 'Sponsor', don_pierino: 'Don Pierino', amici: 'Amici' };
          html += '<div class="subtotal-row"><span>Omaggio</span><span class="val" style="color:var(--amber)">' + courtesyNames[calc.courtesyType] + '</span></div>';
        }
      }

      html += '<div class="total-row">' +
        '<span class="total-label">Totale</span>' +
        '<span class="total-value" id="sheetTotal">' + fPrice(calc.total) + '</span>' +
      '</div>';

      // Bottone ordina
      html += '<button class="btn-submit' + (!connected || submitting ? ' disabled' : '') + '" id="btnSubmit" onclick="submitOrder()">ORDINA</button>';

      // Feedback
      html += '<div class="feedback" id="feedback"></div>';

      body.innerHTML = html;
    }

    function renderSheetTotal() {
      var totalEl = document.getElementById('sheetTotal');
      if (totalEl) {
        var calc = calcOrder();
        totalEl.textContent = fPrice(calc.total);
      }
    }

    // ===== TOGGLES =====
    function toggleAsporto() {
      asportoActive = !asportoActive;
      renderSheet();
    }

    function togglePos() {
      posActive = !posActive;
      renderSheet();
    }

    function toggleDiscountType() {
      discountIsPercent = !discountIsPercent;
      renderSheet();
    }

    function toggleCourtesy(type) {
      activeCourtesy = activeCourtesy === type ? null : type;
      renderSheet();
    }

    // ===== SUBMIT ORDER =====
    async function submitOrder() {
      if (!connected || submitting) return;

      var calc = calcOrder();
      if (calc.totalItems === 0) return;

      var customerName = null;
      var nameEl = document.getElementById('nameInput');
      if (nameEl) customerName = nameEl.value.trim() || null;

      var table = 0;
      var coperti = 0;

      if (currentCassa === 'generale' && !asportoActive) {
        var tableEl = document.getElementById('tableInput');
        var copertiEl = document.getElementById('copertiInput');
        table = parseInt(tableEl.value) || 0;
        coperti = parseInt(copertiEl.value);

        if (!table || table < 1) {
          tableEl.classList.add('error');
          setTimeout(function() { tableEl.classList.remove('error'); }, 400);
          tableEl.focus();
          return;
        }
        if (coperti === undefined || coperti === null || isNaN(coperti) || coperti < 0) {
          copertiEl.classList.add('error');
          setTimeout(function() { copertiEl.classList.remove('error'); }, 400);
          copertiEl.focus();
          return;
        }
      }

      if (currentCassa === 'generale' && asportoActive) {
        if (!customerName) {
          nameEl.classList.add('error');
          setTimeout(function() { nameEl.classList.remove('error'); }, 400);
          nameEl.focus();
          return;
        }
      }

      var items = [];
      ITEMS.forEach(function(i) {
        if ((quantities[i.id] || 0) > 0) {
          items.push({ id: i.id, qty: quantities[i.id] });
        }
      });

      var discountRaw = 0;
      var discEl = document.getElementById('discountInput');
      if (discEl) discountRaw = parseFloat(discEl.value) || 0;

      submitting = true;
      var btn = document.getElementById('btnSubmit');
      if (btn) btn.innerHTML = '<div class="spinner"></div>';

      var payload = {
        table: table,
        items: items,
        customer_name: customerName,
        source: CASSA_SOURCE[currentCassa],
        payment: posActive ? 'pos' : 'contanti',
      };

      // Campi extra solo per cassa generale
      if (currentCassa === 'generale') {
        payload.discount = calc.discount;
        payload.discount_type = discountIsPercent ? 'percent' : 'euro';
        payload.discount_value = discountRaw;
        payload.courtesy_type = calc.courtesyType;
        payload.coperti = asportoActive ? 0 : coperti;
        payload.asporto = asportoActive;
      }

      try {
        var res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        var data = await res.json();

        if (data.success) {
          var msg = '#' + data.order_number;
          if (data.table > 0) msg += '  Tav.' + data.table;
          if (data.courtesy_type) {
            var names = { sponsor: 'Sponsor', don_pierino: 'Don Pierino', amici: 'Amici' };
            msg += '  OMAGGIO ' + names[data.courtesy_type];
          } else {
            msg += '  ' + fPrice(data.total);
          }

          showFeedback(msg, 'success');

          var lastEl = document.getElementById('lastOrder');
          lastEl.textContent = '#' + data.order_number;
          lastEl.classList.add('visible');

          resetOrder();
          setTimeout(closeSheet, 1500);
        } else {
          showFeedback(data.error || 'Errore sconosciuto', 'error');
        }
      } catch (e) {
        showFeedback('Errore di rete', 'error');
      }

      submitting = false;
      if (btn) btn.textContent = 'ORDINA';
    }

    function showFeedback(msg, type) {
      var fb = document.getElementById('feedback');
      if (!fb) return;
      fb.textContent = msg;
      fb.className = 'feedback visible ' + type;
      setTimeout(function() { fb.classList.remove('visible'); }, type === 'success' ? 3000 : 4000);
    }

    // ===== RESET =====
    function resetOrder() {
      Object.keys(quantities).forEach(function(k) { quantities[k] = 0; });
      activeCourtesy = null;
      discountIsPercent = false;
      asportoActive = false;
      posActive = false;
      renderMenu();
      updateBottomBar();
    }

    // ===== EXIT =====
    function exitMobile() {
      localStorage.removeItem('sagrapp_role');
      sessionStorage.removeItem('sagrapp_token');
      window.location.href = '/';
    }

    // ===== SOCKET.IO =====
    var socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    socket.on('connect', function() {
      connected = true;
      socket.emit('register', { role: 'cassa' });
      document.getElementById('connDot').classList.remove('offline');
      document.getElementById('offlineBanner').classList.remove('visible');
    });

    socket.on('disconnect', function() {
      connected = false;
      document.getElementById('connDot').classList.add('offline');
      document.getElementById('offlineBanner').classList.add('visible');
    });

    socket.on('inventory_exhausted', function(data) {
      var row = document.getElementById('mcard-' + data.item_id);
      if (!row || row.classList.contains('exhausted')) return;
      row.classList.add('exhausted');
      // Reset qty se selezionato
      if (quantities[data.item_id] > 0) {
        quantities[data.item_id] = 0;
        updateBottomBar();
      }
      // Aggiungi tag
      var nameEl = row.querySelector('.item-name');
      if (nameEl && !row.querySelector('.item-tag')) {
        nameEl.innerHTML += '<span class="item-tag">Esaurito</span>';
      }
    });

    socket.on('menu_updated', function() {
      loadMenu();
    });

    // ===== INIT =====
    loadMenu();

    // Export per PJAX (non dovrebbe servire ma per sicurezza)
    window.switchCassa = switchCassa;
    window.addItem = addItem;
    window.changeQty = changeQty;
    window.removeItem = removeItem;
    window.openSheet = openSheet;
    window.closeSheet = closeSheet;
    window.toggleAsporto = toggleAsporto;
    window.togglePos = togglePos;
    window.toggleDiscountType = toggleDiscountType;
    window.toggleCourtesy = toggleCourtesy;
    window.submitOrder = submitOrder;
    window.exitMobile = exitMobile;
    window.renderSheetTotal = renderSheetTotal;
  </script>
</body>
</html>
