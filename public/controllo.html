<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SagrApp — Operatore Linea Cibo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060a12;
      color: #f0f4f8;
      height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .header-title {
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(240, 244, 248, 0.5);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #6c7a89;
    }

    .header-status.online { color: #4ecca3; }
    .header-status.offline { color: #e94560; }

    .status-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6c7a89;
      transition: all 200ms ease;
    }

    .status-led.on {
      background: #4ecca3;
      box-shadow: 0 0 6px #4ecca3;
    }

    .status-led.off {
      background: #e94560;
      box-shadow: 0 0 6px #e94560;
    }

    /* ===== LAYOUT A DUE SEZIONI ===== */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== SEZIONE ORDINI APERTI (sopra) ===== */
    .orders-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-bottom: 2px solid rgba(78, 204, 163, 0.15);
    }

    .orders-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      flex-shrink: 0;
    }

    .orders-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6c7a89;
    }

    .orders-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #4ecca3;
      padding: 2px 8px;
      background: rgba(78, 204, 163, 0.1);
      border-radius: 4px;
    }

    .orders-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      -webkit-overflow-scrolling: touch;
    }

    .orders-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6c7a89;
      font-size: 14px;
      font-weight: 500;
    }

    /* ===== RIGA ORDINE ===== */
    .order-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      flex-shrink: 0;
      animation: slide-in 200ms ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .order-info {
      flex: 1;
      min-width: 0;
    }

    .order-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }

    .order-id {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 15px;
      color: #ffffff;
    }

    .order-table {
      font-weight: 600;
      font-size: 13px;
      color: rgba(240, 244, 248, 0.5);
    }

    .order-items {
      font-size: 12px;
      font-weight: 400;
      color: rgba(240, 244, 248, 0.35);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-cancel {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid rgba(233, 69, 96, 0.3);
      background: rgba(233, 69, 96, 0.08);
      color: #e94560;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 120ms ease;
    }

    .btn-cancel:active {
      background: rgba(233, 69, 96, 0.3);
      border-color: #e94560;
      transform: scale(0.95);
    }

    /* ===== SEZIONE TASTIERINO (sotto) ===== */
    .keypad-section {
      flex-shrink: 0;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* Display numero ordine — compatto */
    .display {
      width: 100%;
      max-width: 380px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
    }

    .display-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(240, 244, 248, 0.35);
      white-space: nowrap;
    }

    .display-number {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(32px, 8vw, 48px);
      color: #ffffff;
      line-height: 1;
      text-align: right;
      letter-spacing: 0.05em;
    }

    .display-number.empty {
      color: rgba(255, 255, 255, 0.15);
    }

    /* Ultimo evaso */
    .last-fulfilled {
      font-size: 12px;
      font-weight: 600;
      color: rgba(78, 204, 163, 0.6);
      text-align: center;
      min-height: 18px;
    }

    /* ===== TASTIERINO NUMERICO ===== */
    .keypad {
      width: 100%;
      max-width: 380px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .key {
      height: clamp(52px, 10vw, 64px);
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: #f0f4f8;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(22px, 5vw, 30px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 120ms ease;
      touch-action: manipulation;
    }

    .key:active { transform: scale(0.93); }

    .key-clear {
      background: rgba(233, 69, 96, 0.1);
      border-color: rgba(233, 69, 96, 0.25);
      color: #e94560;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .key-clear:active {
      background: rgba(233, 69, 96, 0.35);
      border-color: #e94560;
    }

    .key-submit {
      background: rgba(78, 204, 163, 0.1);
      border-color: rgba(78, 204, 163, 0.25);
      color: #4ecca3;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(13px, 3vw, 18px);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .key-submit:active {
      background: rgba(78, 204, 163, 0.35);
      border-color: #4ecca3;
    }

    .key-submit.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* ===== FEEDBACK OVERLAY ===== */
    .feedback {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .feedback.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .feedback-success { background: rgba(78, 204, 163, 0.92); }
    .feedback-error { background: rgba(233, 69, 96, 0.92); }
    .feedback-warning { background: rgba(255, 217, 61, 0.92); }

    .feedback-icon {
      font-size: clamp(60px, 18vw, 100px);
      line-height: 1;
      margin-bottom: 12px;
    }

    .feedback-text {
      font-weight: 700;
      font-size: clamp(22px, 5vw, 36px);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
      color: #fff;
    }

    .feedback-warning .feedback-text { color: #1a1a2e; }
    .feedback-warning .feedback-icon { color: #1a1a2e; }

    .feedback-sub {
      font-size: clamp(14px, 3vw, 20px);
      font-weight: 500;
      margin-top: 6px;
      opacity: 0.8;
      color: #fff;
    }

    .feedback-warning .feedback-sub { color: #1a1a2e; }

    /* ===== BANNER DISCONNESSIONE ===== */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px 20px;
      background: #e94560;
      color: #fff;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 200;
      transform: translateY(-100%);
      transition: transform 300ms ease;
    }

    .offline-banner.visible {
      transform: translateY(0);
    }

    /* ===== SCROLLBAR ===== */
    .orders-list::-webkit-scrollbar { width: 4px; }
    .orders-list::-webkit-scrollbar-track { background: transparent; }
    .orders-list::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Banner disconnessione -->
  <div class="offline-banner" id="offlineBanner">CONNESSIONE PERSA &mdash; disabilitato</div>

  <!-- Header -->
  <header class="header">
    <span class="header-title">Operatore Linea Cibo</span>
    <span class="header-status" id="headerStatus">
      <span class="status-led" id="statusLed"></span>
      <span id="statusText">...</span>
    </span>
  </header>

  <!-- Contenuto principale -->
  <div class="content">

    <!-- Sezione ordini aperti (sopra) -->
    <section class="orders-section">
      <div class="orders-header">
        <span class="orders-label">Ordini aperti</span>
        <span class="orders-count" id="ordersCount">0</span>
      </div>
      <div class="orders-list" id="ordersList">
        <div class="orders-empty">Nessun ordine aperto</div>
      </div>
    </section>

    <!-- Sezione tastierino (sotto) -->
    <section class="keypad-section">
      <!-- Display compatto -->
      <div class="display">
        <span class="display-label">Evadi #</span>
        <span class="display-number empty" id="displayNumber">&mdash;</span>
      </div>

      <!-- Tastierino -->
      <div class="keypad" id="keypad">
        <button class="key" onclick="pressKey('1')">1</button>
        <button class="key" onclick="pressKey('2')">2</button>
        <button class="key" onclick="pressKey('3')">3</button>
        <button class="key" onclick="pressKey('4')">4</button>
        <button class="key" onclick="pressKey('5')">5</button>
        <button class="key" onclick="pressKey('6')">6</button>
        <button class="key" onclick="pressKey('7')">7</button>
        <button class="key" onclick="pressKey('8')">8</button>
        <button class="key" onclick="pressKey('9')">9</button>
        <button class="key key-clear" onclick="pressClear()">C</button>
        <button class="key" onclick="pressKey('0')">0</button>
        <button class="key key-submit disabled" id="btnSubmit" onclick="pressSubmit()">EVADI</button>
      </div>

      <!-- Ultimo evaso -->
      <div class="last-fulfilled" id="lastFulfilled"></div>
    </section>

  </div>

  <!-- Feedback overlays -->
  <div class="feedback feedback-success" id="feedbackSuccess">
    <div class="feedback-icon">&#10003;</div>
    <div class="feedback-text">Ordine evaso</div>
    <div class="feedback-sub" id="successDetail"></div>
  </div>

  <div class="feedback feedback-error" id="feedbackError">
    <div class="feedback-icon">&#10007;</div>
    <div class="feedback-text" id="errorText">Ordine non trovato</div>
    <div class="feedback-sub" id="errorDetail"></div>
  </div>

  <div class="feedback feedback-warning" id="feedbackWarning">
    <div class="feedback-icon">!</div>
    <div class="feedback-text">Già evaso</div>
    <div class="feedback-sub" id="warningDetail"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let inputBuffer = '';
    let connected = false;
    let submitting = false;

    const displayNumber = document.getElementById('displayNumber');
    const btnSubmit = document.getElementById('btnSubmit');
    const ordersList = document.getElementById('ordersList');
    const ordersCount = document.getElementById('ordersCount');
    const lastFulfilled = document.getElementById('lastFulfilled');

    // Socket.IO
    const socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    const offlineBanner = document.getElementById('offlineBanner');
    const statusLed = document.getElementById('statusLed');
    const statusText = document.getElementById('statusText');
    const headerStatus = document.getElementById('headerStatus');

    socket.on('connect', () => {
      connected = true;
      socket.emit('register', { role: 'controllo' });
      offlineBanner.classList.remove('visible');
      statusLed.classList.add('on');
      statusLed.classList.remove('off');
      headerStatus.classList.add('online');
      headerStatus.classList.remove('offline');
      statusText.textContent = 'Connesso';
      setKeypadEnabled(true);
    });

    socket.on('disconnect', () => {
      connected = false;
      offlineBanner.classList.add('visible');
      statusLed.classList.remove('on');
      statusLed.classList.add('off');
      headerStatus.classList.remove('online');
      headerStatus.classList.add('offline');
      statusText.textContent = 'Offline';
      setKeypadEnabled(false);
    });

    // === LISTA ORDINI APERTI (aggiornamento real-time) ===
    socket.on('open_orders_update', ({ orders }) => {
      renderOpenOrders(orders);
    });

    function renderOpenOrders(orders) {
      ordersCount.textContent = orders.length;

      if (orders.length === 0) {
        ordersList.innerHTML = '<div class="orders-empty">Nessun ordine aperto</div>';
        return;
      }

      ordersList.innerHTML = orders.map(o => `
        <div class="order-row">
          <div class="order-info">
            <div class="order-top">
              <span class="order-id">#${o.id}</span>
              <span class="order-table">Tav. ${o.table}${o.customer_name ? ' — ' + o.customer_name : ''}</span>
            </div>
            <div class="order-items">${o.items_summary}</div>
          </div>
          <button class="btn-cancel" onclick="cancelOrder(${o.id})">Annulla</button>
        </div>
      `).join('');
    }

    // === ANNULLAMENTO ORDINE ===
    async function cancelOrder(orderId) {
      if (!connected) return;
      if (!confirm('Annullare l\'ordine #' + orderId + '?')) return;

      try {
        const res = await fetch('/api/orders/' + orderId + '/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        const data = await res.json();

        if (data.success) {
          showFeedback('success', '#' + data.order_number + (data.table ? ' — Tavolo ' + data.table : ''), 'ANNULLATO');
        } else if (data.already_cancelled) {
          showFeedback('warning', '#' + orderId + ' già annullato');
        } else {
          showFeedback('error', '#' + orderId + ' — ' + (data.error || 'Errore'));
        }
      } catch (err) {
        showFeedback('error', 'Errore di rete');
      }
    }

    // === DISPLAY E TASTIERINO ===
    function updateDisplay() {
      if (inputBuffer.length === 0) {
        displayNumber.textContent = '\u2014';
        displayNumber.classList.add('empty');
        btnSubmit.classList.add('disabled');
      } else {
        displayNumber.textContent = inputBuffer;
        displayNumber.classList.remove('empty');
        btnSubmit.classList.remove('disabled');
      }
    }

    function pressKey(digit) {
      if (!connected || submitting) return;
      if (inputBuffer.length >= 5) return;
      inputBuffer += digit;
      updateDisplay();
    }

    function pressClear() {
      if (submitting) return;
      inputBuffer = '';
      updateDisplay();
    }

    // === EVASIONE ORDINE ===
    async function pressSubmit() {
      if (!connected || submitting || inputBuffer.length === 0) return;

      const orderNumber = parseInt(inputBuffer, 10);
      submitting = true;

      try {
        const res = await fetch('/api/orders/' + orderNumber + '/fulfill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        const data = await res.json();

        if (data.success) {
          showFeedback('success', '#' + data.order_number + (data.table ? ' — Tavolo ' + data.table : ''));
          socket.emit('order_fulfilled', { order_number: orderNumber });
          lastFulfilled.textContent = 'Ultimo evaso: #' + data.order_number + (data.table ? ' — Tav. ' + data.table : '');
        } else if (data.not_ready) {
          const details = data.missing.map(function(m) {
            return m.piece + ': ' + m.available + '/' + m.needed;
          }).join(', ');
          showFeedback('warning', details, 'NON PRONTO');
        } else if (data.already_fulfilled) {
          showFeedback('warning', '#' + data.order_number + (data.table ? ' — Tavolo ' + data.table : ''));
        } else {
          showFeedback('error', '#' + orderNumber + ' non trovato');
        }
      } catch (err) {
        showFeedback('error', 'Errore di rete');
      }

      inputBuffer = '';
      updateDisplay();
      submitting = false;
    }

    // === FEEDBACK OVERLAY ===
    function showFeedback(type, detail, customTitle) {
      const el = document.getElementById(
        type === 'success' ? 'feedbackSuccess' :
        type === 'warning' ? 'feedbackWarning' : 'feedbackError'
      );
      const titleEl = el.querySelector('.feedback-text');
      if (titleEl && customTitle) titleEl.textContent = customTitle;
      const detailEl = el.querySelector('.feedback-sub');
      if (detailEl) detailEl.textContent = detail || '';

      el.classList.add('visible');
      setTimeout(function() {
        el.classList.remove('visible');
        if (titleEl && customTitle) {
          if (type === 'success') titleEl.textContent = 'Ordine evaso';
          else if (type === 'warning') titleEl.textContent = 'Già evaso';
          else if (type === 'error') titleEl.textContent = 'Ordine non trovato';
        }
      }, 2000);
    }

    // === ABILITAZIONE TASTIERINO ===
    function setKeypadEnabled(enabled) {
      document.querySelectorAll('.key').forEach(function(k) {
        k.style.opacity = enabled ? '' : '0.3';
        k.style.pointerEvents = enabled ? '' : 'none';
      });
      document.querySelectorAll('.btn-cancel').forEach(function(b) {
        b.style.opacity = enabled ? '' : '0.3';
        b.style.pointerEvents = enabled ? '' : 'none';
      });
    }

    // === TASTIERA FISICA (per test desktop) ===
    document.addEventListener('keydown', function(e) {
      if (!connected || submitting) return;
      if (e.key >= '0' && e.key <= '9') {
        pressKey(e.key);
      } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === 'Escape') {
        pressClear();
      } else if (e.key === 'Enter') {
        pressSubmit();
      }
    });
  </script>
</body>
</html>
