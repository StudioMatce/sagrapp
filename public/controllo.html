<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SagrApp — Zona Controllo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060a12;
      color: #f0f4f8;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .header-title {
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(240, 244, 248, 0.5);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #6c7a89;
    }

    .header-status.online { color: #4ecca3; }
    .header-status.offline { color: #e94560; }

    .status-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6c7a89;
      transition: all 200ms ease;
    }

    .status-led.on {
      background: #4ecca3;
      box-shadow: 0 0 6px #4ecca3;
    }

    .status-led.off {
      background: #e94560;
      box-shadow: 0 0 6px #e94560;
    }

    /* ===== CONTENUTO PRINCIPALE ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 20px;
    }

    /* ===== DISPLAY NUMERO ORDINE ===== */
    .display {
      width: 100%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .display-label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(240, 244, 248, 0.35);
      margin-bottom: 8px;
    }

    .display-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(56px, 15vw, 90px);
      color: #ffffff;
      line-height: 1;
      min-height: 1.1em;
      letter-spacing: 0.05em;
    }

    .display-number.empty {
      color: rgba(255, 255, 255, 0.15);
    }

    /* ===== TASTIERINO NUMERICO ===== */
    .keypad {
      width: 100%;
      max-width: 380px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .key {
      aspect-ratio: 1.4;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: #f0f4f8;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(24px, 6vw, 36px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 120ms ease;
      touch-action: manipulation;
    }

    .key:active { transform: scale(0.93); }

    .key-clear {
      background: rgba(233, 69, 96, 0.1);
      border-color: rgba(233, 69, 96, 0.25);
      color: #e94560;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .key-clear:active {
      background: rgba(233, 69, 96, 0.35);
      border-color: #e94560;
    }

    .key-submit {
      background: rgba(78, 204, 163, 0.1);
      border-color: rgba(78, 204, 163, 0.25);
      color: #4ecca3;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(14px, 3.5vw, 20px);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .key-submit:active {
      background: rgba(78, 204, 163, 0.35);
      border-color: #4ecca3;
    }

    .key-submit.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* ===== FEEDBACK OVERLAY ===== */
    .feedback {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .feedback.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .feedback-success { background: rgba(78, 204, 163, 0.92); }
    .feedback-error { background: rgba(233, 69, 96, 0.92); }
    .feedback-warning { background: rgba(255, 217, 61, 0.92); }

    .feedback-icon {
      font-size: clamp(60px, 18vw, 120px);
      line-height: 1;
      margin-bottom: 12px;
    }

    .feedback-text {
      font-weight: 700;
      font-size: clamp(22px, 5vw, 36px);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
      color: #fff;
    }

    .feedback-warning .feedback-text { color: #1a1a2e; }
    .feedback-warning .feedback-icon { color: #1a1a2e; }

    .feedback-sub {
      font-size: clamp(14px, 3vw, 20px);
      font-weight: 500;
      margin-top: 6px;
      opacity: 0.8;
      color: #fff;
    }

    .feedback-warning .feedback-sub { color: #1a1a2e; }

    /* ===== BANNER DISCONNESSIONE ===== */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px 20px;
      background: #e94560;
      color: #fff;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 200;
      transform: translateY(-100%);
      transition: transform 300ms ease;
    }

    .offline-banner.visible {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- Banner disconnessione -->
  <div class="offline-banner" id="offlineBanner">CONNESSIONE PERSA &mdash; tastierino disabilitato</div>

  <!-- Header -->
  <header class="header">
    <span class="header-title">Zona Controllo</span>
    <span class="header-status" id="headerStatus">
      <span class="status-led" id="statusLed"></span>
      <span id="statusText">...</span>
    </span>
  </header>

  <!-- Contenuto principale -->
  <div class="main">
    <!-- Display numero ordine -->
    <div class="display">
      <div class="display-label">Numero ordine</div>
      <div class="display-number empty" id="displayNumber">&mdash;</div>
    </div>

    <!-- Tastierino numerico -->
    <div class="keypad" id="keypad">
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key key-clear" onclick="pressClear()">C</button>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key key-submit disabled" id="btnSubmit" onclick="pressSubmit()">EVADI</button>
    </div>
  </div>

  <!-- Feedback overlays -->
  <div class="feedback feedback-success" id="feedbackSuccess">
    <div class="feedback-icon">&#10003;</div>
    <div class="feedback-text">Ordine evaso</div>
    <div class="feedback-sub" id="successDetail"></div>
  </div>

  <div class="feedback feedback-error" id="feedbackError">
    <div class="feedback-icon">&#10007;</div>
    <div class="feedback-text" id="errorText">Ordine non trovato</div>
    <div class="feedback-sub" id="errorDetail"></div>
  </div>

  <div class="feedback feedback-warning" id="feedbackWarning">
    <div class="feedback-icon">!</div>
    <div class="feedback-text">Già evaso</div>
    <div class="feedback-sub" id="warningDetail"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let inputBuffer = '';
    let connected = false;
    let submitting = false;

    const displayNumber = document.getElementById('displayNumber');
    const btnSubmit = document.getElementById('btnSubmit');

    // Socket.IO
    const socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    const offlineBanner = document.getElementById('offlineBanner');
    const statusLed = document.getElementById('statusLed');
    const statusText = document.getElementById('statusText');
    const headerStatus = document.getElementById('headerStatus');

    socket.on('connect', () => {
      connected = true;
      socket.emit('register', { role: 'controllo' });
      offlineBanner.classList.remove('visible');
      statusLed.classList.add('on');
      statusLed.classList.remove('off');
      headerStatus.classList.add('online');
      headerStatus.classList.remove('offline');
      statusText.textContent = 'Connesso';
      setKeypadEnabled(true);
    });

    socket.on('disconnect', () => {
      connected = false;
      offlineBanner.classList.add('visible');
      statusLed.classList.remove('on');
      statusLed.classList.add('off');
      headerStatus.classList.remove('online');
      headerStatus.classList.add('offline');
      statusText.textContent = 'Offline';
      setKeypadEnabled(false);
    });

    // Aggiorna display
    function updateDisplay() {
      if (inputBuffer.length === 0) {
        displayNumber.textContent = '\u2014'; // em dash
        displayNumber.classList.add('empty');
        btnSubmit.classList.add('disabled');
      } else {
        displayNumber.textContent = inputBuffer;
        displayNumber.classList.remove('empty');
        btnSubmit.classList.remove('disabled');
      }
    }

    // Tasto numerico
    function pressKey(digit) {
      if (!connected || submitting) return;
      // Massimo 5 cifre
      if (inputBuffer.length >= 5) return;
      inputBuffer += digit;
      updateDisplay();
    }

    // Tasto C (cancella)
    function pressClear() {
      if (submitting) return;
      inputBuffer = '';
      updateDisplay();
    }

    // Tasto EVADI
    async function pressSubmit() {
      if (!connected || submitting || inputBuffer.length === 0) return;

      const orderNumber = parseInt(inputBuffer, 10);
      submitting = true;

      try {
        const res = await fetch(`/api/orders/${orderNumber}/fulfill`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        const data = await res.json();

        if (data.success) {
          // Ordine evaso con successo
          showFeedback('success', `#${data.order_number}` + (data.table ? ` — Tavolo ${data.table}` : ''));
          socket.emit('order_fulfilled', { order_number: orderNumber });
        } else if (data.already_fulfilled) {
          // Ordine già evaso
          showFeedback('warning', `#${data.order_number}` + (data.table ? ` — Tavolo ${data.table}` : ''));
        } else {
          // Ordine non trovato
          showFeedback('error', `#${orderNumber} non trovato`);
        }
      } catch (err) {
        showFeedback('error', 'Errore di rete');
      }

      // Reset dopo feedback
      inputBuffer = '';
      updateDisplay();
      submitting = false;
    }

    // Mostra overlay di feedback (auto-chiude dopo 1.5s)
    function showFeedback(type, detail) {
      const el = document.getElementById(
        type === 'success' ? 'feedbackSuccess' :
        type === 'warning' ? 'feedbackWarning' : 'feedbackError'
      );
      const detailEl = el.querySelector('.feedback-sub');
      if (detailEl) detailEl.textContent = detail || '';

      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 1500);
    }

    // Abilita/disabilita tastierino
    function setKeypadEnabled(enabled) {
      const keys = document.querySelectorAll('.key');
      keys.forEach(k => {
        if (enabled) {
          k.style.opacity = '';
          k.style.pointerEvents = '';
        } else {
          k.style.opacity = '0.3';
          k.style.pointerEvents = 'none';
        }
      });
    }

    // Supporto tastiera fisica (utile per test da desktop)
    document.addEventListener('keydown', (e) => {
      if (!connected || submitting) return;
      if (e.key >= '0' && e.key <= '9') {
        pressKey(e.key);
      } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === 'Escape') {
        pressClear();
      } else if (e.key === 'Enter') {
        pressSubmit();
      }
    });
  </script>
</body>
</html>
