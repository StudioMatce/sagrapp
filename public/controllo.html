<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SagrApp — Zona Controllo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060a12;
      color: #f0f4f8;
      height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-title {
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(240, 244, 248, 0.5);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #6c7a89;
    }

    .header-status.online { color: #4ecca3; }
    .header-status.offline { color: #e94560; }

    .status-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6c7a89;
      transition: all 200ms ease;
    }

    .status-led.on { background: #4ecca3; box-shadow: 0 0 6px #4ecca3; }
    .status-led.off { background: #e94560; box-shadow: 0 0 6px #e94560; animation: blink-led 1.2s ease infinite; }

    @keyframes blink-led {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== LAYOUT ORIZZONTALE: ordini a sinistra + tastierino a destra ===== */
    .content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ===== PANNELLO ORDINI (sinistra, collassabile) ===== */
    .orders-panel {
      width: 45%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      border-right: 2px solid rgba(78, 204, 163, 0.12);
      transition: width 300ms ease, max-width 300ms ease, opacity 300ms ease;
      overflow: hidden;
    }

    .orders-panel.collapsed {
      width: 0;
      max-width: 0;
      border-right: none;
      opacity: 0;
    }

    .orders-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.015);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .orders-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6c7a89;
    }

    .orders-count-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #4ecca3;
      padding: 2px 10px;
      background: rgba(78, 204, 163, 0.1);
      border: 1px solid rgba(78, 204, 163, 0.15);
      border-radius: 4px;
      min-width: 32px;
      text-align: center;
    }

    .orders-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      -webkit-overflow-scrolling: touch;
    }

    .orders-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #3a4555;
      padding: 24px;
    }

    .orders-empty-text {
      font-size: 14px;
      font-weight: 600;
      color: #4a5568;
    }

    /* ===== RIGA ORDINE ===== */
    .order-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-left: 3px solid rgba(78, 204, 163, 0.3);
      border-radius: 6px;
      flex-shrink: 0;
      animation: row-in 200ms ease;
    }

    @keyframes row-in {
      from { opacity: 0; transform: translateX(-12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .order-info { flex: 1; min-width: 0; }

    .order-meta {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 2px;
    }

    .order-id {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 15px;
      color: #ffffff;
    }

    .order-table {
      font-weight: 600;
      font-size: 12px;
      color: #4ecca3;
    }

    .order-name {
      font-weight: 500;
      font-size: 11px;
      color: rgba(240, 244, 248, 0.4);
      margin-left: auto;
    }

    .order-tag-asporto {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(34, 211, 238, 0.15);
      color: #22d3ee;
    }

    .order-items {
      font-size: 11px;
      font-weight: 400;
      color: rgba(240, 244, 248, 0.3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-cancel {
      flex-shrink: 0;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid rgba(233, 69, 96, 0.25);
      background: rgba(233, 69, 96, 0.06);
      color: #e94560;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 120ms ease;
    }

    .btn-cancel:active {
      background: rgba(233, 69, 96, 0.3);
      border-color: #e94560;
      transform: scale(0.93);
    }

    /* ===== PANNELLO TASTIERINO (destra, prende tutto lo spazio) ===== */
    .keypad-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      gap: 10px;
      position: relative;
    }

    /* Pulsante mostra/nascondi lista ordini — angolo in alto a sinistra del tastierino */
    .btn-toggle-orders {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: rgba(240, 244, 248, 0.4);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 150ms ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-toggle-orders:active { transform: scale(0.9); }
    .btn-toggle-orders.active {
      border-color: rgba(78, 204, 163, 0.3);
      color: #4ecca3;
    }

    /* Display numero ordine */
    .display-bar {
      width: 100%;
      max-width: 360px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
    }

    .display-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(240, 244, 248, 0.3);
      white-space: nowrap;
    }

    .display-value {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(34px, 8vw, 50px);
      color: #ffffff;
      line-height: 1.1;
      text-align: right;
      letter-spacing: 0.04em;
    }

    .display-value.placeholder {
      color: rgba(255, 255, 255, 0.12);
    }

    /* Griglia tastierino */
    .keypad-grid {
      width: 100%;
      max-width: 360px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .key {
      height: clamp(56px, 10vh, 72px);
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: #f0f4f8;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(24px, 5vw, 32px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 100ms ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .key:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.08);
    }

    .key-c {
      background: rgba(233, 69, 96, 0.08);
      border-color: rgba(233, 69, 96, 0.2);
      color: #e94560;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .key-c:active {
      background: rgba(233, 69, 96, 0.3);
      border-color: #e94560;
    }

    .key-evadi {
      background: rgba(78, 204, 163, 0.1);
      border-color: rgba(78, 204, 163, 0.25);
      color: #4ecca3;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(14px, 3.5vw, 19px);
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .key-evadi:active {
      background: rgba(78, 204, 163, 0.35);
      border-color: #4ecca3;
    }

    .key-evadi.disabled {
      opacity: 0.25;
      pointer-events: none;
    }

    /* Ultimo evaso */
    .last-line {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: rgba(78, 204, 163, 0.5);
      text-align: center;
      min-height: 16px;
      letter-spacing: 0.02em;
    }

    /* ===== FEEDBACK TOAST ===== */
    .toast {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 20px;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.03em;
      z-index: 150;
      transform: translateY(100%);
      transition: transform 250ms ease;
      color: #fff;
    }

    .toast.visible { transform: translateY(0); }
    .toast-success { background: #4ecca3; color: #060a12; }
    .toast-error { background: #e94560; }
    .toast-warning { background: #f0a500; color: #1a1a2e; }

    .toast-detail {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
      opacity: 0.8;
    }

    /* ===== BANNER DISCONNESSIONE ===== */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 20px;
      background: #e94560;
      color: #fff;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 200;
      transform: translateY(-100%);
      transition: transform 300ms ease;
    }

    .offline-banner.visible { transform: translateY(0); }

    /* ===== SCROLLBAR ===== */
    .orders-list::-webkit-scrollbar { width: 4px; }
    .orders-list::-webkit-scrollbar-track { background: transparent; }
    .orders-list::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

    .order-row.removing {
      animation: row-out 300ms ease forwards;
    }

    @keyframes row-out {
      to { opacity: 0; transform: translateX(40px); height: 0; padding: 0; margin: 0; border-width: 0; overflow: hidden; }
    }

    .btn-esci {
      position: fixed;
      top: 8px;
      right: 10px;
      z-index: 900;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10, 14, 23, 0.9);
      color: #64748b;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 150ms ease;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(8px);
    }
    .btn-esci:hover { color: #e94560; border-color: rgba(233,69,96,0.3); }
  </style>
</head>
<body>
  <button class="btn-esci" onclick="localStorage.removeItem('sagrapp_role');sessionStorage.removeItem('sagrapp_token');sessionStorage.removeItem('admin_token');window.location.href='/'">Esci</button>

  <!-- Banner disconnessione -->
  <div class="offline-banner" id="offlineBanner">Connessione persa &mdash; funzioni disabilitate</div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="header-title">Zona Controllo</span>
    </div>
    <span class="header-status" id="headerStatus">
      <span class="status-led" id="statusLed"></span>
      <span id="statusText">...</span>
    </span>
  </header>

  <!-- Layout orizzontale: ordini a sinistra + tastierino a destra -->
  <div class="content">

    <!-- Pannello ordini aperti (sinistra, collassabile) -->
    <div class="orders-panel" id="ordersPanel">
      <div class="orders-toolbar">
        <span class="orders-label">Ordini aperti</span>
        <span class="orders-count-badge" id="ordersCount">0</span>
      </div>
      <div class="orders-list" id="ordersList">
        <div class="orders-empty">
          <div class="orders-empty-text">Nessun ordine aperto</div>
        </div>
      </div>
    </div>

    <!-- Pannello tastierino (destra) -->
    <div class="keypad-panel">
      <!-- Pulsante mostra/nascondi lista ordini -->
      <button class="btn-toggle-orders active" id="btnToggleOrders" onclick="toggleOrdersPanel()" title="Mostra/nascondi ordini">&#9776;</button>

      <!-- Display input -->
      <div class="display-bar">
        <span class="display-label">Evadi #</span>
        <span class="display-value placeholder" id="displayValue">&mdash;</span>
      </div>

      <!-- Griglia 4 righe x 3 colonne -->
      <div class="keypad-grid">
        <button class="key" onclick="pressKey('1')">1</button>
        <button class="key" onclick="pressKey('2')">2</button>
        <button class="key" onclick="pressKey('3')">3</button>
        <button class="key" onclick="pressKey('4')">4</button>
        <button class="key" onclick="pressKey('5')">5</button>
        <button class="key" onclick="pressKey('6')">6</button>
        <button class="key" onclick="pressKey('7')">7</button>
        <button class="key" onclick="pressKey('8')">8</button>
        <button class="key" onclick="pressKey('9')">9</button>
        <button class="key key-c" onclick="pressClear()">C</button>
        <button class="key" onclick="pressKey('0')">0</button>
        <button class="key key-evadi disabled" id="btnEvadi" onclick="pressEvadi()">EVADI &#10003;</button>
      </div>

      <!-- Ultimo evaso -->
      <div class="last-line" id="lastFulfilled"></div>
    </div>

  </div>

  <!-- Toast feedback -->
  <div class="toast" id="toast">
    <span id="toastMsg"></span>
    <span class="toast-detail" id="toastDetail"></span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // === STATO ===
    var inputBuffer = '';
    var connected = false;
    var submitting = false;
    var toastTimer = null;
    var ordersPanelVisible = true;

    // === RIFERIMENTI DOM ===
    var displayValue = document.getElementById('displayValue');
    var btnEvadi = document.getElementById('btnEvadi');
    var ordersList = document.getElementById('ordersList');
    var ordersCount = document.getElementById('ordersCount');
    var lastFulfilled = document.getElementById('lastFulfilled');
    var offlineBanner = document.getElementById('offlineBanner');
    var statusLed = document.getElementById('statusLed');
    var statusText = document.getElementById('statusText');
    var headerStatus = document.getElementById('headerStatus');
    var toastEl = document.getElementById('toast');
    var toastMsg = document.getElementById('toastMsg');
    var toastDetail = document.getElementById('toastDetail');
    var ordersPanel = document.getElementById('ordersPanel');
    var btnToggleOrders = document.getElementById('btnToggleOrders');

    // === TOGGLE PANNELLO ORDINI ===
    function toggleOrdersPanel() {
      ordersPanelVisible = !ordersPanelVisible;
      ordersPanel.classList.toggle('collapsed', !ordersPanelVisible);
      btnToggleOrders.classList.toggle('active', ordersPanelVisible);
    }

    // === SOCKET.IO ===
    var socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    socket.on('connect', function () {
      connected = true;
      socket.emit('register', { role: 'controllo' });
      offlineBanner.classList.remove('visible');
      statusLed.className = 'status-led on';
      headerStatus.className = 'header-status online';
      statusText.textContent = 'Connesso';
      setKeypadEnabled(true);
    });

    socket.on('disconnect', function () {
      connected = false;
      offlineBanner.classList.add('visible');
      statusLed.className = 'status-led off';
      headerStatus.className = 'header-status offline';
      statusText.textContent = 'Offline';
      setKeypadEnabled(false);
    });

    // === LISTA ORDINI APERTI ===
    socket.on('open_orders_update', function (data) {
      renderOpenOrders(data.orders);
    });

    function renderOpenOrders(orders) {
      ordersCount.textContent = orders.length;

      if (orders.length === 0) {
        ordersList.innerHTML =
          '<div class="orders-empty">' +
            '<div class="orders-empty-text">Nessun ordine aperto</div>' +
          '</div>';
        return;
      }

      var sorted = orders.slice().sort(function (a, b) {
        return (a.created_at || a.id) - (b.created_at || b.id);
      });

      ordersList.innerHTML = sorted.map(function (o) {
        var summary = o.items_summary || '';
        var nameTag = o.customer_name ? '<span class="order-name">' + escHTML(o.customer_name) + '</span>' : '';
        var asportoTag = o.asporto ? '<span class="order-tag-asporto">ASPORTO</span>' : '';
        var tableTag = o.table > 0 ? '<span class="order-table">Tav.' + o.table + '</span>' : '';

        return '<div class="order-row" data-id="' + o.id + '">' +
          '<div class="order-info">' +
            '<div class="order-meta">' +
              '<span class="order-id">' + o.id + '</span>' +
              tableTag +
              asportoTag +
              nameTag +
            '</div>' +
            '<div class="order-items">' + escHTML(summary) + '</div>' +
          '</div>' +
          '<button class="btn-cancel" onclick="cancelOrder(' + o.id + ')">Annulla</button>' +
        '</div>';
      }).join('');
    }

    function escHTML(str) {
      var d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // === ANNULLAMENTO ORDINE ===
    async function cancelOrder(orderId) {
      if (!connected) return;
      if (!confirm('Annullare l\'ordine ' + orderId + '?')) return;

      try {
        var res = await fetch('/api/orders/' + orderId + '/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        var data = await res.json();

        if (data.success) {
          var row = document.querySelector('.order-row[data-id="' + orderId + '"]');
          if (row) row.classList.add('removing');
          showToast('success', 'Ordine ' + data.order_number + ' annullato', data.table ? 'Tav.' + data.table : '');
        } else if (data.already_cancelled) {
          showToast('warning', 'Ordine ' + orderId + ' gia\u0300 annullato');
        } else {
          showToast('error', data.error || 'Errore annullamento');
        }
      } catch (err) {
        showToast('error', 'Errore di rete');
      }
    }

    // === DISPLAY E TASTIERINO ===
    function updateDisplay() {
      if (inputBuffer.length === 0) {
        displayValue.textContent = '\u2014';
        displayValue.classList.add('placeholder');
        btnEvadi.classList.add('disabled');
      } else {
        displayValue.textContent = inputBuffer;
        displayValue.classList.remove('placeholder');
        btnEvadi.classList.remove('disabled');
      }
    }

    function pressKey(digit) {
      if (!connected || submitting) return;
      if (inputBuffer.length >= 5) return;
      inputBuffer += digit;
      updateDisplay();
    }

    function pressClear() {
      if (submitting) return;
      inputBuffer = '';
      updateDisplay();
    }

    // === EVASIONE ORDINE ===
    async function pressEvadi() {
      if (!connected || submitting || inputBuffer.length === 0) return;

      var orderNumber = parseInt(inputBuffer, 10);
      submitting = true;

      try {
        var res = await fetch('/api/orders/' + orderNumber + '/fulfill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        var data = await res.json();

        if (data.success) {
          var tableInfo = data.table ? ' \u2014 Tav.' + data.table : '';
          showToast('success', 'Ordine ' + data.order_number + ' evaso' + tableInfo);
          lastFulfilled.textContent = 'Ultimo evaso: ' + data.order_number + tableInfo + ' \u2713';
        } else if (data.not_ready) {
          var details = data.missing.map(function (m) {
            return m.piece + ' (servono ' + m.needed + ', disponibili ' + m.available + ')';
          }).join(', ');
          showToast('error', 'Non abbastanza scorte', details);
        } else if (data.already_fulfilled) {
          var tblInfo = data.table ? ' \u2014 Tav.' + data.table : '';
          showToast('warning', 'Ordine ' + data.order_number + ' gia\u0300 evaso' + tblInfo);
        } else {
          showToast('error', 'Ordine non trovato');
        }
      } catch (err) {
        showToast('error', 'Errore di rete');
      }

      inputBuffer = '';
      updateDisplay();
      submitting = false;
    }

    // === TOAST FEEDBACK ===
    function showToast(type, message, detail) {
      if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
      toastEl.className = 'toast toast-' + type + ' visible';
      toastMsg.textContent = message;
      toastDetail.textContent = detail || '';
      toastDetail.style.display = detail ? 'block' : 'none';
      toastTimer = setTimeout(function () {
        toastEl.classList.remove('visible');
        toastTimer = null;
      }, 3000);
    }

    // === ABILITA/DISABILITA TASTIERINO ===
    function setKeypadEnabled(enabled) {
      var keys = document.querySelectorAll('.key');
      for (var i = 0; i < keys.length; i++) {
        keys[i].style.opacity = enabled ? '' : '0.25';
        keys[i].style.pointerEvents = enabled ? '' : 'none';
      }
      var cancels = document.querySelectorAll('.btn-cancel');
      for (var j = 0; j < cancels.length; j++) {
        cancels[j].style.opacity = enabled ? '' : '0.25';
        cancels[j].style.pointerEvents = enabled ? '' : 'none';
      }
    }

    // === TASTIERA FISICA ===
    document.addEventListener('keydown', function (e) {
      if (!connected || submitting) return;
      if (e.key >= '0' && e.key <= '9') {
        pressKey(e.key);
      } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === 'Escape') {
        e.preventDefault();
        pressClear();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        pressEvadi();
      }
    });
  </script>
<script src="/js/sidebar.js"></script>
</body>
</html>
