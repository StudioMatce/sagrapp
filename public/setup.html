<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SagrApp — Setup Wizard</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060a12;
      --card: #111827;
      --border: #1e293b;
      --green: #4ecca3;
      --red: #e94560;
      --yellow: #ffd93d;
      --gray: #6c7a89;
      --text: #e2e8f0;
      --text-dim: rgba(226, 232, 240, 0.45);
      --text-mid: rgba(226, 232, 240, 0.65);
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(78, 204, 163, 0.04) 0%, transparent 50%),
        var(--bg);
    }

    .wizard {
      width: 100%;
      max-width: 540px;
    }

    .wizard-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--green);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: var(--bg);
      margin-bottom: 12px;
    }

    .wizard-title {
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.01em;
    }

    .wizard-sub {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ===== CHECK LIST ===== */
    .check-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .check-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      transition: border-color 300ms ease;
    }

    .check-item.ok { border-color: rgba(78, 204, 163, 0.3); }
    .check-item.fail { border-color: rgba(233, 69, 96, 0.3); }

    .check-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .check-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
      font-weight: 800;
      transition: all 300ms ease;
    }

    .check-icon.waiting {
      background: rgba(108, 122, 137, 0.15);
      color: var(--gray);
    }

    .check-icon.running {
      background: rgba(78, 204, 163, 0.1);
      border: 2px solid var(--green);
      animation: spin 800ms linear infinite;
    }

    .check-icon.ok {
      background: rgba(78, 204, 163, 0.15);
      color: var(--green);
    }

    .check-icon.fail {
      background: rgba(233, 69, 96, 0.15);
      color: var(--red);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .check-label {
      font-weight: 600;
      font-size: 15px;
      flex: 1;
    }

    .check-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .check-status.waiting { color: var(--gray); }
    .check-status.running { color: var(--green); }
    .check-status.ok { color: var(--green); }
    .check-status.fail { color: var(--red); }

    /* Dettagli espandibili (es. lista stampanti) */
    .check-details {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: none;
    }

    .check-details.visible { display: block; }

    .printer-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 13px;
    }

    .printer-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .printer-led.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .printer-led.off { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .printer-led.unknown { background: var(--gray); }

    .printer-name { font-weight: 500; color: var(--text-mid); flex: 1; }

    .printer-ip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Retry button inline */
    .btn-retry {
      margin-top: 10px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(233, 69, 96, 0.3);
      background: rgba(233, 69, 96, 0.08);
      color: var(--red);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .btn-retry:hover {
      background: rgba(233, 69, 96, 0.2);
      border-color: var(--red);
    }

    /* ===== RESULT BANNER ===== */
    .result-banner {
      text-align: center;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
    }

    .result-banner.visible { display: block; }

    .result-banner.all-ok {
      background: rgba(78, 204, 163, 0.1);
      border: 1px solid rgba(78, 204, 163, 0.25);
    }

    .result-banner.has-errors {
      background: rgba(233, 69, 96, 0.08);
      border: 1px solid rgba(233, 69, 96, 0.2);
    }

    .result-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .result-text {
      font-weight: 700;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .result-banner.all-ok .result-text { color: var(--green); }
    .result-banner.has-errors .result-text { color: var(--red); }

    /* ===== BUTTONS ===== */
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 150ms ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--green);
      border: none;
      color: var(--bg);
    }

    .btn-primary:hover { box-shadow: 0 0 20px rgba(78, 204, 163, 0.3); }

    .btn-primary.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-mid);
    }

    .btn-secondary:hover {
      border-color: rgba(78, 204, 163, 0.3);
      color: var(--green);
    }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap {
      margin-bottom: 20px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .progress-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .progress-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--green);
      transition: color 300ms ease;
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--green);
      border-radius: 3px;
      transition: width 400ms ease, background 300ms ease;
    }

    .progress-fill.has-errors {
      background: var(--yellow);
    }

    /* ===== CHECK ITEM: warn (per dispositivi non critici) ===== */
    .check-item.warn { border-color: rgba(255, 217, 61, 0.3); }
    .check-icon.warn {
      background: rgba(255, 217, 61, 0.15);
      color: var(--yellow);
    }
    .check-status.warn { color: var(--yellow); }

    /* ===== PRINTER: response time e suggerimento ===== */
    .printer-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--green);
      margin-left: 4px;
    }

    .printer-hint {
      font-size: 11px;
      color: var(--red);
      opacity: 0.8;
      padding: 2px 0 2px 16px;
    }

    /* ===== DEVICE DETAIL ROWS (monitor, scaldavivande, controllo) ===== */
    .device-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 13px;
    }

    .device-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .device-led.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .device-led.off { background: var(--yellow); }

    .device-name { font-weight: 500; color: var(--text-mid); flex: 1; }

    .device-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ===== BUTTON: warn variant (Avvia con limitazioni) ===== */
    .btn-warn {
      background: transparent;
      border: 1px solid rgba(255, 217, 61, 0.4);
      color: var(--yellow);
    }

    .btn-warn:hover {
      background: rgba(255, 217, 61, 0.1);
      box-shadow: 0 0 16px rgba(255, 217, 61, 0.15);
    }

    .btn-warn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* ===== RESULT BANNER: warn ===== */
    .result-banner.partial-ok {
      background: rgba(255, 217, 61, 0.08);
      border: 1px solid rgba(255, 217, 61, 0.2);
    }
    .result-banner.partial-ok .result-text { color: var(--yellow); }
  </style>
</head>
<body>

  <div class="wizard">
    <div class="wizard-header">
      <div class="logo-mark">S</div>
      <div class="wizard-title">Pre-flight Check</div>
      <div class="wizard-sub">Verifica automatica prima di iniziare il turno</div>
    </div>

    <!-- Barra di progresso -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-header">
        <span class="progress-label">Stato verifica</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="check-list" id="checkList">
      <!-- Check 1: Server -->
      <div class="check-item" id="check-server">
        <div class="check-top">
          <div class="check-icon waiting" id="icon-server">&bull;</div>
          <span class="check-label">Server connesso</span>
          <span class="check-status waiting" id="status-server">In attesa</span>
        </div>
      </div>

      <!-- Check 2: Socket.IO -->
      <div class="check-item" id="check-socket">
        <div class="check-top">
          <div class="check-icon waiting" id="icon-socket">&bull;</div>
          <span class="check-label">Socket.IO connesso</span>
          <span class="check-status waiting" id="status-socket">In attesa</span>
        </div>
      </div>

      <!-- Check 3: Print proxy -->
      <div class="check-item" id="check-proxy">
        <div class="check-top">
          <div class="check-icon waiting" id="icon-proxy">&bull;</div>
          <span class="check-label">Print proxy online</span>
          <span class="check-status waiting" id="status-proxy">In attesa</span>
        </div>
      </div>

      <!-- Check 4: Stampanti -->
      <div class="check-item" id="check-printers">
        <div class="check-top">
          <div class="check-icon waiting" id="icon-printers">&bull;</div>
          <span class="check-label">Stampanti raggiungibili</span>
          <span class="check-status waiting" id="status-printers">In attesa</span>
        </div>
        <div class="check-details" id="printerDetails">
          <!-- Popolato da JS -->
        </div>
      </div>

      <!-- Check 5: Dispositivi Socket.IO (monitor, scaldavivande, controllo) -->
      <div class="check-item" id="check-devices">
        <div class="check-top">
          <div class="check-icon waiting" id="icon-devices">&bull;</div>
          <span class="check-label">Dispositivi connessi</span>
          <span class="check-status waiting" id="status-devices">In attesa</span>
        </div>
        <div class="check-details" id="deviceDetails">
          <!-- Popolato da JS -->
        </div>
      </div>
    </div>

    <!-- Risultato -->
    <div class="result-banner" id="resultBanner">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-text" id="resultText"></div>
    </div>

    <!-- Pulsanti -->
    <div class="btn-row">
      <a href="/" class="btn btn-primary disabled" id="btnStart">Avvia Servizio</a>
      <button class="btn btn-warn disabled" id="btnStartPartial" style="display:none" onclick="window.location='/'">Avvia con limitazioni</button>
      <button class="btn btn-secondary" id="btnRestart" onclick="runAllChecks()">Riavvia check</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket = null;
    let deviceStatus = null;
    const TOTAL_CHECKS = 5; // server, socket, proxy, printers, devices
    let completedChecks = 0;

    // Stato dei check
    const checks = {
      server: 'waiting',
      socket: 'waiting',
      proxy: 'waiting',
      printers: 'waiting',
      devices: 'waiting',
    };

    // Critici: server, proxy, almeno 1 stampante. Non critici: devices
    const CRITICAL = ['server', 'socket', 'proxy', 'printers'];

    function updateProgress() {
      completedChecks = Object.values(checks).filter(s => s === 'ok' || s === 'fail' || s === 'warn').length;
      const pct = Math.round((completedChecks / TOTAL_CHECKS) * 100);
      document.getElementById('progressPct').textContent = pct + '%';
      const fill = document.getElementById('progressFill');
      fill.style.width = pct + '%';
      const hasErrors = Object.values(checks).some(s => s === 'fail');
      fill.classList.toggle('has-errors', hasErrors);
    }

    function setCheckState(id, state, label) {
      checks[id] = state;
      const icon = document.getElementById('icon-' + id);
      const status = document.getElementById('status-' + id);
      const item = document.getElementById('check-' + id);

      icon.className = 'check-icon ' + state;
      status.className = 'check-status ' + state;

      if (state === 'waiting') { icon.innerHTML = '&bull;'; status.textContent = 'In attesa'; }
      else if (state === 'running') { icon.innerHTML = ''; status.textContent = 'Verifica...'; }
      else if (state === 'ok') { icon.innerHTML = '&#10003;'; status.textContent = label || 'OK'; }
      else if (state === 'fail') { icon.innerHTML = '&#10007;'; status.textContent = label || 'Errore'; }
      else if (state === 'warn') { icon.innerHTML = '&#9888;'; status.textContent = label || 'Parziale'; }

      item.className = 'check-item' + (state === 'ok' ? ' ok' : state === 'fail' ? ' fail' : state === 'warn' ? ' warn' : '');
      updateProgress();
    }

    function showResult() {
      const allOk = Object.values(checks).every(s => s === 'ok' || s === 'warn');
      const criticalOk = CRITICAL.every(id => checks[id] === 'ok');
      const hasError = Object.values(checks).some(s => s === 'fail');
      const allDone = Object.values(checks).every(s => s !== 'waiting' && s !== 'running');

      if (!allDone) return;

      const banner = document.getElementById('resultBanner');
      const icon = document.getElementById('resultIcon');
      const text = document.getElementById('resultText');
      const btnFull = document.getElementById('btnStart');
      const btnPartial = document.getElementById('btnStartPartial');

      banner.classList.add('visible');

      if (allOk && !hasError) {
        banner.className = 'result-banner visible all-ok';
        icon.textContent = '\u2713';
        text.textContent = 'Tutto OK \u2014 Pronto';
        btnFull.classList.remove('disabled');
        btnPartial.style.display = 'none';
      } else if (criticalOk) {
        // Critici ok ma dispositivi non critici mancano
        banner.className = 'result-banner visible partial-ok';
        icon.textContent = '\u26A0';
        text.textContent = 'Dispositivi non critici mancanti';
        btnFull.classList.add('disabled');
        btnPartial.style.display = '';
        btnPartial.classList.remove('disabled');
      } else {
        banner.className = 'result-banner visible has-errors';
        icon.textContent = '!';
        text.textContent = 'Problemi critici rilevati';
        btnFull.classList.add('disabled');
        btnPartial.style.display = 'none';
      }
    }

    // === CHECK 1: Server HTTP ===
    async function checkServer() {
      setCheckState('server', 'running');
      try {
        const res = await fetch('/api/menu');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        setCheckState('server', 'ok', data.length + ' piatti');
        return true;
      } catch (err) {
        setCheckState('server', 'fail', err.message);
        return false;
      }
    }

    // === CHECK 2: Socket.IO ===
    function checkSocket() {
      return new Promise((resolve) => {
        setCheckState('socket', 'running');

        if (socket) {
          socket.disconnect();
          socket = null;
        }

        socket = io(window.location.origin, {
          reconnection: false,
          timeout: 5000,
        });

        const timeout = setTimeout(() => {
          setCheckState('socket', 'fail', 'Timeout');
          socket.disconnect();
          resolve(false);
        }, 6000);

        socket.on('connect', () => {
          clearTimeout(timeout);
          socket.emit('register', { role: 'dashboard' });
          setCheckState('socket', 'ok');
          resolve(true);
        });

        socket.on('connect_error', (err) => {
          clearTimeout(timeout);
          setCheckState('socket', 'fail', 'Errore connessione');
          resolve(false);
        });
      });
    }

    // === CHECK 3: Print proxy ===
    function checkProxy() {
      return new Promise((resolve) => {
        setCheckState('proxy', 'running');

        if (!socket || !socket.connected) {
          setCheckState('proxy', 'fail', 'Socket non connesso');
          resolve(false);
          return;
        }

        const timeout = setTimeout(() => {
          setCheckState('proxy', 'fail', 'Nessun proxy rilevato');
          resolve(false);
        }, 5000);

        // Ascolta l'evento device_status che arriva dopo register
        socket.on('device_status', function handler(data) {
          deviceStatus = data.devices;
          clearTimeout(timeout);
          socket.off('device_status', handler);

          if (deviceStatus.proxy >= 1) {
            setCheckState('proxy', 'ok', deviceStatus.proxy + ' proxy connesso');
            resolve(true);
          } else {
            setCheckState('proxy', 'fail', 'Proxy offline');
            resolve(false);
          }
        });
      });
    }

    // === CHECK 4: Stampanti ===
    function checkPrinters() {
      return new Promise((resolve) => {
        setCheckState('printers', 'running');

        if (!socket || !socket.connected) {
          setCheckState('printers', 'fail', 'Socket non connesso');
          resolve(false);
          return;
        }

        const timeout = setTimeout(() => {
          setCheckState('printers', 'fail', 'Timeout ping');
          resolve(false);
        }, 10000);

        socket.on('printers_status_update', function handler(statuses) {
          clearTimeout(timeout);
          socket.off('printers_status_update', handler);

          const details = document.getElementById('printerDetails');
          details.classList.add('visible');

          details.innerHTML = statuses.map(p => {
            let html = '<div class="printer-row">' +
              '<div class="printer-led ' + (p.online ? 'on' : 'off') + '"></div>' +
              '<span class="printer-name">' + (p.name || p.id) + '</span>' +
              '<span class="printer-ip">' + (p.ip || '') + '</span>' +
              (p.online ? '<span class="printer-time">OK</span>' : '') +
            '</div>';
            if (!p.online) {
              html += '<div class="printer-hint">Verifica che sia accesa e collegata al Powerline con cavo LAN</div>';
            }
            return html;
          }).join('');

          const allOnline = statuses.every(s => s.online);
          const onlineCount = statuses.filter(s => s.online).length;

          if (allOnline) {
            setCheckState('printers', 'ok', onlineCount + '/' + statuses.length);
          } else {
            setCheckState('printers', 'fail', onlineCount + '/' + statuses.length + ' online');
          }
          resolve(allOnline);
        });

        socket.emit('request_printer_check');
      });
    }

    // === CHECK 5: Dispositivi connessi (non critici) ===
    function checkDevices() {
      return new Promise((resolve) => {
        setCheckState('devices', 'running');

        if (!socket || !socket.connected) {
          setCheckState('devices', 'warn', 'Socket non connesso');
          resolve(false);
          return;
        }

        // Aspetta un po' per ricevere device_status aggiornato
        const timeout = setTimeout(() => {
          evaluateDevices();
          resolve(true);
        }, 3000);

        socket.on('device_status', function handler(data) {
          deviceStatus = data.devices;
          clearTimeout(timeout);
          socket.off('device_status', handler);
          evaluateDevices();
          resolve(true);
        });

        // Richiedi stato
        socket.emit('register', { role: 'dashboard' });
      });

      function evaluateDevices() {
        const details = document.getElementById('deviceDetails');
        details.classList.add('visible');

        const devs = [
          { key: 'monitor', name: 'Monitor cuochi' },
          { key: 'scaldavivande', name: 'Tablet scaldavivande' },
          { key: 'controllo', name: 'Tablet zona controllo' },
        ];

        const ds = deviceStatus || {};
        details.innerHTML = devs.map(d => {
          const count = ds[d.key] || 0;
          const online = count > 0;
          return '<div class="device-row">' +
            '<div class="device-led ' + (online ? 'on' : 'off') + '"></div>' +
            '<span class="device-name">' + d.name + '</span>' +
            '<span class="device-count">' + (online ? count + ' connesso' : 'Offline') + '</span>' +
          '</div>';
        }).join('');

        const allOnline = devs.every(d => (ds[d.key] || 0) > 0);
        const onlineCount = devs.filter(d => (ds[d.key] || 0) > 0).length;

        if (allOnline) {
          setCheckState('devices', 'ok', onlineCount + '/' + devs.length);
        } else if (onlineCount > 0) {
          setCheckState('devices', 'warn', onlineCount + '/' + devs.length + ' connessi');
        } else {
          setCheckState('devices', 'warn', 'Nessun dispositivo');
        }
      }
    }

    // === ESEGUI TUTTI I CHECK ===
    async function runAllChecks() {
      // Reset
      completedChecks = 0;
      document.getElementById('resultBanner').classList.remove('visible');
      document.getElementById('btnStart').classList.add('disabled');
      document.getElementById('btnStartPartial').style.display = 'none';
      document.getElementById('printerDetails').classList.remove('visible');
      document.getElementById('deviceDetails').classList.remove('visible');

      ['server', 'socket', 'proxy', 'printers', 'devices'].forEach(id => setCheckState(id, 'waiting'));
      updateProgress();

      // Sequenza: critici prima
      const serverOk = await checkServer();
      if (!serverOk) { setCheckState('devices', 'fail', 'Server offline'); showResult(); return; }

      const socketOk = await checkSocket();
      if (!socketOk) { setCheckState('devices', 'fail', 'Socket offline'); showResult(); return; }

      const proxyOk = await checkProxy();

      // Stampanti e dispositivi in parallelo
      await Promise.all([checkPrinters(), checkDevices()]);

      showResult();
    }

    // Auto-start
    runAllChecks();
  </script>
<script src="/js/sidebar.js"></script>
</body>
</html>
