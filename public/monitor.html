<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SagrApp — Monitor Cuochi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #060a12;
      color: #f0f4f8;
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      cursor: default;
    }

    /* La griglia prende tutto lo schermo */
    .board {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2vh 4vw;
      gap: 0;
    }

    /* Riga header con nomi colonne */
    .header-row {
      display: flex;
      align-items: flex-end;
      padding: 0 2vw 1vh;
      flex-shrink: 0;
    }

    .col-spacer {
      flex: 1;
    }

    .col-label {
      width: clamp(80px, 14vw, 200px);
      flex-shrink: 0;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(11px, 1.5vw, 20px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(240, 244, 248, 0.35);
    }

    /* Ogni riga è un piatto */
    .row {
      display: flex;
      align-items: center;
      flex: 1;
      max-height: 14vh;
      padding: 0 2vw;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      transition: background 200ms ease;
    }

    .row:last-child { border-bottom: none; }

    .row.flash {
      background: rgba(78, 204, 163, 0.08);
    }

    /* Nome piatto — grande, bold, a sinistra */
    .dish-name {
      flex: 1;
      font-weight: 700;
      font-size: clamp(22px, 3vw, 40px);
      letter-spacing: -0.01em;
      color: rgba(240, 244, 248, 0.7);
      text-transform: uppercase;
    }

    /* Numeri — 3 colonne a destra */
    .dish-count {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(48px, 7vw, 100px);
      line-height: 1;
      color: #ffffff;
      width: clamp(80px, 14vw, 200px);
      flex-shrink: 0;
      text-align: center;
      transition: color 200ms ease, text-shadow 200ms ease;
      text-shadow: 0 0 40px rgba(78, 204, 163, 0.12);
    }

    .dish-count.changed {
      text-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
    }

    /* Colori per "da cucinare" */
    .dish-count.cook-green { color: #4ecca3; }
    .dish-count.cook-yellow { color: #ffd93d; }
    .dish-count.cook-red { color: #e94560; }

    /* Indicatore connessione — angolo in basso a destra, minimo */
    .conn-dot {
      position: fixed;
      bottom: 1.5vh;
      right: 2vw;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6c7a89;
      transition: background 300ms ease, box-shadow 300ms ease;
      z-index: 100;
    }

    .conn-dot.online {
      background: #4ecca3;
      box-shadow: 0 0 8px #4ecca3;
      animation: dot-pulse 2.5s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Overlay connessione persa — a tutto schermo, impossibile da ignorare */
    .lost-overlay {
      position: fixed;
      inset: 0;
      background: rgba(233, 69, 96, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms ease;
    }

    .lost-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .lost-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: clamp(36px, 7vw, 80px);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fff;
      text-align: center;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
    }

    .lost-sub {
      font-size: clamp(14px, 2vw, 24px);
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-top: 1vh;
      opacity: 0.8;
    }

    /* Fullscreen hint (appare solo se ?mode=fullscreen) */
    .fs-hint {
      position: fixed;
      inset: 0;
      background: rgba(6, 10, 18, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      cursor: pointer;
    }

    .fs-hint-text {
      font-size: clamp(20px, 3vw, 36px);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      line-height: 1.6;
    }

    .fs-hint.hidden { display: none; }
  </style>
</head>
<body>

  <!-- Overlay fullscreen (se ?mode=fullscreen) -->
  <div class="fs-hint hidden" id="fsHint">
    <div class="fs-hint-text">Tocca per<br>schermo intero</div>
  </div>

  <!-- Overlay connessione persa -->
  <div class="lost-overlay" id="lostOverlay">
    <div>
      <div class="lost-text">CONNESSIONE PERSA</div>
      <div class="lost-text lost-sub">Riconnessione in corso&hellip;</div>
    </div>
  </div>

  <!-- Indicatore connessione -->
  <div class="conn-dot" id="connDot"></div>

  <!-- Tabellone -->
  <div class="board" id="board">
    <!-- Generato da JS -->
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Piatti da mostrare (con etichette leggibili)
    const ITEMS = [
      { id: 'bistecca',   label: 'Bistecca' },
      { id: 'costine',    label: 'Costine' },
      { id: 'salsiccia',  label: 'Salsiccia' },
      { id: 'spiedini',   label: 'Spiedini' },
      { id: 'pasta_ragu', label: 'Pasta Ragu' },
      { id: 'birra_media',label: 'Birra Media' },
    ];

    // Stato contatori — 3 colonne: pronto (scaldavivande), vendute (cassa)
    // da_cucinare = vendute - pronto (calcolato)
    const counters = {};
    ITEMS.forEach(i => { counters[i.id] = { pronto: 0, vendute: 0 }; });

    // Genera il tabellone con header + righe
    const board = document.getElementById('board');
    board.innerHTML = `
      <div class="header-row">
        <span class="col-spacer"></span>
        <span class="col-label">Da cucinare</span>
        <span class="col-label">Pronto</span>
        <span class="col-label">Vendute</span>
      </div>
    ` + ITEMS.map(item => `
      <div class="row" id="row-${item.id}">
        <span class="dish-name">${item.label}</span>
        <span class="dish-count cook-green" id="cook-${item.id}">0</span>
        <span class="dish-count" id="ready-${item.id}">0</span>
        <span class="dish-count" id="sold-${item.id}">0</span>
      </div>
    `).join('');

    // Socket.IO
    const socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    const connDot = document.getElementById('connDot');
    const lostOverlay = document.getElementById('lostOverlay');

    socket.on('connect', () => {
      socket.emit('register', { role: 'monitor' });
      connDot.classList.add('online');
      lostOverlay.classList.remove('visible');
    });

    socket.on('disconnect', () => {
      connDot.classList.remove('online');
      lostOverlay.classList.add('visible');
    });

    // Aggiornamento contatori — 3 colonne
    socket.on('counters_changed', ({ counters: newCounters }) => {
      ITEMS.forEach(item => {
        const oldData = counters[item.id];
        const newData = newCounters[item.id];
        if (!newData) return;

        const oldPronto = oldData.pronto;
        const oldVendute = oldData.vendute;
        const newPronto = newData.pronto;
        const newVendute = newData.vendute;

        // Aggiorna stato locale
        counters[item.id] = { pronto: newPronto, vendute: newVendute };

        // Calcola "da cucinare"
        const oldCook = Math.max(0, oldVendute - oldPronto);
        const newCook = Math.max(0, newVendute - newPronto);

        const cookEl = document.getElementById(`cook-${item.id}`);
        const readyEl = document.getElementById(`ready-${item.id}`);
        const soldEl = document.getElementById(`sold-${item.id}`);
        const row = document.getElementById(`row-${item.id}`);

        // Aggiorna valori
        cookEl.textContent = newCook;
        readyEl.textContent = newPronto;
        soldEl.textContent = newVendute;

        // Colore "da cucinare": verde=0, giallo=1-10, rosso=>10
        cookEl.classList.remove('cook-green', 'cook-yellow', 'cook-red');
        if (newCook === 0) cookEl.classList.add('cook-green');
        else if (newCook <= 10) cookEl.classList.add('cook-yellow');
        else cookEl.classList.add('cook-red');

        // Flash se qualcosa è cambiato
        if (newCook !== oldCook || newPronto !== oldPronto || newVendute !== oldVendute) {
          row.classList.add('flash');
          if (newCook !== oldCook) flashEl(cookEl);
          if (newPronto !== oldPronto) flashEl(readyEl);
          if (newVendute !== oldVendute) flashEl(soldEl);
          setTimeout(() => row.classList.remove('flash'), 400);
        }
      });
    });

    function flashEl(el) {
      el.classList.add('changed');
      setTimeout(() => el.classList.remove('changed'), 400);
    }

    // Fullscreen mode (?mode=fullscreen)
    const params = new URLSearchParams(window.location.search);
    if (params.get('mode') === 'fullscreen') {
      const hint = document.getElementById('fsHint');
      hint.classList.remove('hidden');

      hint.addEventListener('click', () => {
        hint.classList.add('hidden');
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else if (document.documentElement.webkitRequestFullscreen) {
          document.documentElement.webkitRequestFullscreen();
        }
      });
    }
  </script>
</body>
</html>
