<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SagrApp — Cassa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060a12;
      color: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== LAYOUT PRINCIPALE: 70% piatti + 30% colonna ordine ===== */
    .app-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== AREA PIATTI (sinistra, 70%) ===== */
    .menu-area {
      flex: 7;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* ===== COLONNA ORDINE (destra, 30%) ===== */
    .order-column {
      flex: 3;
      min-width: 320px;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.015);
    }

    /* ===== TAB BAR (CIBO / BEVANDE) ===== */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 8px;
      border: 1.5px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      color: rgba(240, 244, 248, 0.45);
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 150ms ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn:active { transform: scale(0.97); }

    .tab-btn.active {
      background: rgba(78, 204, 163, 0.1);
      border-color: rgba(78, 204, 163, 0.35);
      color: #4ecca3;
    }

    .tab-btn .tab-icon { font-size: 16px; }

    /* Badge contatore sulle tab (es. "BEVANDE (3)") */
    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 10px;
      background: #4ecca3;
      color: #060a12;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 11px;
      line-height: 1;
    }

    .tab-badge.hidden { display: none; }

    /* Checkmark sulla tab con piatti selezionati */
    .tab-check {
      font-size: 14px;
      margin-left: -2px;
      display: none;
    }

    .tab-check.visible { display: inline; }

    /* Separatore tab → status */
    .tab-spacer { flex: 1; }

    .tab-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #6c7a89;
    }

    .tab-status.online { color: #4ecca3; }
    .tab-status.offline { color: #e94560; }

    .status-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6c7a89;
      transition: all 200ms ease;
    }

    .status-led.on { background: #4ecca3; box-shadow: 0 0 6px #4ecca3; }
    .status-led.off { background: #e94560; box-shadow: 0 0 6px #e94560; }

    /* ===== DUE COLONNE MENU (cibo sx, contorni+bevande dx) ===== */
    .menu-columns {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .menu-col {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 4px 8px 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .menu-col::-webkit-scrollbar { width: 4px; }
    .menu-col::-webkit-scrollbar-track { background: transparent; }
    .menu-col::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .menu-col-left {
      border-right: 1px solid rgba(255, 255, 255, 0.10);
    }

    .bevande-disabled {
      opacity: 0.25;
      pointer-events: none;
    }

    /* Pannello ordini (alternativo alle colonne) */
    .menu-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 10px 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .menu-scroll::-webkit-scrollbar { width: 6px; }
    .menu-scroll::-webkit-scrollbar-track { background: transparent; }
    .menu-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    /* ===== BOX CATEGORIA ===== */
    .category-box {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .section-header {
      padding: 10px 12px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #4ecca3;
      background: rgba(78, 204, 163, 0.06);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* ===== RIGA PIATTO ===== */
    .menu-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      transition: all 120ms ease;
      min-height: 44px;
    }

    .menu-row:last-child { border-bottom: none; }

    /* Linea spessa tra sotto-gruppi bevande (come nella comanda cartacea) */
    .menu-row.group-first {
      border-top: 2px solid rgba(255, 255, 255, 0.18);
      margin-top: 2px;
    }

    .menu-row:active {
      background: rgba(255, 255, 255, 0.05);
    }

    .menu-row.active {
      background: rgba(78, 204, 163, 0.10);
    }

    .menu-row.exhausted {
      opacity: 0.4;
      pointer-events: none;
    }

    .menu-row.exhausted .row-stepper { visibility: hidden; }

    .row-exhausted-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(239, 68, 68, 0.18);
      color: #f87171;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .row-name {
      flex: 1;
      font-weight: 500;
      font-size: 15px;
      color: rgba(240, 244, 248, 0.88);
      line-height: 1.15;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .menu-row.active .row-name {
      color: #f0f4f8;
      font-weight: 600;
    }

    .row-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      color: rgba(78, 204, 163, 0.7);
      white-space: nowrap;
    }

    .menu-row.active .row-price {
      color: #4ecca3;
    }

    /* ===== STEPPER [-] 0 [+] ===== */
    .row-stepper {
      display: flex;
      align-items: center;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.10);
      flex-shrink: 0;
    }

    .step-btn {
      width: 38px;
      height: 36px;
      background: rgba(255, 255, 255, 0.04);
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 80ms ease;
      line-height: 1;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .step-btn:active { background: rgba(255, 255, 255, 0.1); }
    .step-minus { color: #e94560; border-right: 1px solid rgba(255, 255, 255, 0.04); }
    .step-plus { color: #4ecca3; border-left: 1px solid rgba(255, 255, 255, 0.04); }

    .step-count {
      width: 30px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.9);
      height: 36px;
      line-height: 36px;
      background: rgba(255, 255, 255, 0.015);
      transition: color 150ms ease;
    }

    .step-count.zero { color: rgba(255, 255, 255, 0.12); }

    /* ===== COLONNA ORDINE ===== */
    .order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .order-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 18px;
      color: rgba(240, 244, 248, 0.7);
      letter-spacing: 0.02em;
    }

    .order-last {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: rgba(78, 204, 163, 0.65);
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .order-last.visible { opacity: 1; }

    /* ===== FORM ORDINE ===== */
    .order-form {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .form-row {
      display: flex;
      gap: 8px;
    }

    .form-field {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 8px 10px;
      transition: border-color 200ms ease;
    }

    .form-field:focus-within {
      border-color: rgba(78, 204, 163, 0.3);
    }

    .form-field.flex-1 { flex: 1; }

    .form-field.error {
      border-color: #e94560;
      animation: shake 300ms ease;
    }

    @keyframes shake {
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }

    .field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: rgba(240, 244, 248, 0.45);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .form-field input[type="text"] {
      flex: 1;
      width: 100%;
      min-width: 0;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 600;
    }

    .form-field input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.12); }

    .form-field input[type="number"] {
      width: 44px;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
      -moz-appearance: textfield;
    }

    .form-field input[type="number"]::-webkit-outer-spin-button,
    .form-field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .form-field input[type="number"]::placeholder { color: rgba(255, 255, 255, 0.12); }

    /* ===== FLAG OMAGGIO ===== */
    .courtesy-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .courtesy-flags {
      display: flex;
      gap: 6px;
    }

    .flag-btn {
      flex: 1;
      padding: 8px 4px;
      border-radius: 8px;
      border: 1.5px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.45);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 120ms ease;
      touch-action: manipulation;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }

    .flag-btn:active { transform: scale(0.95); }

    .flag-btn.active {
      border-color: #ffd93d;
      background: rgba(255, 217, 61, 0.1);
      color: #ffd93d;
      box-shadow: 0 0 12px rgba(255, 217, 61, 0.08);
    }

    /* ===== TOGGLE ASPORTO ===== */
    .asporto-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .asporto-label {
      font-size: 14px;
      font-weight: 600;
      color: rgba(240, 244, 248, 0.55);
      flex: 1;
    }

    .asporto-toggle {
      position: relative;
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 200ms ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .asporto-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 200ms ease;
    }

    .asporto-toggle.active {
      background: rgba(34, 211, 238, 0.2);
      border-color: #22d3ee;
    }

    .asporto-toggle.active::after {
      left: 22px;
      background: #22d3ee;
    }

    .asporto-toggle.active + .asporto-label {
      color: #22d3ee;
    }

    /* ===== TOGGLE POS ===== */
    .pos-toggle {
      position: relative;
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 200ms ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .pos-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 200ms ease;
    }
    .pos-toggle.active {
      background: rgba(251, 191, 36, 0.2);
      border-color: #fbbf24;
    }
    .pos-toggle.active::after {
      left: 22px;
      background: #fbbf24;
    }
    .pos-toggle.active + .asporto-label {
      color: #fbbf24;
    }

    /* ===== SCONTO ===== */
    .discount-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .toggle-unit {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(240, 244, 248, 0.5);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 100ms ease;
      touch-action: manipulation;
      flex-shrink: 0;
    }

    .toggle-unit:active { background: rgba(255, 255, 255, 0.1); }

    /* ===== RIEPILOGO ORDINE (scrollabile) ===== */
    .order-summary-label {
      padding: 10px 16px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(240, 244, 248, 0.4);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .order-items-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.06) transparent;
    }

    .order-items-scroll::-webkit-scrollbar { width: 4px; }
    .order-items-scroll::-webkit-scrollbar-track { background: transparent; }
    .order-items-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

    .order-empty {
      padding: 24px 16px;
      text-align: center;
      font-size: 14px;
      color: rgba(240, 244, 248, 0.25);
      font-style: italic;
    }

    .order-item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      transition: background 100ms ease;
    }

    .order-item-row:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .order-item-qty {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 15px;
      color: #4ecca3;
      min-width: 28px;
    }

    .order-item-name {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
      color: rgba(240, 244, 248, 0.85);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .order-item-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      color: rgba(240, 244, 248, 0.55);
      white-space: nowrap;
    }

    .order-item-remove {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid rgba(233, 69, 96, 0.2);
      background: rgba(233, 69, 96, 0.06);
      color: #e94560;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 100ms ease;
      touch-action: manipulation;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .order-item-remove:active {
      background: rgba(233, 69, 96, 0.2);
      transform: scale(0.9);
    }

    .order-item-note {
      display: flex;
      align-items: center;
      padding: 2px 16px 4px 52px;
    }

    .order-item-note input {
      width: 100%;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255, 217, 61, 0.2);
      background: rgba(255, 217, 61, 0.05);
      color: var(--yellow);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 500;
      outline: none;
      transition: border-color 150ms ease;
    }

    .order-item-note input::placeholder { color: rgba(255, 217, 61, 0.35); }
    .order-item-note input:focus { border-color: rgba(255, 217, 61, 0.5); }

    /* ===== FOOTER ORDINE: totali + bottone ===== */
    .order-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      padding: 14px 16px;
      flex-shrink: 0;
    }

    .totals-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-label {
      font-size: 14px;
      font-weight: 500;
      color: rgba(240, 244, 248, 0.5);
    }

    .total-value {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 15px;
      color: rgba(240, 244, 248, 0.65);
    }

    .total-row.discount-row-display .total-label { color: rgba(255, 217, 61, 0.6); }
    .total-row.discount-row-display .total-value { color: rgba(255, 217, 61, 0.7); }

    .total-row.courtesy-row .total-label { color: #ffd93d; }
    .total-row.courtesy-row .total-value { color: #ffd93d; }

    .total-row.grand-total {
      padding-top: 8px;
      margin-top: 4px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    .total-row.grand-total .total-label {
      font-size: 16px;
      font-weight: 700;
      color: rgba(240, 244, 248, 0.85);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .total-row.grand-total .total-value {
      font-size: 26px;
      font-weight: 800;
      color: #4ecca3;
    }

    .total-row.grand-total .total-value.empty {
      color: rgba(78, 204, 163, 0.2);
    }

    .total-row.grand-total .total-value.courtesy {
      color: #ffd93d;
    }

    .btn-order {
      width: 100%;
      padding: 16px 20px;
      background: rgba(78, 204, 163, 0.12);
      border: 2px solid rgba(78, 204, 163, 0.3);
      border-radius: 10px;
      color: #4ecca3;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-order:active:not(.disabled) {
      transform: scale(0.97);
      background: rgba(78, 204, 163, 0.3);
      border-color: #4ecca3;
    }

    .btn-order.disabled {
      opacity: 0.2;
      pointer-events: none;
    }

    /* ===== CALCOLATRICE RESTO ===== */
    .resto-block {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .resto-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 0;
    }

    .resto-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(240, 244, 248, 0.4);
    }

    .resto-input-wrap {
      display: flex;
      align-items: center;
      gap: 3px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 5px 8px;
      cursor: text;
      transition: border-color 150ms ease;
    }

    .resto-input-wrap:focus-within {
      border-color: rgba(78, 204, 163, 0.3);
    }

    .resto-euro {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
    }

    .resto-input {
      width: 58px;
      background: none;
      border: none;
      outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: #f0f4f8;
      text-align: right;
      -moz-appearance: textfield;
    }

    .resto-input::-webkit-outer-spin-button,
    .resto-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .resto-input::placeholder { color: rgba(255, 255, 255, 0.12); }

    .dare-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 800;
      color: #4ecca3;
      transition: color 150ms ease;
    }

    .dare-value.zero { color: rgba(78, 204, 163, 0.2); }
    .dare-value.negative { color: #e94560; }

    /* ===== FEEDBACK INLINE (sotto bottone ORDINA) ===== */
    .order-progress {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 150ms ease;
    }

    .order-progress.active {
      opacity: 1;
    }

    .order-progress-bar {
      height: 100%;
      width: 0;
      background: #4ecca3;
      border-radius: 2px;
      transition: width 300ms ease;
    }

    .order-progress.active .order-progress-bar {
      width: 70%;
      animation: progress-pulse 800ms ease-in-out infinite alternate;
    }

    .order-progress.done .order-progress-bar {
      width: 100%;
      animation: none;
    }

    @keyframes progress-pulse {
      from { width: 40%; }
      to { width: 85%; }
    }

    .order-feedback {
      width: 100%;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
      padding: 6px 0;
      border-radius: 6px;
      opacity: 0;
      transform: translateY(-4px);
      transition: all 200ms ease;
    }

    .order-feedback.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .order-feedback.success {
      color: #4ecca3;
      background: rgba(78, 204, 163, 0.08);
    }

    .order-feedback.error {
      color: #e94560;
      background: rgba(233, 69, 96, 0.08);
    }

    /* ===== TAB ORDINI — lista storico ordini serata ===== */
    .orders-panel-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .order-history-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      border-left: 3px solid rgba(78, 204, 163, 0.3);
    }

    .order-history-row.cancelled {
      border-left-color: rgba(233, 69, 96, 0.4);
      opacity: 0.5;
    }

    .order-history-row.completed {
      border-left-color: rgba(108, 122, 137, 0.3);
    }

    .oh-info { flex: 1; min-width: 0; }

    .oh-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
      flex-wrap: wrap;
    }

    .oh-id {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 15px;
      color: #fff;
    }

    .oh-table {
      font-weight: 600;
      font-size: 12px;
      color: #4ecca3;
    }

    .oh-total {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 12px;
      color: rgba(78, 204, 163, 0.7);
      margin-left: auto;
    }

    .oh-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .oh-status.in_progress { background: rgba(78, 204, 163, 0.15); color: #4ecca3; }
    .oh-status.completed { background: rgba(108, 122, 137, 0.15); color: #6c7a89; }
    .oh-status.cancelled { background: rgba(233, 69, 96, 0.15); color: #e94560; }

    .oh-items {
      font-size: 12px;
      color: rgba(240, 244, 248, 0.35);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .oh-btn-cancel {
      flex-shrink: 0;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid rgba(233, 69, 96, 0.25);
      background: rgba(233, 69, 96, 0.06);
      color: #e94560;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 120ms ease;
    }

    .oh-btn-cancel:active {
      background: rgba(233, 69, 96, 0.3);
      transform: scale(0.93);
    }

    .oh-empty {
      text-align: center;
      padding: 40px 20px;
      color: rgba(240, 244, 248, 0.25);
      font-size: 14px;
      font-weight: 500;
    }

    .oh-courtesy {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #ffd93d;
    }

    /* ===== BANNER DISCONNESSIONE ===== */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px 20px;
      background: #e94560;
      color: #fff;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 2000;
      transform: translateY(-100%);
      transition: transform 300ms ease;
    }

    .offline-banner.visible { transform: translateY(0); }

    /* ===== STAMPANTE OFFLINE — badge compatto nella tab bar ===== */
    .printer-alert {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255, 217, 61, 0.12);
      border: 1px solid rgba(255, 217, 61, 0.3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: #ffd93d;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      animation: pulse-warn 2s ease-in-out infinite;
    }

    .printer-alert.visible { display: flex; }
    .printer-alert .alert-icon { font-size: 12px; line-height: 1; }

    @keyframes pulse-warn {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .order-column {
        min-width: 280px;
      }
    }

    @media (max-width: 700px) {
      /* Su schermi molto piccoli, la colonna ordine va sotto */
      .app-shell {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }
      .menu-area {
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        min-height: 50vh;
      }
      .order-column {
        min-width: 100%;
        max-width: 100%;
        min-height: 50vh;
      }
    }

    .btn-esci {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 900;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10, 14, 23, 0.9);
      color: #64748b;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 150ms ease;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(8px);
    }
    .btn-esci:hover { color: #e94560; border-color: rgba(233,69,96,0.3); }
  </style>
</head>
<body>
  <button class="btn-esci" onclick="localStorage.removeItem('sagrapp_role');sessionStorage.removeItem('sagrapp_token');sessionStorage.removeItem('admin_token');window.location.href='/'">Esci</button>

  <!-- Banner disconnessione -->
  <div class="offline-banner" id="offlineBanner">CONNESSIONE PERSA — Riconnessione in corso...</div>

  <!-- Layout principale 70/30 -->
  <div class="app-shell">

    <!-- ============================== -->
    <!-- AREA PIATTI (70%, sinistra) -->
    <!-- ============================== -->
    <div class="menu-area">

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tabMenu" onclick="switchTab('menu')">MENU</button>
        <button class="tab-btn" id="tabOrdini" onclick="switchTab('ordini')">ORDINI</button>
        <!-- Indicatore stampante offline -->
        <div class="printer-alert" id="printerAlert">
          <span class="alert-icon">&#9888;</span>
          <span id="printerAlertText">Stampante offline</span>
        </div>
        <span class="tab-spacer"></span>
        <span class="tab-status" id="tabStatus">
          <span class="status-led" id="statusLed"></span>
          <span id="statusText">...</span>
        </span>
      </div>

      <!-- Due colonne: cibo a sinistra, contorni+bevande a destra -->
      <div class="menu-columns" id="panelMenu">
        <div class="menu-col menu-col-left" id="colCibo"></div>
        <div class="menu-col menu-col-right" id="colBevande"></div>
      </div>

      <!-- Pannello ordini (nascosto di default) -->
      <div class="menu-scroll" id="panelOrdini" style="display:none">
        <div class="oh-empty" id="ordiniEmpty">Nessun ordine nella serata</div>
        <div class="orders-panel-list" id="ordiniList"></div>
      </div>
    </div>

    <!-- ============================== -->
    <!-- COLONNA ORDINE (30%, destra) -->
    <!-- ============================== -->
    <div class="order-column">

      <!-- Header ordine -->
      <div class="order-header">
        <span class="order-number" id="orderNumber">ORDINE</span>
        <span class="order-last" id="lastOrder"></span>
      </div>

      <!-- Form dati ordine -->
      <div class="order-form">
        <!-- Nome cliente -->
        <div class="form-field flex-1">
          <span class="field-label">Nome</span>
          <input type="text" id="nameInput" placeholder="opzionale" autocomplete="off">
        </div>

        <!-- Tavolo — clic sull'intera cella focalizza l'input -->
        <div class="form-field flex-1" id="tableField" onclick="this.querySelector('input').focus()">
          <span class="field-label">Tav</span>
          <input type="number" id="tableInput" inputmode="numeric" min="1" max="99" placeholder="&mdash;">
        </div>
        <!-- Coperti — idem -->
        <div class="form-field flex-1" id="copertiField" onclick="this.querySelector('input').focus()">
          <span class="field-label">Cop</span>
          <input type="number" id="copertiInput" inputmode="numeric" min="0" max="50" placeholder="&mdash;">
        </div>

        <!-- Toggle asporto -->
        <div class="asporto-row">
          <div class="asporto-toggle" id="asportoToggle" onclick="toggleAsporto()"></div>
          <span class="asporto-label" id="asportoLabel">Asporto</span>
        </div>

        <!-- Toggle POS -->
        <div class="asporto-row">
          <div class="pos-toggle" id="posToggle" onclick="togglePos()"></div>
          <span class="asporto-label" id="posLabel">POS</span>
        </div>

        <!-- Flag omaggio -->
        <div class="courtesy-section">
          <div class="courtesy-flags">
            <button class="flag-btn" id="flag-sponsor" onclick="toggleFlag('sponsor')">Sponsor</button>
            <button class="flag-btn" id="flag-don_pierino" onclick="toggleFlag('don_pierino')">Don Pierino</button>
            <button class="flag-btn" id="flag-amici" onclick="toggleFlag('amici')">Amici</button>
          </div>
        </div>

        <!-- Sconto -->
        <div class="discount-row">
          <div class="form-field flex-1">
            <span class="field-label">Sconto</span>
            <input type="number" id="discountInput" inputmode="decimal" min="0" step="any" placeholder="0">
          </div>
          <button class="toggle-unit" id="discountToggle" onclick="toggleDiscountUnit()">&euro;</button>
        </div>
      </div>

      <!-- Riepilogo piatti selezionati -->
      <div class="order-summary-label">Riepilogo</div>
      <div class="order-items-scroll" id="orderItemsList">
        <div class="order-empty" id="orderEmpty">Nessun piatto selezionato</div>
      </div>

      <!-- Totali e bottone ordina -->
      <div class="order-footer">
        <div class="totals-block" id="totalsBlock">
          <!-- Riga subtotale (visibile solo se c'e' sconto o omaggio) -->
          <div class="total-row" id="subtotalRow" style="display:none">
            <span class="total-label">Subtotale</span>
            <span class="total-value" id="subtotalValue">&euro; 0,00</span>
          </div>
          <!-- Riga sconto -->
          <div class="total-row discount-row-display" id="discountRow" style="display:none">
            <span class="total-label" id="discountLabel">Sconto</span>
            <span class="total-value" id="discountDisplay">&minus;&euro; 0,00</span>
          </div>
          <!-- Riga omaggio -->
          <div class="total-row courtesy-row" id="courtesyRow" style="display:none">
            <span class="total-label">OMAGGIO</span>
            <span class="total-value" id="courtesyLabel"></span>
          </div>
          <!-- Totale da pagare -->
          <div class="total-row grand-total">
            <span class="total-label">Da Pagare</span>
            <span class="total-value empty" id="grandTotal">&euro; 0,00</span>
          </div>

          <!-- Calcolatrice resto (nascosta con POS o senza articoli) -->
          <div class="resto-block" id="restoBlock" style="display:none">
            <div class="resto-row">
              <span class="resto-label">Ricevuto</span>
              <div class="resto-input-wrap" onclick="document.getElementById('ricevutoInput').focus()">
                <span class="resto-euro">&euro;</span>
                <input type="number" id="ricevutoInput" class="resto-input" inputmode="decimal" min="0" step="0.5" placeholder="0,00">
              </div>
            </div>
            <div class="resto-row">
              <span class="resto-label">Dare</span>
              <span class="dare-value zero" id="dareValue">&euro; &mdash;</span>
            </div>
          </div>
        </div>
        <button class="btn-order disabled" id="btnOrder" onclick="submitOrder()">ORDINA</button>
        <div class="order-progress" id="orderProgress"><div class="order-progress-bar"></div></div>
        <div class="order-feedback" id="orderFeedback"></div>
      </div>
    </div>

  </div><!-- fine .app-shell -->

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ===== MENU — caricato dal server =====
    let ITEMS = [];
    let itemMap = {};
    const quantities = {};
    const itemNotes = {}; // Note personalizzazione per piatto (id → stringa)

    // Categorie colonna sinistra (cibo)
    const LEFT_CATEGORIES = [
      { category: 'primo', label: 'Primi' },
      { category: 'secondo', label: 'Secondi' },
      { category: 'speciale', label: 'Speciale del giorno' },
      { category: 'condimento', label: 'Condimenti' },
    ];

    // Categorie colonna destra (contorni + bevande)
    const RIGHT_CATEGORIES = [
      { category: 'contorno', label: 'Contorni' },
      { category: 'bevanda', label: 'Bevande' },
    ];

    // Carica menu dal server, filtra per disponibilita' e cassa
    async function loadMenu() {
      try {
        const res = await fetch('/api/menu');
        const allItems = await res.json();
        const today = new Date().toISOString().slice(0, 10);

        ITEMS = allItems.filter(function(item) {
          if (!item.casses) return false;
          // La cassa generale mostra: piatti con flag cassa_generale + bevande del bar
          if (item.casses.includes('cassa_generale')) return true;
          if (item.category === 'bevanda' && item.casses.includes('cassa_bar')) return true;
          return false;
        });

        itemMap = {};
        ITEMS.forEach(function(i) {
          if (!(i.id in quantities)) quantities[i.id] = 0;
          itemMap[i.id] = i;
        });

        renderPanels();
        restoreQuantityUI();
        updateTabBadges();
        updateOrderColumn();
      } catch (err) {
        console.error('[Cassa] Errore caricamento menu:', err);
      }
    }

    // Ripristina stato quantita' dopo re-render (esaurito/disattivato gia' gestiti in renderItemRow)
    function restoreQuantityUI() {
      ITEMS.forEach(function(item) {
        if (item.status === 'exhausted' || item.available === false) return;
        var countEl = document.getElementById('qty-' + item.id);
        var cardEl = document.getElementById('card-' + item.id);
        if (quantities[item.id] > 0) {
          if (countEl) { countEl.textContent = quantities[item.id]; countEl.classList.remove('zero'); }
          if (cardEl) cardEl.classList.add('active');
        }
      });
    }

    // ===== STATO =====
    let connected = false;
    let submitting = false;
    let activeCourtesy = null; // 'sponsor' | 'don_pierino' | 'amici' | null
    let discountIsPercent = false;
    let currentTab = 'cibo';
    let asportoActive = false;
    let posActive = false;
    let currentTotal = 0; // Tiene traccia del totale finale per la calcolatrice resto

    // ===== GENERA HTML per una riga piatto =====
    function renderItemRow(itemId) {
      const item = itemMap[itemId];
      if (!item) return '';
      const exhausted = item.status === 'exhausted';
      const disabled = item.available === false;
      const priceFormatted = '\u20AC' + item.price.toFixed(2).replace('.', ',');
      const tag = disabled ? '<span class="row-exhausted-tag">Non disp.</span>'
        : exhausted ? '<span class="row-exhausted-tag">Esaurito</span>' : '';
      return `
        <div class="menu-row${(exhausted || disabled) ? ' exhausted' : ''}" id="card-${item.id}">
          <div class="row-stepper">
            <button class="step-btn step-minus" onclick="changeQty('${item.id}', -1)">\u2212</button>
            <span class="step-count zero" id="qty-${item.id}">0</span>
            <button class="step-btn step-plus" onclick="changeQty('${item.id}', 1)">+</button>
          </div>
          <span class="row-name">${item.name}</span>
          ${tag}
          <span class="row-price">${priceFormatted}</span>
        </div>`;
    }

    // ===== RENDER COLONNE =====
    // Genera un box categoria: header + righe piatti
    function renderCategoryBox(label, items) {
      let html = '<div class="category-box">';
      html += '<div class="section-header">' + label + '</div>';
      items.forEach(function(item) { html += renderItemRow(item.id); });
      html += '</div>';
      return html;
    }

    function renderPanels() {
      // Colonna sinistra — Cibo (primi, secondi, speciali, condimenti)
      let leftHtml = '';
      LEFT_CATEGORIES.forEach(function(cat) {
        const catItems = ITEMS.filter(function(item) { return item.category === cat.category; });
        if (catItems.length === 0) return;
        leftHtml += renderCategoryBox(cat.label, catItems);
      });
      document.getElementById('colCibo').innerHTML = leftHtml ||
        '<div style="padding:40px;text-align:center;color:#64748b">Nessun piatto disponibile</div>';

      // Colonna destra — Contorni + Bevande (in wrapper separati per asporto)
      let rightHtml = '';
      const contorni = ITEMS.filter(function(item) { return item.category === 'contorno'; });
      if (contorni.length > 0) {
        rightHtml += renderCategoryBox('Contorni', contorni);
      }

      const bevande = ITEMS.filter(function(item) { return item.category === 'bevanda'; });
      let bevandeBox = '';
      if (bevande.length > 0) {
        // Raggruppa bevande per sotto-gruppo (come nella comanda cartacea)
        // Rileva il gruppo dal prefisso del nome
        function beverageGroup(name) {
          var n = name.toLowerCase();
          if (n.indexOf('birra') === 0) return 'birra';
          if (n.indexOf('vino') === 0) return 'vino';
          if (n.indexOf('bottiglia') === 0) return 'bottiglia';
          if (n.indexOf('acqua') === 0) return 'acqua';
          if (n.indexOf('lattina') === 0) return 'lattina';
          return 'altro';
        }
        bevandeBox = '<div class="category-box">';
        bevandeBox += '<div class="section-header">Bevande</div>';
        var lastGroup = null;
        bevande.forEach(function(item) {
          var grp = beverageGroup(item.name);
          var row = renderItemRow(item.id);
          // Aggiungi classe group-first quando cambia sotto-gruppo
          if (lastGroup !== null && grp !== lastGroup) {
            row = row.replace('class="menu-row', 'class="menu-row group-first');
          }
          bevandeBox += row;
          lastGroup = grp;
        });
        bevandeBox += '</div>';
      }

      document.getElementById('colBevande').innerHTML =
        rightHtml +
        '<div id="sectionBevande"' + (asportoActive ? ' class="bevande-disabled"' : '') + '>' + bevandeBox + '</div>';
    }

    loadMenu();

    // ===== SWITCH TAB =====
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabMenu').classList.toggle('active', tab === 'menu');
      document.getElementById('tabOrdini').classList.toggle('active', tab === 'ordini');
      document.getElementById('panelMenu').style.display = tab === 'menu' ? '' : 'none';
      document.getElementById('panelOrdini').style.display = tab === 'ordini' ? '' : 'none';
      if (tab === 'ordini') loadAllOrders();
    }

    // Badge non piu' necessari con layout a due colonne
    function updateTabBadges() {}

    // ===== FLAG OMAGGIO: solo uno attivo alla volta =====
    function toggleFlag(type) {
      if (activeCourtesy === type) {
        activeCourtesy = null;
        document.getElementById('flag-' + type).classList.remove('active');
      } else {
        if (activeCourtesy) {
          document.getElementById('flag-' + activeCourtesy).classList.remove('active');
        }
        activeCourtesy = type;
        document.getElementById('flag-' + type).classList.add('active');
      }
      updateOrderColumn();
    }

    // ===== TOGGLE UNITA' SCONTO: € ↔ % =====
    function toggleDiscountUnit() {
      discountIsPercent = !discountIsPercent;
      document.getElementById('discountToggle').textContent = discountIsPercent ? '%' : '\u20AC';
      updateOrderColumn();
    }

    // ===== TOGGLE ASPORTO =====
    // Quando attivo: coperti = 0 e disabilitato, tab bevande disabilitata, niente stampa bevande
    function toggleAsporto() {
      asportoActive = !asportoActive;
      document.getElementById('asportoToggle').classList.toggle('active', asportoActive);

      var copertiInput = document.getElementById('copertiInput');
      var tableField = document.getElementById('tableField');
      var tableInput = document.getElementById('tableInput');
      var nameInput = document.getElementById('nameInput');
      var sectionBevande = document.getElementById('sectionBevande');

      if (asportoActive) {
        // Disabilita coperti e metti a 0
        copertiInput.value = '0';
        copertiInput.disabled = true;
        copertiInput.parentElement.style.opacity = '0.3';
        // Nascondi tavolo e svuota
        tableField.style.display = 'none';
        tableInput.value = '';
        // Nome diventa obbligatorio
        nameInput.placeholder = 'obbligatorio';
        // Disabilita sezione bevande e resetta quantita'
        if (sectionBevande) sectionBevande.classList.add('bevande-disabled');
        ITEMS.forEach(function(item) {
          if (item.category === 'bevanda' && quantities[item.id] > 0) {
            quantities[item.id] = 0;
            var qtyEl = document.getElementById('qty-' + item.id);
            if (qtyEl) { qtyEl.textContent = '0'; qtyEl.classList.add('zero'); }
            var cardEl = document.getElementById('card-' + item.id);
            if (cardEl) cardEl.classList.remove('active');
          }
        });
      } else {
        // Riabilita coperti
        copertiInput.disabled = false;
        copertiInput.value = '';
        copertiInput.parentElement.style.opacity = '';
        // Rimostra tavolo
        tableField.style.display = '';
        // Nome torna opzionale
        nameInput.placeholder = 'opzionale';
        // Riabilita sezione bevande
        if (sectionBevande) sectionBevande.classList.remove('bevande-disabled');
      }

      updateTabBadges();
      updateOrderColumn();
    }

    // ===== TOGGLE POS =====
    function togglePos() {
      posActive = !posActive;
      document.getElementById('posToggle').classList.toggle('active', posActive);
      // Con POS non serve il resto
      document.getElementById('restoBlock').style.display = (posActive || currentTotal === 0) ? 'none' : '';
      if (!posActive) updateResto();
    }

    // ===== CALCOLATRICE RESTO =====
    function updateResto() {
      var ricevuto = parseFloat(document.getElementById('ricevutoInput').value) || 0;
      var dare = ricevuto - currentTotal;
      var dareEl = document.getElementById('dareValue');
      if (ricevuto <= 0) {
        dareEl.textContent = '\u20AC \u2014';
        dareEl.className = 'dare-value zero';
      } else if (dare < 0) {
        // Manca — mostra in rosso quanto manca
        dareEl.textContent = '-\u20AC ' + Math.abs(dare).toFixed(2).replace('.', ',');
        dareEl.className = 'dare-value negative';
      } else {
        dareEl.textContent = '\u20AC ' + dare.toFixed(2).replace('.', ',');
        dareEl.className = 'dare-value' + (dare === 0 ? ' zero' : '');
      }
    }

    // ===== CALCOLA TOTALE CON SCONTO E OMAGGIO =====
    function calcOrder() {
      let totalItems = 0;
      let subtotal = 0;
      ITEMS.forEach(item => {
        totalItems += quantities[item.id];
        subtotal += quantities[item.id] * item.price;
      });

      // Arrotonda il subtotale per evitare errori float
      subtotal = Math.round(subtotal * 100) / 100;

      // Se flag omaggio attivo → totale = 0
      if (activeCourtesy) {
        return { totalItems, subtotal, discount: 0, total: 0, courtesyType: activeCourtesy };
      }

      // Calcolo sconto
      const discountInput = parseFloat(document.getElementById('discountInput').value) || 0;
      let discount = 0;
      if (discountInput > 0) {
        if (discountIsPercent) {
          discount = subtotal * (discountInput / 100);
        } else {
          discount = discountInput;
        }
        discount = Math.min(discount, subtotal);
        discount = Math.round(discount * 100) / 100;
      }

      return { totalItems, subtotal, discount, total: Math.round((subtotal - discount) * 100) / 100, courtesyType: null };
    }

    // ===== LOGICA QUANTITA' =====
    function changeQty(id, delta) {
      if (!connected || submitting) return;
      quantities[id] = Math.max(0, quantities[id] + delta);

      const countEl = document.getElementById('qty-' + id);
      countEl.textContent = quantities[id];
      countEl.classList.toggle('zero', quantities[id] === 0);

      const card = document.getElementById('card-' + id);
      card.classList.toggle('active', quantities[id] > 0);

      updateTabBadges();
      updateOrderColumn();
    }

    // ===== RIMUOVI PIATTO DAL RIEPILOGO (click sulla X) =====
    function setNote(id, value) {
      if (value && value.trim()) {
        itemNotes[id] = value.trim();
      } else {
        delete itemNotes[id];
      }
    }

    function removeItem(id) {
      if (submitting) return;
      quantities[id] = 0;
      delete itemNotes[id];

      const countEl = document.getElementById('qty-' + id);
      if (countEl) {
        countEl.textContent = '0';
        countEl.classList.add('zero');
      }

      const card = document.getElementById('card-' + id);
      if (card) {
        card.classList.remove('active');
      }

      updateTabBadges();
      updateOrderColumn();
    }

    // ===== FORMATTA PREZZO IN STILE ITALIANO =====
    function formatPrice(value) {
      return '\u20AC ' + value.toFixed(2).replace('.', ',');
    }

    // ===== AGGIORNA TUTTA LA COLONNA ORDINE =====
    function updateOrderColumn() {
      const { totalItems, subtotal, discount, total, courtesyType } = calcOrder();

      // Riepilogo piatti
      const listEl = document.getElementById('orderItemsList');
      const emptyEl = document.getElementById('orderEmpty');

      // Raccogli tutti i piatti selezionati (nell'ordine del menu)
      const selectedItems = ITEMS.filter(item => quantities[item.id] > 0);

      if (selectedItems.length === 0) {
        listEl.innerHTML = '<div class="order-empty">Nessun piatto selezionato</div>';
      } else {
        let html = '';
        selectedItems.forEach(item => {
          const linePrice = item.price * quantities[item.id];
          const noteVal = itemNotes[item.id] || '';
          html += `
            <div class="order-item-row">
              <span class="order-item-qty">${quantities[item.id]}x</span>
              <span class="order-item-name">${item.name}</span>
              <span class="order-item-price">${formatPrice(linePrice)}</span>
              <button class="order-item-remove" onclick="removeItem('${item.id}')">&times;</button>
            </div>
            <div class="order-item-note">
              <input type="text" placeholder="Nota..." value="${noteVal.replace(/"/g, '&quot;')}" data-id="${item.id}" onchange="setNote('${item.id}', this.value)">
            </div>`;
        });
        listEl.innerHTML = html;
      }

      // Totali
      const subtotalRow = document.getElementById('subtotalRow');
      const discountRow = document.getElementById('discountRow');
      const courtesyRow = document.getElementById('courtesyRow');
      const grandTotal = document.getElementById('grandTotal');

      // Mostra subtotale solo se c'e' sconto o omaggio
      const hasDiscount = discount > 0 && !courtesyType;
      const hasCourtesy = !!courtesyType && totalItems > 0;

      subtotalRow.style.display = (hasDiscount || hasCourtesy) ? 'flex' : 'none';
      document.getElementById('subtotalValue').textContent = formatPrice(subtotal);

      // Riga sconto
      discountRow.style.display = hasDiscount ? 'flex' : 'none';
      if (hasDiscount) {
        const discountInput = parseFloat(document.getElementById('discountInput').value) || 0;
        const unitLabel = discountIsPercent ? `(${discountInput}%)` : '';
        document.getElementById('discountLabel').textContent = 'Sconto ' + unitLabel;
        document.getElementById('discountDisplay').textContent = '\u2212' + formatPrice(discount);
      }

      // Riga omaggio
      courtesyRow.style.display = hasCourtesy ? 'flex' : 'none';
      if (hasCourtesy) {
        const courtesyNames = { sponsor: 'Sponsor', don_pierino: 'Don Pierino', amici: 'Amici' };
        document.getElementById('courtesyLabel').textContent = courtesyNames[courtesyType];
      }

      // Totale finale
      grandTotal.textContent = formatPrice(total);
      grandTotal.classList.toggle('empty', totalItems === 0);
      grandTotal.classList.toggle('courtesy', hasCourtesy);

      // Aggiorna calcolatrice resto
      currentTotal = total;
      var restoBlock = document.getElementById('restoBlock');
      if (totalItems > 0 && !posActive) {
        restoBlock.style.display = '';
        updateResto();
      } else {
        restoBlock.style.display = 'none';
      }

      // Abilita/disabilita bottone ORDINA
      const tableValue = document.getElementById('tableInput').value;
      const copertiValue = document.getElementById('copertiInput').value;
      const nameValue = document.getElementById('nameInput').value.trim();
      var canOrder;
      if (asportoActive) {
        // Asporto: nome obbligatorio, no tavolo/coperti
        canOrder = totalItems > 0 && nameValue;
      } else {
        // Normale: tavolo e coperti obbligatori
        canOrder = totalItems > 0 && tableValue && copertiValue;
      }
      document.getElementById('btnOrder').classList.toggle('disabled', !canOrder);
    }

    // ===== INVIO ORDINE =====
    async function submitOrder() {
      if (!connected || submitting) return;

      const tableInput = document.getElementById('tableInput');
      const copertiInputEl = document.getElementById('copertiInput');
      const nameInputEl = document.getElementById('nameInput');
      const table = parseInt(tableInput.value) || 0;
      const coperti = parseInt(copertiInputEl.value);

      if (asportoActive) {
        // Asporto: nome obbligatorio
        if (!nameInputEl.value.trim()) {
          nameInputEl.parentElement.classList.add('error');
          setTimeout(function() { nameInputEl.parentElement.classList.remove('error'); }, 400);
          nameInputEl.focus();
          return;
        }
      } else {
        // Normale: tavolo e coperti obbligatori
        if (!table || table < 1) {
          const field = document.getElementById('tableField');
          field.classList.add('error');
          setTimeout(function() { field.classList.remove('error'); }, 400);
          tableInput.focus();
          return;
        }
        if (coperti === undefined || coperti === null || isNaN(coperti) || coperti < 0) {
          const field = document.getElementById('copertiField');
          field.classList.add('error');
          setTimeout(function() { field.classList.remove('error'); }, 400);
          copertiInputEl.focus();
          return;
        }
      }

      const items = ITEMS
        .filter(function(item) { return quantities[item.id] > 0; })
        .map(function(item) {
          var entry = { id: item.id, qty: quantities[item.id] };
          if (itemNotes[item.id]) entry.note = itemNotes[item.id];
          return entry;
        });

      if (items.length === 0) return;

      const { subtotal, discount, total, courtesyType } = calcOrder();
      const customerName = document.getElementById('nameInput').value.trim() || null;
      const discountRaw = parseFloat(document.getElementById('discountInput').value) || 0;

      submitting = true;
      var btnOrder = document.getElementById('btnOrder');
      var progress = document.getElementById('orderProgress');
      var feedback = document.getElementById('orderFeedback');
      btnOrder.classList.add('disabled');

      // Mostra barra di caricamento
      feedback.classList.remove('visible', 'success', 'error');
      progress.classList.remove('done');
      progress.classList.add('active');

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            table: table,
            items: items,
            customer_name: customerName,
            discount: discount,
            discount_type: discountIsPercent ? 'percent' : 'euro',
            discount_value: discountRaw,
            courtesy_type: courtesyType,
            source: 'principale',
            coperti: asportoActive ? 0 : coperti,
            asporto: asportoActive,
            payment: posActive ? 'pos' : 'contanti',
          }),
        });
        const data = await res.json();

        // Barra completata
        progress.classList.remove('active');
        progress.classList.add('done');

        if (data.success) {
          // Feedback inline
          let msg = data.order_number;
          if (data.table > 0) msg += '  Tav.' + data.table;
          if (data.courtesy_type) {
            const names = { sponsor: 'Sponsor', don_pierino: 'Don Pierino', amici: 'Amici' };
            msg += '  OMAGGIO ' + names[data.courtesy_type];
          } else {
            msg += '  ' + formatPrice(data.total);
          }

          // Warning se le stampe non sono partite (proxy offline — job in coda)
          var noPrint = data.prints && !data.prints.receipt && !data.prints.food && !data.prints.drinks && !data.prints.special;
          if (noPrint) {
            msg += '  ⚠ STAMPA IN CODA';
            feedback.textContent = msg;
            feedback.classList.add('visible', 'error');
            beepAlert();
          } else {
            feedback.textContent = msg;
            feedback.classList.add('visible', 'success');
          }

          // Aggiorna "ultimo ordine" nel header
          const lastEl = document.getElementById('lastOrder');
          lastEl.textContent = 'Ultimo: ' + data.order_number;
          lastEl.classList.add('visible');

          resetOrder();

          // Nascondi feedback dopo un po' (più tempo se warning stampa)
          setTimeout(function() {
            feedback.classList.remove('visible');
            progress.classList.remove('done');
          }, noPrint ? 6000 : 3000);
        } else {
          feedback.textContent = data.error || 'Errore sconosciuto';
          feedback.classList.add('visible', 'error');
          setTimeout(function() {
            feedback.classList.remove('visible');
            progress.classList.remove('done');
          }, 4000);
        }
      } catch (err) {
        progress.classList.remove('active');
        progress.classList.add('done');
        feedback.textContent = 'Errore di rete';
        feedback.classList.add('visible', 'error');
        setTimeout(function() {
          feedback.classList.remove('visible');
          progress.classList.remove('done');
        }, 4000);
      }

      submitting = false;
    }

    // ===== RESET ORDINE =====
    function resetOrder() {
      // Pulisci tutte le note
      Object.keys(itemNotes).forEach(function(k) { delete itemNotes[k]; });
      ITEMS.forEach(function(item) {
        quantities[item.id] = 0;
        var qtyEl = document.getElementById('qty-' + item.id);
        if (qtyEl) {
          qtyEl.textContent = '0';
          qtyEl.classList.add('zero');
        }
        var cardEl = document.getElementById('card-' + item.id);
        if (cardEl) {
          cardEl.classList.remove('active');
        }
      });

      document.getElementById('tableInput').value = '';
      document.getElementById('copertiInput').value = '';
      document.getElementById('nameInput').value = '';
      document.getElementById('discountInput').value = '';
      document.getElementById('ricevutoInput').value = '';

      // Reset flag omaggio
      if (activeCourtesy) {
        document.getElementById('flag-' + activeCourtesy).classList.remove('active');
        activeCourtesy = null;
      }

      // Reset asporto
      if (asportoActive) {
        asportoActive = false;
        document.getElementById('asportoToggle').classList.remove('active');
        document.getElementById('copertiInput').disabled = false;
        document.getElementById('copertiInput').parentElement.style.opacity = '';
        document.getElementById('tableField').style.display = '';
        document.getElementById('nameInput').placeholder = 'opzionale';
        var sb = document.getElementById('sectionBevande');
        if (sb) sb.classList.remove('bevande-disabled');
      }

      // Reset POS
      if (posActive) {
        posActive = false;
        document.getElementById('posToggle').classList.remove('active');
      }

      // Reset sconto
      discountIsPercent = false;
      document.getElementById('discountToggle').textContent = '\u20AC';

      // Torna al menu dopo reset
      if (currentTab !== 'menu') switchTab('menu');
      updateTabBadges();
      updateOrderColumn();
    }

    // ===== OVERLAY =====
    // ===== TAB ORDINI — carica e mostra tutti gli ordini della serata =====
    async function loadAllOrders() {
      try {
        const res = await fetch('/api/orders/all');
        const data = await res.json();
        renderAllOrders(data);
      } catch (e) {
        document.getElementById('ordiniList').innerHTML = '';
        document.getElementById('ordiniEmpty').textContent = 'Errore caricamento ordini';
        document.getElementById('ordiniEmpty').style.display = 'block';
      }
    }

    function renderAllOrders(orderList) {
      const listEl = document.getElementById('ordiniList');
      const emptyEl = document.getElementById('ordiniEmpty');
      if (orderList.length === 0) {
        listEl.innerHTML = '';
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      listEl.innerHTML = orderList.map(function(o) {
        var statusClass = o.status;
        var statusLabel = o.status === 'in_progress' ? 'APERTO' : o.status === 'completed' ? 'EVASO' : 'ANNULLATO';
        var courtesyTag = o.courtesy_type ? '<span class="oh-courtesy">OMAGGIO</span>' : '';
        var asportoTag = o.asporto ? '<span class="oh-courtesy" style="color:#22d3ee">ASPORTO</span>' : '';
        var cancelBtn = o.status === 'in_progress'
          ? '<button class="oh-btn-cancel" onclick="cancelOrderFromCassa(' + o.id + ')">Annulla</button>'
          : '';
        return '<div class="order-history-row ' + statusClass + '">' +
          '<div class="oh-info">' +
            '<div class="oh-meta">' +
              '<span class="oh-id">' + o.id + '</span>' +
              (o.table > 0 ? '<span class="oh-table">Tav.' + o.table + '</span>' : '') +
              '<span class="oh-status ' + statusClass + '">' + statusLabel + '</span>' +
              courtesyTag + asportoTag +
              '<span class="oh-total">' + formatPrice(o.total) + '</span>' +
            '</div>' +
            '<div class="oh-items">' + escHTML(o.items_summary) + '</div>' +
          '</div>' +
          cancelBtn +
        '</div>';
      }).join('');
    }

    function escHTML(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    async function cancelOrderFromCassa(orderId) {
      if (!confirm('Annullare l\'ordine #' + orderId + '?\nScorte e contatori verranno ripristinati.')) return;
      try {
        var res = await fetch('/api/orders/' + orderId + '/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        var data = await res.json();
        if (data.success) {
          loadAllOrders(); // Ricarica la lista
        } else {
          alert(data.error || 'Errore annullamento');
        }
      } catch (e) {
        alert('Errore di rete');
      }
    }

    // ===== SOCKET.IO =====
    var socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    var offlineBanner = document.getElementById('offlineBanner');
    var statusLed = document.getElementById('statusLed');
    var statusText = document.getElementById('statusText');
    var tabStatus = document.getElementById('tabStatus');

    socket.on('connect', function() {
      connected = true;
      socket.emit('register', { role: 'cassa' });
      offlineBanner.classList.remove('visible');
      statusLed.classList.add('on');
      statusLed.classList.remove('off');
      tabStatus.classList.add('online');
      tabStatus.classList.remove('offline');
      statusText.textContent = 'Connesso';
      // Abilita il pulsante ordina se condizioni soddisfatte
      updateOrderColumn();
    });

    socket.on('disconnect', function() {
      connected = false;
      offlineBanner.classList.add('visible');
      statusLed.classList.remove('on');
      statusLed.classList.add('off');
      tabStatus.classList.remove('online');
      tabStatus.classList.add('offline');
      statusText.textContent = 'Offline';
    });

    // ===== STAMPANTE OFFLINE: alert + beep =====
    var printerAlert = document.getElementById('printerAlert');
    var printerAlertText = document.getElementById('printerAlertText');

    // Beep audio per alert stampante (Web Audio API, senza file esterni)
    function beepAlert() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch (e) { /* Audio non supportato */ }
    }

    // Ascolta lo stato delle stampanti dal proxy
    socket.on('printers_status_update', function(statuses) {
      var offlinePrinters = statuses.filter(function(s) { return !s.online; });
      if (offlinePrinters.length > 0) {
        var names = offlinePrinters.map(function(p) { return p.id; }).join(', ');
        printerAlertText.textContent = 'Stampante offline: ' + names;
        printerAlert.classList.add('visible');
        beepAlert();
      } else {
        printerAlert.classList.remove('visible');
      }
    });

    // Richiedi controllo stampanti dopo connessione
    socket.on('connect', function() {
      setTimeout(function() { socket.emit('request_printer_check'); }, 2000);
    });

    // Aggiorna tab ordini in tempo reale quando cambiano gli ordini
    socket.on('order_created', function() {
      if (currentTab === 'ordini') loadAllOrders();
    });
    socket.on('order_cancelled', function() {
      if (currentTab === 'ordini') loadAllOrders();
    });
    socket.on('order_fulfilled_broadcast', function() {
      if (currentTab === 'ordini') loadAllOrders();
    });

    // Aggiorna piatto esaurito in tempo reale: aggiunge classe + tag
    socket.on('inventory_exhausted', function(data) {
      var card = document.getElementById('card-' + data.item_id);
      if (!card || card.classList.contains('exhausted')) return;
      card.classList.add('exhausted');
      // Aggiungi tag "Esaurito" prima del prezzo
      var priceEl = card.querySelector('.row-price');
      if (priceEl && !card.querySelector('.row-exhausted-tag')) {
        var tag = document.createElement('span');
        tag.className = 'row-exhausted-tag';
        tag.textContent = 'Esaurito';
        card.insertBefore(tag, priceEl);
      }
      // Resetta quantita' se selezionato
      if (quantities[data.item_id] > 0) {
        quantities[data.item_id] = 0;
        var countEl = document.getElementById('qty-' + data.item_id);
        if (countEl) { countEl.textContent = '0'; countEl.classList.add('zero'); }
        card.classList.remove('active');
        updateTabBadges();
        updateOrderColumn();
      }
    });

    // Ricarica menu quando l'admin modifica disponibilita', prezzo, ecc.
    socket.on('menu_updated', function() {
      loadMenu();
    });

    // ===== INPUT LISTENER per aggiornamento in tempo reale =====
    document.getElementById('tableInput').addEventListener('input', updateOrderColumn);
    document.getElementById('copertiInput').addEventListener('input', updateOrderColumn);
    document.getElementById('nameInput').addEventListener('input', updateOrderColumn);
    document.getElementById('discountInput').addEventListener('input', updateOrderColumn);
    document.getElementById('ricevutoInput').addEventListener('input', updateResto);

    // Init
    updateTabBadges();
    updateOrderColumn();
  </script>
<script src="/js/sidebar.js"></script>
</body>
