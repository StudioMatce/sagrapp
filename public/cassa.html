<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SagrApp — Cassa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060a12;
      color: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== LAYOUT PRINCIPALE: 70% piatti + 30% colonna ordine ===== */
    .app-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== AREA PIATTI (sinistra, 70%) ===== */
    .menu-area {
      flex: 7;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* ===== COLONNA ORDINE (destra, 30%) ===== */
    .order-column {
      flex: 3;
      min-width: 320px;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.015);
    }

    /* ===== TAB BAR (CIBO / BEVANDE) ===== */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 8px;
      border: 1.5px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      color: rgba(240, 244, 248, 0.45);
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 150ms ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn:active { transform: scale(0.97); }

    .tab-btn.active {
      background: rgba(78, 204, 163, 0.1);
      border-color: rgba(78, 204, 163, 0.35);
      color: #4ecca3;
    }

    .tab-btn .tab-icon { font-size: 16px; }

    /* Badge contatore sulle tab (es. "BEVANDE (3)") */
    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 10px;
      background: #4ecca3;
      color: #060a12;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 11px;
      line-height: 1;
    }

    .tab-badge.hidden { display: none; }

    /* Checkmark sulla tab con piatti selezionati */
    .tab-check {
      font-size: 14px;
      margin-left: -2px;
      display: none;
    }

    .tab-check.visible { display: inline; }

    /* Separatore tab → status */
    .tab-spacer { flex: 1; }

    .tab-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #6c7a89;
    }

    .tab-status.online { color: #4ecca3; }
    .tab-status.offline { color: #e94560; }

    .status-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6c7a89;
      transition: all 200ms ease;
    }

    .status-led.on { background: #4ecca3; box-shadow: 0 0 6px #4ecca3; }
    .status-led.off { background: #e94560; box-shadow: 0 0 6px #e94560; }

    /* ===== AREA SCROLLABILE MENU ===== */
    .menu-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 10px 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .menu-scroll::-webkit-scrollbar { width: 6px; }
    .menu-scroll::-webkit-scrollbar-track { background: transparent; }
    .menu-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    /* Tab panel: visibile solo quando attivo */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ===== SEZIONE HEADER (es. PRIMI, SECONDI) ===== */
    .section-header {
      padding: 12px 8px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(78, 204, 163, 0.5);
    }

    .section-header:first-child { padding-top: 4px; }

    /* ===== SEPARATORE tra gruppi ===== */
    .sep {
      height: 1px;
      background: rgba(255, 255, 255, 0.05);
      margin: 6px 8px;
    }

    /* ===== RIGA PIATTO ===== */
    .menu-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1.5px solid transparent;
      transition: all 120ms ease;
      min-height: 44px;
    }

    .menu-row:active {
      background: rgba(255, 255, 255, 0.03);
    }

    .menu-row.active {
      background: rgba(78, 204, 163, 0.06);
      border-color: rgba(78, 204, 163, 0.2);
    }

    .row-name {
      flex: 1;
      font-weight: 500;
      font-size: 14px;
      color: rgba(240, 244, 248, 0.75);
      line-height: 1.2;
      min-width: 0;
    }

    .menu-row.active .row-name {
      color: #f0f4f8;
      font-weight: 600;
    }

    .row-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      color: rgba(78, 204, 163, 0.5);
      white-space: nowrap;
      min-width: 52px;
      text-align: right;
    }

    .menu-row.active .row-price {
      color: #4ecca3;
    }

    /* ===== STEPPER [-] 0 [+] ===== */
    .row-stepper {
      display: flex;
      align-items: center;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .step-btn {
      width: 40px;
      height: 38px;
      background: rgba(255, 255, 255, 0.02);
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 80ms ease;
      line-height: 1;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .step-btn:active { background: rgba(255, 255, 255, 0.1); }
    .step-minus { color: #e94560; border-right: 1px solid rgba(255, 255, 255, 0.04); }
    .step-plus { color: #4ecca3; border-left: 1px solid rgba(255, 255, 255, 0.04); }

    .step-count {
      width: 32px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.9);
      height: 38px;
      line-height: 38px;
      background: rgba(255, 255, 255, 0.015);
      transition: color 150ms ease;
    }

    .step-count.zero { color: rgba(255, 255, 255, 0.12); }

    /* ===== COLONNA ORDINE ===== */
    .order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .order-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 16px;
      color: rgba(240, 244, 248, 0.5);
      letter-spacing: 0.02em;
    }

    .order-last {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: rgba(78, 204, 163, 0.5);
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .order-last.visible { opacity: 1; }

    /* ===== FORM ORDINE ===== */
    .order-form {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .form-row {
      display: flex;
      gap: 8px;
    }

    .form-field {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 6px 10px;
      transition: border-color 200ms ease;
    }

    .form-field:focus-within {
      border-color: rgba(78, 204, 163, 0.3);
    }

    .form-field.flex-1 { flex: 1; }

    .form-field.error {
      border-color: #e94560;
      animation: shake 300ms ease;
    }

    @keyframes shake {
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }

    .field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      color: rgba(240, 244, 248, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .form-field input[type="text"] {
      flex: 1;
      width: 100%;
      min-width: 0;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
    }

    .form-field input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.12); }

    .form-field input[type="number"] {
      width: 44px;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
      -moz-appearance: textfield;
    }

    .form-field input[type="number"]::-webkit-outer-spin-button,
    .form-field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .form-field input[type="number"]::placeholder { color: rgba(255, 255, 255, 0.12); }

    /* ===== FLAG OMAGGIO ===== */
    .courtesy-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .courtesy-flags {
      display: flex;
      gap: 6px;
    }

    .flag-btn {
      flex: 1;
      padding: 8px 4px;
      border-radius: 8px;
      border: 1.5px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      color: rgba(255, 255, 255, 0.3);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 120ms ease;
      touch-action: manipulation;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }

    .flag-btn:active { transform: scale(0.95); }

    .flag-btn.active {
      border-color: #ffd93d;
      background: rgba(255, 217, 61, 0.1);
      color: #ffd93d;
      box-shadow: 0 0 12px rgba(255, 217, 61, 0.08);
    }

    /* ===== TOGGLE ASPORTO ===== */
    .asporto-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .asporto-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(240, 244, 248, 0.4);
      flex: 1;
    }

    .asporto-toggle {
      position: relative;
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 200ms ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .asporto-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 200ms ease;
    }

    .asporto-toggle.active {
      background: rgba(34, 211, 238, 0.2);
      border-color: #22d3ee;
    }

    .asporto-toggle.active::after {
      left: 22px;
      background: #22d3ee;
    }

    .asporto-toggle.active + .asporto-label {
      color: #22d3ee;
    }

    /* ===== TOGGLE POS ===== */
    .pos-toggle {
      position: relative;
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 200ms ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .pos-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 200ms ease;
    }
    .pos-toggle.active {
      background: rgba(251, 191, 36, 0.2);
      border-color: #fbbf24;
    }
    .pos-toggle.active::after {
      left: 22px;
      background: #fbbf24;
    }
    .pos-toggle.active + .asporto-label {
      color: #fbbf24;
    }

    /* ===== SCONTO ===== */
    .discount-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .toggle-unit {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(240, 244, 248, 0.5);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 100ms ease;
      touch-action: manipulation;
      flex-shrink: 0;
    }

    .toggle-unit:active { background: rgba(255, 255, 255, 0.1); }

    /* ===== RIEPILOGO ORDINE (scrollabile) ===== */
    .order-summary-label {
      padding: 10px 16px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(240, 244, 248, 0.25);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      flex-shrink: 0;
    }

    .order-items-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.06) transparent;
    }

    .order-items-scroll::-webkit-scrollbar { width: 4px; }
    .order-items-scroll::-webkit-scrollbar-track { background: transparent; }
    .order-items-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

    .order-empty {
      padding: 24px 16px;
      text-align: center;
      font-size: 13px;
      color: rgba(240, 244, 248, 0.15);
      font-style: italic;
    }

    .order-item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      transition: background 100ms ease;
    }

    .order-item-row:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .order-item-qty {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 13px;
      color: #4ecca3;
      min-width: 26px;
    }

    .order-item-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: rgba(240, 244, 248, 0.7);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .order-item-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 12px;
      color: rgba(240, 244, 248, 0.4);
      white-space: nowrap;
    }

    .order-item-remove {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid rgba(233, 69, 96, 0.2);
      background: rgba(233, 69, 96, 0.06);
      color: #e94560;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 100ms ease;
      touch-action: manipulation;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .order-item-remove:active {
      background: rgba(233, 69, 96, 0.2);
      transform: scale(0.9);
    }

    /* ===== FOOTER ORDINE: totali + bottone ===== */
    .order-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .totals-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(240, 244, 248, 0.35);
    }

    .total-value {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      color: rgba(240, 244, 248, 0.5);
    }

    .total-row.discount-row-display .total-label { color: rgba(255, 217, 61, 0.6); }
    .total-row.discount-row-display .total-value { color: rgba(255, 217, 61, 0.7); }

    .total-row.courtesy-row .total-label { color: #ffd93d; }
    .total-row.courtesy-row .total-value { color: #ffd93d; }

    .total-row.grand-total {
      padding-top: 8px;
      margin-top: 4px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .total-row.grand-total .total-label {
      font-size: 14px;
      font-weight: 700;
      color: rgba(240, 244, 248, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .total-row.grand-total .total-value {
      font-size: 22px;
      font-weight: 800;
      color: #4ecca3;
    }

    .total-row.grand-total .total-value.empty {
      color: rgba(78, 204, 163, 0.2);
    }

    .total-row.grand-total .total-value.courtesy {
      color: #ffd93d;
    }

    .btn-order {
      width: 100%;
      padding: 16px 20px;
      background: rgba(78, 204, 163, 0.12);
      border: 2px solid rgba(78, 204, 163, 0.3);
      border-radius: 10px;
      color: #4ecca3;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-order:active:not(.disabled) {
      transform: scale(0.97);
      background: rgba(78, 204, 163, 0.3);
      border-color: #4ecca3;
    }

    .btn-order.disabled {
      opacity: 0.2;
      pointer-events: none;
    }

    /* ===== FEEDBACK INLINE (sotto bottone ORDINA) ===== */
    .order-progress {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 150ms ease;
    }

    .order-progress.active {
      opacity: 1;
    }

    .order-progress-bar {
      height: 100%;
      width: 0;
      background: #4ecca3;
      border-radius: 2px;
      transition: width 300ms ease;
    }

    .order-progress.active .order-progress-bar {
      width: 70%;
      animation: progress-pulse 800ms ease-in-out infinite alternate;
    }

    .order-progress.done .order-progress-bar {
      width: 100%;
      animation: none;
    }

    @keyframes progress-pulse {
      from { width: 40%; }
      to { width: 85%; }
    }

    .order-feedback {
      width: 100%;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
      padding: 6px 0;
      border-radius: 6px;
      opacity: 0;
      transform: translateY(-4px);
      transition: all 200ms ease;
    }

    .order-feedback.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .order-feedback.success {
      color: #4ecca3;
      background: rgba(78, 204, 163, 0.08);
    }

    .order-feedback.error {
      color: #e94560;
      background: rgba(233, 69, 96, 0.08);
    }

    /* ===== TAB ORDINI — lista storico ordini serata ===== */
    .orders-panel-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .order-history-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      border-left: 3px solid rgba(78, 204, 163, 0.3);
    }

    .order-history-row.cancelled {
      border-left-color: rgba(233, 69, 96, 0.4);
      opacity: 0.5;
    }

    .order-history-row.completed {
      border-left-color: rgba(108, 122, 137, 0.3);
    }

    .oh-info { flex: 1; min-width: 0; }

    .oh-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
      flex-wrap: wrap;
    }

    .oh-id {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 15px;
      color: #fff;
    }

    .oh-table {

    .printer-alert {
      display: none;

    @keyframes pulse-warn {

      50% { opacity: 0.6; }

    @media (max-width: 900px) {
      .order-column {

<body>

        <div class="asporto-row">

          <!-- Riga omaggio -->

    </div>

  </div><!-- fine .app-shell -->

  <script src="/socket.io/socket.io.js"></script>
  <script>

      { id: 'birra_spina', name: 'Birra alla spina', price: 3.50, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'vino_bianco_ombra', name: 'Vino ombra bianco', price: 1.00, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'vino_rosso_ombra', name: 'Vino ombra rosso', price: 1.00, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'vino_bianco_mezzo', name: 'Vino bianco sfuso 1/2L', price: 3.00, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'vino_rosso_mezzo', name: 'Vino rosso sfuso 1/2L', price: 3.00, category: 'bevanda', station: 'bar', print_to: ['bevande'] },

      { id: 'acqua_naturale', name: 'Acqua naturale 1/2L', price: 1.00, category: 'bevanda', station: 'bar', print_to: ['bevande'] },

    ];

    // ===== DISPOSIZIONE TAB CIBO (sezioni con header) =====
    const CIBO_SECTIONS = [
      { label: 'Primi', items: ['gnocchi_ragu', 'gnocchi_burro', 'pasta_ragu', 'pasta_bianco'] },
      { label: 'Secondi', items: ['formaggio_polenta', 'wurstel_patate', 'pastin_patate', 'salsiccia_polenta', 'costicine_polenta', 'sovracoscia_polenta', 'grigliata_mista'] },

      { label: 'Condimenti', items: ['maionese', 'ketchup'] },
    ];

    // ===== DISPOSIZIONE TAB BEVANDE (sezioni raggruppate) =====

      { label: 'Birra', items: ['birra_spina'] },

      { label: 'Lattine', items: ['the_pesca', 'the_limone', 'coca_cola', 'coca_zero', 'fanta'] },
    ];

    // ===== STATO =====
    const quantities = {};
    ITEMS.forEach(i => { quantities[i.id] = 0; });

    let connected = false;
    let submitting = false;
    let activeCourtesy = null; // 'sponsor' | 'don_pierino' | 'amici' | null
    let discountIsPercent = false;
    let currentTab = 'cibo';
    let asportoActive = false;
    let posActive = false;

    // Mappa rapida id → item per lookup veloci
    const itemMap = {};
    ITEMS.forEach(i => { itemMap[i.id] = i; });

    // ===== GENERA HTML per una riga piatto =====
    function renderItemRow(itemId) {
      const item = itemMap[itemId];
      if (!item) return '';
      // Formatta prezzo con virgola (stile italiano)
      const priceFormatted = '\u20AC' + item.price.toFixed(2).replace('.', ',');
      return `
        <div class="menu-row" id="card-${item.id}">
          <span class="row-name">${item.name}</span>
          <span class="row-price">${priceFormatted}</span>
          <div class="row-stepper">
            <button class="step-btn step-minus" onclick="changeQty('${item.id}', -1)">\u2212</button>
            <span class="step-count zero" id="qty-${item.id}">0</span>
            <button class="step-btn step-plus" onclick="changeQty('${item.id}', 1)">+</button>
          </div>
        </div>`;
    }

    // ===== GENERA HTML per una sezione (header + righe piatti) =====
    function renderSection(section, isLast) {
      let html = `<div class="section-header">${section.label}</div>`;
      section.items.forEach(id => {
        html += renderItemRow(id);
      });
      if (!isLast) html += '<div class="sep"></div>';
      return html;
    }

    // ===== RENDER TABS =====
    function renderPanels() {
      // Tab CIBO
      let ciboHtml = '';
      CIBO_SECTIONS.forEach((sec, i) => {
        ciboHtml += renderSection(sec, i === CIBO_SECTIONS.length - 1);
      });
      document.getElementById('panelCibo').innerHTML = ciboHtml;

      // Tab BEVANDE
      let bevandeHtml = '';
      BEVANDE_SECTIONS.forEach((sec, i) => {
        bevandeHtml += renderSection(sec, i === BEVANDE_SECTIONS.length - 1);
      });
      document.getElementById('panelBevande').innerHTML = bevandeHtml;
    }

    renderPanels();

    // ===== SWITCH TAB =====
    function switchTab(tab) {
      if (tab === 'bevande' && asportoActive) return; // Bevande disabilitate in asporto
      currentTab = tab;
      // Aggiorna pulsanti tab
      document.getElementById('tabCibo').classList.toggle('active', tab === 'cibo');
      document.getElementById('tabBevande').classList.toggle('active', tab === 'bevande');
      document.getElementById('tabOrdini').classList.toggle('active', tab === 'ordini');
      // Aggiorna pannelli
      document.getElementById('panelCibo').classList.toggle('active', tab === 'cibo');
      document.getElementById('panelBevande').classList.toggle('active', tab === 'bevande');
      document.getElementById('panelOrdini').classList.toggle('active', tab === 'ordini');
      // Carica ordini quando si apre il tab
      if (tab === 'ordini') loadAllOrders();
    }

    // ===== AGGIORNA BADGE E CHECK SULLE TAB =====
    function updateTabBadges() {
      // Conteggio bevande selezionate (per il badge)
      let drinkCount = 0;
      ITEMS.forEach(item => {
        if (item.category === 'bevanda' && quantities[item.id] > 0) {
          drinkCount += quantities[item.id];
        }
      });
      const badge = document.getElementById('tabBevandeBadge');
      if (drinkCount > 0) {
        badge.textContent = drinkCount;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }

      // Check sulla tab CIBO se ha piatti selezionati
      let foodSelected = false;
      ITEMS.forEach(item => {
        if (item.category !== 'bevanda' && quantities[item.id] > 0) {
          foodSelected = true;
        }
      });
      document.getElementById('tabCiboCheck').classList.toggle('visible', foodSelected);
    }

    // ===== FLAG OMAGGIO: solo uno attivo alla volta =====
    function toggleFlag(type) {
      if (activeCourtesy === type) {
        activeCourtesy = null;
        document.getElementById('flag-' + type).classList.remove('active');
      } else {
        if (activeCourtesy) {
          document.getElementById('flag-' + activeCourtesy).classList.remove('active');
        }
        activeCourtesy = type;
        document.getElementById('flag-' + type).classList.add('active');
      }
      updateOrderColumn();
    }

    // ===== TOGGLE UNITA' SCONTO: € ↔ % =====
    function toggleDiscountUnit() {
      discountIsPercent = !discountIsPercent;
      document.getElementById('discountToggle').textContent = discountIsPercent ? '%' : '\u20AC';
      updateOrderColumn();
    }

    // ===== TOGGLE ASPORTO =====
    // Quando attivo: coperti = 0 e disabilitato, tab bevande disabilitata, niente stampa bevande
    function toggleAsporto() {
      asportoActive = !asportoActive;
      document.getElementById('asportoToggle').classList.toggle('active', asportoActive);

      var copertiInput = document.getElementById('copertiInput');
      var tableField = document.getElementById('tableField');
      var tableInput = document.getElementById('tableInput');
      var nameInput = document.getElementById('nameInput');
      var tabBevande = document.getElementById('tabBevande');

      if (asportoActive) {
        // Disabilita coperti e metti a 0
        copertiInput.value = '0';
        copertiInput.disabled = true;
        copertiInput.parentElement.style.opacity = '0.3';
        // Nascondi tavolo e svuota
        tableField.style.display = 'none';
        tableInput.value = '';
        // Nome diventa obbligatorio
        nameInput.placeholder = 'obbligatorio';
        // Disabilita tab bevande e resetta quantita' bevande
        tabBevande.style.opacity = '0.3';
        tabBevande.style.pointerEvents = 'none';
        ITEMS.forEach(function(item) {
          if (item.category === 'bevanda' && quantities[item.id] > 0) {
            quantities[item.id] = 0;
            var qtyEl = document.getElementById('qty-' + item.id);
            if (qtyEl) { qtyEl.textContent = '0'; qtyEl.classList.add('zero'); }
            var cardEl = document.getElementById('card-' + item.id);
            if (cardEl) cardEl.classList.remove('active');
          }
        });
        // Se siamo sul tab bevande, torna a cibo
        if (currentTab === 'bevande') switchTab('cibo');
      } else {
        // Riabilita coperti
        copertiInput.disabled = false;
        copertiInput.value = '';
        copertiInput.parentElement.style.opacity = '';
        // Rimostra tavolo
        tableField.style.display = '';
        // Nome torna opzionale
        nameInput.placeholder = 'opzionale';
        // Riabilita tab bevande
        tabBevande.style.opacity = '';
        tabBevande.style.pointerEvents = '';
      }

      updateTabBadges();
      updateOrderColumn();
    }

    // ===== TOGGLE POS =====
    function togglePos() {
      posActive = !posActive;
      document.getElementById('posToggle').classList.toggle('active', posActive);
    }

    // ===== CALCOLA TOTALE CON SCONTO E OMAGGIO =====
    function calcOrder() {
      let totalItems = 0;
      let subtotal = 0;
      ITEMS.forEach(item => {
        totalItems += quantities[item.id];
        subtotal += quantities[item.id] * item.price;
      });

      // Arrotonda il subtotale per evitare errori float
      subtotal = Math.round(subtotal * 100) / 100;

      // Se flag omaggio attivo → totale = 0
      if (activeCourtesy) {
        return { totalItems, subtotal, discount: 0, total: 0, courtesyType: activeCourtesy };
      }

      // Calcolo sconto
      const discountInput = parseFloat(document.getElementById('discountInput').value) || 0;
      let discount = 0;
      if (discountInput > 0) {
        if (discountIsPercent) {
          discount = subtotal * (discountInput / 100);
        } else {
          discount = discountInput;
        }
        discount = Math.min(discount, subtotal);
        discount = Math.round(discount * 100) / 100;
      }

      return { totalItems, subtotal, discount, total: Math.round((subtotal - discount) * 100) / 100, courtesyType: null };
    }

    // ===== LOGICA QUANTITA' =====
    function changeQty(id, delta) {
      if (!connected || submitting) return;
      quantities[id] = Math.max(0, quantities[id] + delta);

      const countEl = document.getElementById('qty-' + id);
      countEl.textContent = quantities[id];
      countEl.classList.toggle('zero', quantities[id] === 0);

      const card = document.getElementById('card-' + id);
      card.classList.toggle('active', quantities[id] > 0);

      updateTabBadges();
      updateOrderColumn();
    }

    // ===== RIMUOVI PIATTO DAL RIEPILOGO (click sulla X) =====
    function removeItem(id) {
      if (submitting) return;
      quantities[id] = 0;

      const countEl = document.getElementById('qty-' + id);
      if (countEl) {
        countEl.textContent = '0';
        countEl.classList.add('zero');
      }

      const card = document.getElementById('card-' + id);
      if (card) {
        card.classList.remove('active');
      }

      updateTabBadges();
      updateOrderColumn();
    }

    // ===== FORMATTA PREZZO IN STILE ITALIANO =====
    function formatPrice(value) {
      return '\u20AC ' + value.toFixed(2).replace('.', ',');
    }

    // ===== AGGIORNA TUTTA LA COLONNA ORDINE =====
    function updateOrderColumn() {
      const { totalItems, subtotal, discount, total, courtesyType } = calcOrder();

      // Riepilogo piatti
      const listEl = document.getElementById('orderItemsList');
      const emptyEl = document.getElementById('orderEmpty');

      // Raccogli tutti i piatti selezionati (nell'ordine del menu)
      const selectedItems = ITEMS.filter(item => quantities[item.id] > 0);

      if (selectedItems.length === 0) {
        listEl.innerHTML = '<div class="order-empty">Nessun piatto selezionato</div>';
      } else {
        let html = '';
        selectedItems.forEach(item => {
          const linePrice = item.price * quantities[item.id];
          html += `
            <div class="order-item-row">
              <span class="order-item-qty">${quantities[item.id]}x</span>
              <span class="order-item-name">${item.name}</span>
              <span class="order-item-price">${formatPrice(linePrice)}</span>
              <button class="order-item-remove" onclick="removeItem('${item.id}')">&times;</button>
            </div>`;
        });
        listEl.innerHTML = html;
      }

      // Totali
      const subtotalRow = document.getElementById('subtotalRow');
      const discountRow = document.getElementById('discountRow');
      const courtesyRow = document.getElementById('courtesyRow');
      const grandTotal = document.getElementById('grandTotal');

      // Mostra subtotale solo se c'e' sconto o omaggio
      const hasDiscount = discount > 0 && !courtesyType;
      const hasCourtesy = !!courtesyType && totalItems > 0;

      subtotalRow.style.display = (hasDiscount || hasCourtesy) ? 'flex' : 'none';
      document.getElementById('subtotalValue').textContent = formatPrice(subtotal);

      // Riga sconto
      discountRow.style.display = hasDiscount ? 'flex' : 'none';
      if (hasDiscount) {
        const discountInput = parseFloat(document.getElementById('discountInput').value) || 0;
        const unitLabel = discountIsPercent ? `(${discountInput}%)` : '';
        document.getElementById('discountLabel').textContent = 'Sconto ' + unitLabel;
        document.getElementById('discountDisplay').textContent = '\u2212' + formatPrice(discount);
      }

      // Riga omaggio
      courtesyRow.style.display = hasCourtesy ? 'flex' : 'none';
      if (hasCourtesy) {
        const courtesyNames = { sponsor: 'Sponsor', don_pierino: 'Don Pierino', amici: 'Amici' };
        document.getElementById('courtesyLabel').textContent = courtesyNames[courtesyType];
      }

      // Totale finale
      grandTotal.textContent = formatPrice(total);
      grandTotal.classList.toggle('empty', totalItems === 0);
      grandTotal.classList.toggle('courtesy', hasCourtesy);

      // Abilita/disabilita bottone ORDINA
      const tableValue = document.getElementById('tableInput').value;
      const copertiValue = document.getElementById('copertiInput').value;
      const nameValue = document.getElementById('nameInput').value.trim();
      var canOrder;
      if (asportoActive) {
        // Asporto: nome obbligatorio, no tavolo/coperti
        canOrder = totalItems > 0 && nameValue;
      } else {
        // Normale: tavolo e coperti obbligatori
        canOrder = totalItems > 0 && tableValue && copertiValue;
      }
      document.getElementById('btnOrder').classList.toggle('disabled', !canOrder);
    }

    // ===== INVIO ORDINE =====
    async function submitOrder() {
      if (!connected || submitting) return;

      const tableInput = document.getElementById('tableInput');
      const copertiInputEl = document.getElementById('copertiInput');
      const nameInputEl = document.getElementById('nameInput');
      const table = parseInt(tableInput.value) || 0;
      const coperti = parseInt(copertiInputEl.value);

      if (asportoActive) {
        // Asporto: nome obbligatorio
        if (!nameInputEl.value.trim()) {
          nameInputEl.parentElement.classList.add('error');
          setTimeout(function() { nameInputEl.parentElement.classList.remove('error'); }, 400);
          nameInputEl.focus();
          return;
        }
      } else {
        // Normale: tavolo e coperti obbligatori
        if (!table || table < 1) {
          const field = document.getElementById('tableField');
          field.classList.add('error');
          setTimeout(function() { field.classList.remove('error'); }, 400);
          tableInput.focus();
          return;
        }
        if (!coperti || coperti < 1) {
          const field = document.getElementById('copertiField');
          field.classList.add('error');
          setTimeout(function() { field.classList.remove('error'); }, 400);
          copertiInputEl.focus();
          return;
        }
      }

      const items = ITEMS
        .filter(function(item) { return quantities[item.id] > 0; })
        .map(function(item) { return { id: item.id, qty: quantities[item.id] }; });

      if (items.length === 0) return;

      const { subtotal, discount, total, courtesyType } = calcOrder();
      const customerName = document.getElementById('nameInput').value.trim() || null;
      const discountRaw = parseFloat(document.getElementById('discountInput').value) || 0;

      submitting = true;
      var btnOrder = document.getElementById('btnOrder');
      var progress = document.getElementById('orderProgress');
      var feedback = document.getElementById('orderFeedback');
      btnOrder.classList.add('disabled');

      // Mostra barra di caricamento
      feedback.classList.remove('visible', 'success', 'error');
      progress.classList.remove('done');
      progress.classList.add('active');

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            table: table,
            items: items,
            customer_name: customerName,
            discount: discount,
            discount_type: discountIsPercent ? 'percent' : 'euro',
            discount_value: discountRaw,
            courtesy_type: courtesyType,
            source: 'principale',
            coperti: asportoActive ? 0 : coperti,
            asporto: asportoActive,
            payment: posActive ? 'pos' : 'contanti',
          }),
        });
        const data = await res.json();

        // Barra completata
        progress.classList.remove('active');
        progress.classList.add('done');

        if (data.success) {
          // Feedback inline
          let msg = data.order_number;
          if (data.table > 0) msg += '  Tav.' + data.table;
          if (data.courtesy_type) {
            const names = { sponsor: 'Sponsor', don_pierino: 'Don Pierino', amici: 'Amici' };
            msg += '  OMAGGIO ' + names[data.courtesy_type];
          } else {
            msg += '  ' + formatPrice(data.total);
          }
          feedback.textContent = msg;
          feedback.classList.add('visible', 'success');

          // Aggiorna "ultimo ordine" nel header
          const lastEl = document.getElementById('lastOrder');
          lastEl.textContent = 'Ultimo: ' + data.order_number;
          lastEl.classList.add('visible');

          resetOrder();

          // Nascondi feedback dopo 3s
          setTimeout(function() {
            feedback.classList.remove('visible');
            progress.classList.remove('done');
          }, 3000);
        } else {
          feedback.textContent = data.error || 'Errore sconosciuto';
          feedback.classList.add('visible', 'error');
          setTimeout(function() {
            feedback.classList.remove('visible');
            progress.classList.remove('done');
          }, 4000);
        }
      } catch (err) {
        progress.classList.remove('active');
        progress.classList.add('done');
        feedback.textContent = 'Errore di rete';
        feedback.classList.add('visible', 'error');
        setTimeout(function() {
          feedback.classList.remove('visible');
          progress.classList.remove('done');
        }, 4000);
      }

      submitting = false;
    }

    // ===== RESET ORDINE =====
    function resetOrder() {
      ITEMS.forEach(function(item) {
        quantities[item.id] = 0;
        var qtyEl = document.getElementById('qty-' + item.id);
        if (qtyEl) {
          qtyEl.textContent = '0';
          qtyEl.classList.add('zero');
        }
        var cardEl = document.getElementById('card-' + item.id);
        if (cardEl) {
          cardEl.classList.remove('active');
        }
      });

      document.getElementById('tableInput').value = '';
      document.getElementById('copertiInput').value = '';
      document.getElementById('nameInput').value = '';
      document.getElementById('discountInput').value = '';

      // Reset flag omaggio
      if (activeCourtesy) {
        document.getElementById('flag-' + activeCourtesy).classList.remove('active');
        activeCourtesy = null;
      }

      // Reset asporto
      if (asportoActive) {
        asportoActive = false;
        document.getElementById('asportoToggle').classList.remove('active');
        document.getElementById('copertiInput').disabled = false;
        document.getElementById('copertiInput').parentElement.style.opacity = '';
        document.getElementById('tableField').style.display = '';
        document.getElementById('nameInput').placeholder = 'opzionale';
        document.getElementById('tabBevande').style.opacity = '';
        document.getElementById('tabBevande').style.pointerEvents = '';
      }

      // Reset POS
      if (posActive) {
        posActive = false;
        document.getElementById('posToggle').classList.remove('active');
      }

      // Reset sconto
      discountIsPercent = false;
      document.getElementById('discountToggle').textContent = '\u20AC';

      // Torna alla tab CIBO dopo reset
      switchTab('cibo');
      updateTabBadges();
      updateOrderColumn();
    }

    // ===== OVERLAY =====
    // ===== TAB ORDINI — carica e mostra tutti gli ordini della serata =====
    async function loadAllOrders() {
      try {
        const res = await fetch('/api/orders/all');
        const data = await res.json();
        renderAllOrders(data);
      } catch (e) {
        document.getElementById('ordiniList').innerHTML = '';
        document.getElementById('ordiniEmpty').textContent = 'Errore caricamento ordini';
        document.getElementById('ordiniEmpty').style.display = 'block';
      }
    }

    function renderAllOrders(orderList) {
      const listEl = document.getElementById('ordiniList');
      const emptyEl = document.getElementById('ordiniEmpty');
      if (orderList.length === 0) {
        listEl.innerHTML = '';
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      listEl.innerHTML = orderList.map(function(o) {
        var statusClass = o.status;
        var statusLabel = o.status === 'in_progress' ? 'APERTO' : o.status === 'completed' ? 'EVASO' : 'ANNULLATO';
        var courtesyTag = o.courtesy_type ? '<span class="oh-courtesy">OMAGGIO</span>' : '';
        var asportoTag = o.asporto ? '<span class="oh-courtesy" style="color:#22d3ee">ASPORTO</span>' : '';
        var cancelBtn = o.status === 'in_progress'
          ? '<button class="oh-btn-cancel" onclick="cancelOrderFromCassa(' + o.id + ')">Annulla</button>'
          : '';
        return '<div class="order-history-row ' + statusClass + '">' +
          '<div class="oh-info">' +
            '<div class="oh-meta">' +
              '<span class="oh-id">' + o.id + '</span>' +
              (o.table > 0 ? '<span class="oh-table">Tav.' + o.table + '</span>' : '') +
              '<span class="oh-status ' + statusClass + '">' + statusLabel + '</span>' +
              courtesyTag + asportoTag +
              '<span class="oh-total">' + formatPrice(o.total) + '</span>' +
            '</div>' +
            '<div class="oh-items">' + escHTML(o.items_summary) + '</div>' +
          '</div>' +
          cancelBtn +
        '</div>';
      }).join('');
    }

    function escHTML(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    async function cancelOrderFromCassa(orderId) {
      if (!confirm('Annullare l\'ordine #' + orderId + '?\nScorte e contatori verranno ripristinati.')) return;
      try {
        var res = await fetch('/api/orders/' + orderId + '/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        var data = await res.json();
        if (data.success) {
          loadAllOrders(); // Ricarica la lista
        } else {
          alert(data.error || 'Errore annullamento');
        }
      } catch (e) {
        alert('Errore di rete');
      }
    }

    // ===== SOCKET.IO =====
    var socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    var offlineBanner = document.getElementById('offlineBanner');
    var statusLed = document.getElementById('statusLed');
    var statusText = document.getElementById('statusText');
    var tabStatus = document.getElementById('tabStatus');

    socket.on('connect', function() {
      connected = true;
      socket.emit('register', { role: 'cassa' });
      offlineBanner.classList.remove('visible');
      statusLed.classList.add('on');
      statusLed.classList.remove('off');
      tabStatus.classList.add('online');
      tabStatus.classList.remove('offline');
      statusText.textContent = 'Connesso';
      // Abilita il pulsante ordina se condizioni soddisfatte
      updateOrderColumn();
    });

    socket.on('disconnect', function() {
      connected = false;
      offlineBanner.classList.add('visible');
      statusLed.classList.remove('on');
      statusLed.classList.add('off');
      tabStatus.classList.remove('online');
      tabStatus.classList.add('offline');
      statusText.textContent = 'Offline';
    });

    // ===== STAMPANTE OFFLINE: alert + beep =====
    var printerAlert = document.getElementById('printerAlert');
    var printerAlertText = document.getElementById('printerAlertText');

    // Beep audio per alert stampante (Web Audio API, senza file esterni)
    function beepAlert() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch (e) { /* Audio non supportato */ }
    }

    // Ascolta lo stato delle stampanti dal proxy
    socket.on('printers_status_update', function(statuses) {
      var offlinePrinters = statuses.filter(function(s) { return !s.online; });
      if (offlinePrinters.length > 0) {
        var names = offlinePrinters.map(function(p) { return p.id; }).join(', ');
        printerAlertText.textContent = 'Stampante offline: ' + names;
        printerAlert.classList.add('visible');
        beepAlert();
      } else {
        printerAlert.classList.remove('visible');
      }
    });

    // Richiedi controllo stampanti dopo connessione
    socket.on('connect', function() {
      setTimeout(function() { socket.emit('request_printer_check'); }, 2000);
    });

    // Aggiorna tab ordini in tempo reale quando cambiano gli ordini
    socket.on('order_created', function() {
      if (currentTab === 'ordini') loadAllOrders();
    });
    socket.on('order_cancelled', function() {
      if (currentTab === 'ordini') loadAllOrders();
    });
    socket.on('order_fulfilled_broadcast', function() {
      if (currentTab === 'ordini') loadAllOrders();
    });

    // Ascolta aggiornamenti inventario dal server per segnalare piatti esauriti
    socket.on('inventory_exhausted', function(data) {
      var card = document.getElementById('card-' + data.item_id);
      if (card) {
        card.style.opacity = '0.3';
        card.style.pointerEvents = 'none';
      }
    });

    // ===== INPUT LISTENER per aggiornamento in tempo reale =====
    document.getElementById('tableInput').addEventListener('input', updateOrderColumn);
    document.getElementById('copertiInput').addEventListener('input', updateOrderColumn);
    document.getElementById('nameInput').addEventListener('input', updateOrderColumn);
    document.getElementById('discountInput').addEventListener('input', updateOrderColumn);

    // Init
    updateTabBadges();
    updateOrderColumn();
  </script>
</body>
</html>
