<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SagrApp — Cassa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060a12;
      color: #f0f4f8;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(240, 244, 248, 0.5);
    }

    .header-last-order {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: rgba(78, 204, 163, 0.6);
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .header-last-order.visible { opacity: 1; }

    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #6c7a89;
    }

    .header-status.online { color: #4ecca3; }
    .header-status.offline { color: #e94560; }

    .status-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6c7a89;
      transition: all 200ms ease;
    }

    .status-led.on { background: #4ecca3; box-shadow: 0 0 6px #4ecca3; }
    .status-led.off { background: #e94560; box-shadow: 0 0 6px #e94560; }

    /* ===== LAYOUT DUE COLONNE (identico al foglio cartaceo) ===== */
    .menu-wrapper {
      flex: 1;
      display: flex;
      gap: 12px;
      padding: 8px 10px 132px;
      overflow-y: auto;
      align-items: flex-start;
    }

    .menu-col {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ===== RIGA PIATTO ===== */
    .menu-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 6px;
      transition: background 120ms ease;
      min-height: 38px;
    }

    .menu-row:active {
      background: rgba(255, 255, 255, 0.04);
    }

    .menu-row.active {
      background: rgba(78, 204, 163, 0.06);
    }

    .row-name {
      flex: 1;
      font-weight: 500;
      font-size: 13px;
      color: rgba(240, 244, 248, 0.8);
      line-height: 1.2;
      min-width: 0;
    }

    .menu-row.active .row-name {
      color: #f0f4f8;
      font-weight: 600;
    }

    .row-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 12px;
      color: rgba(78, 204, 163, 0.6);
      white-space: nowrap;
      min-width: 46px;
      text-align: right;
    }

    .menu-row.active .row-price {
      color: #4ecca3;
    }

    /* ===== STEPPER COMPATTO ===== */
    .row-stepper {
      display: flex;
      align-items: center;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .step-btn {
      width: 34px;
      height: 32px;
      background: rgba(255, 255, 255, 0.02);
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 80ms ease;
      line-height: 1;
      padding: 0;
    }

    .step-btn:active { background: rgba(255, 255, 255, 0.1); }
    .step-minus { color: #e94560; border-right: 1px solid rgba(255, 255, 255, 0.04); }
    .step-plus { color: #4ecca3; border-left: 1px solid rgba(255, 255, 255, 0.04); }

    .step-count {
      width: 28px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      height: 32px;
      line-height: 32px;
      background: rgba(255, 255, 255, 0.015);
      transition: color 150ms ease;
    }

    .step-count.zero { color: rgba(255, 255, 255, 0.15); }

    /* ===== SEPARATORE tra gruppi ===== */
    .sep {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 4px 8px;
    }

    /* ===== ORDER BAR ===== */
    .order-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(10, 14, 22, 0.96);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 50;
    }

    .table-field {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 6px 8px;
      flex-shrink: 0;
      transition: border-color 200ms ease;
    }

    .table-field.error {
      border-color: #e94560;
      animation: shake 300ms ease;
    }

    @keyframes shake {
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }

    .table-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: rgba(240, 244, 248, 0.35);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .table-field input {
      width: 40px;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      -moz-appearance: textfield;
    }

    .table-field input::placeholder { color: rgba(255, 255, 255, 0.15); }
    .table-field input::-webkit-outer-spin-button,
    .table-field input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .order-summary {
      flex: 1;
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }

    .order-total {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(20px, 5vw, 28px);
      color: #4ecca3;
      line-height: 1;
      transition: color 150ms ease;
    }

    .order-total.empty { color: rgba(78, 204, 163, 0.25); }

    .order-count {
      font-size: 11px;
      font-weight: 600;
      color: rgba(240, 244, 248, 0.35);
      line-height: 1;
      min-height: 13px;
    }

    .btn-order {
      padding: 14px 20px;
      background: rgba(78, 204, 163, 0.12);
      border: 2px solid rgba(78, 204, 163, 0.3);
      border-radius: 10px;
      color: #4ecca3;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: clamp(14px, 3.5vw, 18px);
      letter-spacing: 0.06em;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 120ms ease;
      flex-shrink: 0;
    }

    .btn-order:active:not(.disabled) {
      transform: scale(0.95);
      background: rgba(78, 204, 163, 0.3);
      border-color: #4ecca3;
    }

    .btn-order.disabled { opacity: 0.25; pointer-events: none; }

    /* ===== OVERLAYS ===== */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .overlay.visible { opacity: 1; pointer-events: auto; }
    .overlay-success { background: rgba(78, 204, 163, 0.93); }
    .overlay-error { background: rgba(233, 69, 96, 0.93); }

    .overlay-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(64px, 20vw, 130px);
      line-height: 1;
      color: #fff;
      margin-bottom: 8px;
    }

    .overlay-text {
      font-weight: 700;
      font-size: clamp(18px, 4.5vw, 30px);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fff;
    }

    .overlay-sub {
      font-size: clamp(14px, 3vw, 20px);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 6px;
    }

    .overlay-prints {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .print-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      letter-spacing: 0.03em;
    }

    /* ===== BANNER DISCONNESSIONE ===== */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px 20px;
      background: #e94560;
      color: #fff;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 200;
      transform: translateY(-100%);
      transition: transform 300ms ease;
    }

    .offline-banner.visible { transform: translateY(0); }

    /* ===== RIGA SUPERIORE ORDER BAR ===== */
    .order-top {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      margin-bottom: 6px;
    }

    .order-bottom {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .field-group {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 4px 8px;
      flex-shrink: 0;
    }

    .field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      color: rgba(240, 244, 248, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field-group input[type="text"] {
      width: 110px;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }

    .field-group input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.12); }

    .field-group input[type="number"] {
      width: 36px;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      -moz-appearance: textfield;
    }

    .field-group input[type="number"]::-webkit-outer-spin-button,
    .field-group input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .field-group input[type="number"]::placeholder { color: rgba(255, 255, 255, 0.12); }

    .toggle-unit {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(240, 244, 248, 0.5);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 100ms ease;
      touch-action: manipulation;
    }

    .toggle-unit:active { background: rgba(255, 255, 255, 0.1); }

    .courtesy-flags {
      display: flex;
      gap: 6px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .flag-btn {
      padding: 5px 10px;
      border-radius: 20px;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
      color: rgba(255, 255, 255, 0.35);
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 120ms ease;
      touch-action: manipulation;
      white-space: nowrap;
    }

    .flag-btn:active { transform: scale(0.95); }

    .flag-btn.active {
      border-color: #ffd93d;
      background: rgba(255, 217, 61, 0.12);
      color: #ffd93d;
      box-shadow: 0 0 10px rgba(255, 217, 61, 0.1);
    }

    /* Indicatore omaggio sul totale */
    .order-total.courtesy {
      color: #ffd93d;
      font-size: clamp(16px, 4vw, 22px);
    }

    .courtesy-label {
      font-size: 10px;
      font-weight: 700;
      color: #ffd93d;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .real-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: rgba(240, 244, 248, 0.25);
      text-decoration: line-through;
    }

    .discount-label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255, 217, 61, 0.6);
    }
  </style>
</head>
<body>

  <!-- Banner disconnessione -->
  <div class="offline-banner" id="offlineBanner">CONNESSIONE PERSA</div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="header-title">Cassa</span>
      <span class="header-last-order" id="lastOrder"></span>
    </div>
    <span class="header-status" id="headerStatus">
      <span class="status-led" id="statusLed"></span>
      <span id="statusText">...</span>
    </span>
  </header>

  <!-- Due colonne — stessa disposizione del foglio cartaceo -->
  <div class="menu-wrapper">
    <div class="menu-col" id="colLeft"></div>
    <div class="menu-col" id="colRight"></div>
  </div>

  <!-- Barra ordine — due righe -->
  <div class="order-bar">
    <!-- Riga superiore: nome, sconto, flag omaggio -->
    <div class="order-top">
      <div class="field-group">
        <span class="field-label">Nome</span>
        <input type="text" id="nameInput" placeholder="opzionale" autocomplete="off">
      </div>
      <div class="field-group">
        <span class="field-label">Sconto</span>
        <input type="number" id="discountInput" inputmode="decimal" min="0" step="any" placeholder="0">
        <button class="toggle-unit" id="discountToggle" onclick="toggleDiscountUnit()">&euro;</button>
      </div>
      <div class="courtesy-flags">
        <button class="flag-btn" id="flag-sponsor" onclick="toggleFlag('sponsor')">Sponsor</button>
        <button class="flag-btn" id="flag-don_pierino" onclick="toggleFlag('don_pierino')">Don Pierino</button>
        <button class="flag-btn" id="flag-amici" onclick="toggleFlag('amici')">Amici</button>
      </div>
    </div>
    <!-- Riga inferiore: tavolo, totale, ordina -->
    <div class="order-bottom">
      <div class="table-field" id="tableField">
        <span class="table-label">Tav</span>
        <input type="number" id="tableInput" inputmode="numeric" min="1" max="99" placeholder="&mdash;">
      </div>
      <div class="order-summary">
        <span class="order-count" id="orderCount"></span>
        <span class="order-total empty" id="orderTotal">&euro; 0.00</span>
      </div>
      <button class="btn-order disabled" id="btnOrder" onclick="submitOrder()">ORDINA</button>
    </div>
  </div>

  <!-- Overlay successo -->
  <div class="overlay overlay-success" id="overlay-success">
    <div class="overlay-number" id="successNumber"></div>
    <div class="overlay-text">Ordine creato</div>
    <div class="overlay-sub" id="successSub"></div>
    <div class="overlay-prints" id="successPrints"></div>
  </div>

  <!-- Overlay errore -->
  <div class="overlay overlay-error" id="overlay-error">
    <div class="overlay-number">!</div>
    <div class="overlay-text" id="errorText">Errore</div>
    <div class="overlay-sub" id="errorSub"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>

      { id: 'vino_rosso_trequarti', name: 'Vino rosso sfuso 3/4L', price: 4.00, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'prosecco', name: 'Prosecco Superiore DOCG', price: 9.00, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'cabernet', name: 'Bottiglia Cabernet', price: 7.50, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'acqua_naturale', name: 'Acqua naturale 1/2L', price: 1.00, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'acqua_frizzante', name: 'Acqua frizzante 1/2L', price: 1.00, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'the_pesca', name: 'The alla pesca', price: 2.30, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'the_limone', name: 'The al limone', price: 2.30, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'coca_cola', name: 'Coca Cola', price: 2.30, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'coca_zero', name: 'Coca Cola Zero', price: 2.30, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
      { id: 'fanta', name: 'Fanta', price: 2.30, category: 'bevanda', station: 'bar', print_to: ['bevande'] },
    ];

    // ===== DISPOSIZIONE COLONNE — identica al foglio cartaceo =====
    // '---' = separatore visivo tra gruppi

    const LEFT_COL = [
      // Primi
      'gnocchi_ragu', 'gnocchi_burro', 'pasta_ragu', 'pasta_bianco',
      '---',
      // Secondi
      'formaggio_polenta', 'wurstel_patate', 'pastin_patate', 'salsiccia_polenta',
      'costicine_polenta', 'sovracoscia_polenta', 'grigliata_mista',
      '---',
      // Piatti speciali
      'pesce_fritto', 'coniglio', 'costata', 'galletto_patate',
      'trippa', 'paella', 'spiedo', 'frico',
      '---',
      // Condimenti
      'maionese', 'ketchup',
    ];

    const RIGHT_COL = [
      // Contorni
      'patate_fritte', 'fagioli', 'fagioli_cipolla', 'cappuccio', 'funghi',
      '---',
      // Birra
      'birra_spina',
      '---',
      // Vini sfusi
      'vino_bianco_ombra', 'vino_rosso_ombra',
      'vino_bianco_mezzo', 'vino_rosso_mezzo',
      'vino_bianco_trequarti', 'vino_rosso_trequarti',
      '---',
      // Bottiglie
      'prosecco', 'cabernet',
      '---',
      // Acqua
      'acqua_naturale', 'acqua_frizzante',
      '---',
      // Lattine
      'the_pesca', 'the_limone', 'coca_cola', 'coca_zero', 'fanta',
    ];

    const quantities = {};
    ITEMS.forEach(i => { quantities[i.id] = 0; });

    let connected = false;
    let submitting = false;
    let activeCourtesy = null; // 'sponsor' | 'don_pierino' | 'amici' | null
    let discountIsPercent = false;

    // --- Genera HTML di una colonna ---
    function renderCol(entries) {
      return entries.map(entry => {
        if (entry === '---') return '<div class="sep"></div>';
        const item = ITEMS.find(i => i.id === entry);
        if (!item) return '';
        return `
          <div class="menu-row" id="card-${item.id}">
            <span class="row-name">${item.name}</span>
            <span class="row-price">\u20AC${item.price.toFixed(2)}</span>
            <div class="row-stepper">
              <button class="step-btn step-minus" onclick="changeQty('${item.id}', -1)">\u2212</button>
              <span class="step-count zero" id="qty-${item.id}">0</span>
              <button class="step-btn step-plus" onclick="changeQty('${item.id}', 1)">+</button>
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('colLeft').innerHTML = renderCol(LEFT_COL);
    document.getElementById('colRight').innerHTML = renderCol(RIGHT_COL);

    // --- Flag omaggio: solo uno attivo alla volta ---
    function toggleFlag(type) {
      if (activeCourtesy === type) {
        activeCourtesy = null;
        document.getElementById(`flag-${type}`).classList.remove('active');
      } else {
        // Disattiva il precedente
        if (activeCourtesy) {
          document.getElementById(`flag-${activeCourtesy}`).classList.remove('active');
        }
        activeCourtesy = type;
        document.getElementById(`flag-${type}`).classList.add('active');
      }
      updateOrderBar();
    }

    // --- Toggle unità sconto: € ↔ % ---
    function toggleDiscountUnit() {
      discountIsPercent = !discountIsPercent;
      document.getElementById('discountToggle').textContent = discountIsPercent ? '%' : '\u20AC';
      updateOrderBar();
    }

    // --- Calcola totale con sconto e omaggio ---
    function calcOrder() {
      let totalItems = 0;
      let subtotal = 0;
      ITEMS.forEach(item => {
        totalItems += quantities[item.id];
        subtotal += quantities[item.id] * item.price;
      });

      // Se flag omaggio attivo → totale = 0, ma il valore reale resta
      if (activeCourtesy) {
        return { totalItems, subtotal, discount: 0, total: 0, courtesyType: activeCourtesy };
      }

      // Calcolo sconto
      const discountInput = parseFloat(document.getElementById('discountInput').value) || 0;
      let discount = 0;
      if (discountInput > 0) {
        if (discountIsPercent) {
          discount = subtotal * (discountInput / 100);
        } else {
          discount = discountInput;
        }
        discount = Math.min(discount, subtotal);
        discount = Math.round(discount * 100) / 100;
      }

      return { totalItems, subtotal, discount, total: subtotal - discount, courtesyType: null };
    }

    // --- Logica quantità ---
    function changeQty(id, delta) {
      if (!connected || submitting) return;
      quantities[id] = Math.max(0, quantities[id] + delta);

      const countEl = document.getElementById(`qty-${id}`);
      countEl.textContent = quantities[id];
      countEl.classList.toggle('zero', quantities[id] === 0);

      const card = document.getElementById(`card-${id}`);
      card.classList.toggle('active', quantities[id] > 0);

      updateOrderBar();
    }

    function updateOrderBar() {
      const { totalItems, subtotal, discount, total, courtesyType } = calcOrder();

      const countEl = document.getElementById('orderCount');
      const totalEl = document.getElementById('orderTotal');
      const btnOrder = document.getElementById('btnOrder');

      // Conteggio piatti
      countEl.innerHTML = '';
      if (totalItems > 0) {
        let label = `${totalItems} piatt${totalItems === 1 ? 'o' : 'i'}`;
        // Mostra info extra sotto il conteggio
        if (courtesyType) {
          const names = { sponsor: 'Sponsor', don_pierino: 'Don Pierino', amici: 'Amici' };
          label += ` <span class="courtesy-label">OMAGGIO ${names[courtesyType]}</span>`;
          if (subtotal > 0) label += ` <span class="real-value">\u20AC${subtotal.toFixed(2)}</span>`;
        } else if (discount > 0) {
          label += ` <span class="discount-label">-\u20AC${discount.toFixed(2)}</span>`;
        }
        countEl.innerHTML = label;
      }

      // Totale
      totalEl.textContent = `\u20AC ${total.toFixed(2)}`;
      totalEl.classList.toggle('empty', totalItems === 0);
      totalEl.classList.toggle('courtesy', !!courtesyType && totalItems > 0);

      const tableValue = document.getElementById('tableInput').value;
      btnOrder.classList.toggle('disabled', totalItems === 0 || !tableValue);
    }

    // --- Invio ordine ---
    async function submitOrder() {
      if (!connected || submitting) return;

      const tableInput = document.getElementById('tableInput');
      const table = parseInt(tableInput.value);

      if (!table || table < 1) {
        const field = document.getElementById('tableField');
        field.classList.add('error');
        setTimeout(() => field.classList.remove('error'), 400);
        tableInput.focus();
        return;
      }

      const items = ITEMS
        .filter(item => quantities[item.id] > 0)
        .map(item => ({ id: item.id, qty: quantities[item.id] }));

      if (items.length === 0) return;

      const { subtotal, discount, total, courtesyType } = calcOrder();
      const customerName = document.getElementById('nameInput').value.trim() || null;
      const discountRaw = parseFloat(document.getElementById('discountInput').value) || 0;

      submitting = true;

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            table,
            items,
            customer_name: customerName,
            discount: discount,
            discount_type: discountIsPercent ? 'percent' : 'euro',
            discount_value: discountRaw,
            courtesy_type: courtesyType,
          }),
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('successNumber').textContent = `#${data.order_number}`;
          // Mostra il totale effettivo pagato
          let subText = `Tavolo ${data.table} \u2014 \u20AC ${data.total.toFixed(2)}`;
          if (data.courtesy_type) {
            const names = { sponsor: 'Sponsor', don_pierino: 'Don Pierino', amici: 'Amici' };
            subText = `Tavolo ${data.table} \u2014 OMAGGIO ${names[data.courtesy_type]}`;
          }
          document.getElementById('successSub').textContent = subText;

          const printsEl = document.getElementById('successPrints');
          const badges = [];
          if (data.prints.receipt) badges.push('Ricevuta');
          if (data.prints.food) badges.push('Comanda cibo');
          if (data.prints.drinks) badges.push('Comanda bevande');
          if (data.prints.special) badges.push('Piatti speciali');
          printsEl.innerHTML = badges.map(b => `<span class="print-badge">${b}</span>`).join('');

          showOverlay('success');

          const lastEl = document.getElementById('lastOrder');
          lastEl.textContent = `Ultimo: #${data.order_number}`;
          lastEl.classList.add('visible');

          resetOrder();
        } else {
          document.getElementById('errorText').textContent = 'Errore';
          document.getElementById('errorSub').textContent = data.error || 'Errore sconosciuto';
          showOverlay('error');
        }
      } catch (err) {
        document.getElementById('errorText').textContent = 'Errore di rete';
        document.getElementById('errorSub').textContent = 'Verifica la connessione';
        showOverlay('error');
      }

      submitting = false;
    }

    function resetOrder() {
      ITEMS.forEach(item => {
        quantities[item.id] = 0;
        document.getElementById(`qty-${item.id}`).textContent = '0';
        document.getElementById(`qty-${item.id}`).classList.add('zero');
        document.getElementById(`card-${item.id}`).classList.remove('active');
      });
      document.getElementById('tableInput').value = '';
      document.getElementById('nameInput').value = '';
      document.getElementById('discountInput').value = '';
      // Reset flag omaggio
      if (activeCourtesy) {
        document.getElementById(`flag-${activeCourtesy}`).classList.remove('active');
        activeCourtesy = null;
      }
      updateOrderBar();
    }

    function showOverlay(type) {
      const el = document.getElementById(`overlay-${type}`);
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 2500);
    }

    // --- Socket.IO ---
    const socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    const offlineBanner = document.getElementById('offlineBanner');
    const statusLed = document.getElementById('statusLed');
    const statusText = document.getElementById('statusText');
    const headerStatus = document.getElementById('headerStatus');

    socket.on('connect', () => {
      connected = true;
      socket.emit('register', { role: 'cassa' });
      offlineBanner.classList.remove('visible');
      statusLed.classList.add('on');
      statusLed.classList.remove('off');
      headerStatus.classList.add('online');
      headerStatus.classList.remove('offline');
      statusText.textContent = 'Connesso';
    });

    socket.on('disconnect', () => {
      connected = false;
      offlineBanner.classList.add('visible');
      statusLed.classList.remove('on');
      statusLed.classList.add('off');
      headerStatus.classList.remove('online');
      headerStatus.classList.add('offline');
      statusText.textContent = 'Offline';
    });

    document.getElementById('tableInput').addEventListener('input', updateOrderBar);
    document.getElementById('discountInput').addEventListener('input', updateOrderBar);
  </script>
</body>
</html>
