<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SagrApp — Cassa Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060a12;
      color: #f0f4f8;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(240, 244, 248, 0.5);
    }

    .header-last-order {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: rgba(78, 204, 163, 0.6);
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .header-last-order.visible { opacity: 1; }

    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #6c7a89;
    }

    .header-status.online { color: #4ecca3; }
    .header-status.offline { color: #e94560; }

    .status-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6c7a89;
      transition: all 200ms ease;
    }

    .status-led.on { background: #4ecca3; box-shadow: 0 0 6px #4ecca3; }
    .status-led.off { background: #e94560; box-shadow: 0 0 6px #e94560; }

    /* ===== LISTA BEVANDE (colonna singola scrollabile) ===== */
    .menu-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px 10px 132px;
      overflow-y: auto;
    }

    /* ===== LABEL GRUPPO (es. Birra, Vini sfusi, ...) ===== */
    .group-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(78, 204, 163, 0.4);
      padding: 10px 8px 4px;
    }

    /* ===== RIGA BEVANDA ===== */
    .menu-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 6px;
      transition: background 120ms ease;
      min-height: 42px;
    }

    .menu-row:active {
      background: rgba(255, 255, 255, 0.04);
    }

    .menu-row.active {
      background: rgba(78, 204, 163, 0.06);
    }

    .row-name {
      flex: 1;
      font-weight: 500;
      font-size: 14px;
      color: rgba(240, 244, 248, 0.8);
      line-height: 1.2;
      min-width: 0;
    }

    .menu-row.active .row-name {
      color: #f0f4f8;
      font-weight: 600;
    }

    .row-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      color: rgba(78, 204, 163, 0.6);
      white-space: nowrap;
      min-width: 50px;
      text-align: right;
    }

    .menu-row.active .row-price {
      color: #4ecca3;
    }

    /* ===== STEPPER COMPATTO ===== */
    .row-stepper {
      display: flex;
      align-items: center;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .step-btn {
      width: 38px;
      height: 36px;
      background: rgba(255, 255, 255, 0.02);
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 80ms ease;
      line-height: 1;
      padding: 0;
    }

    .step-btn:active { background: rgba(255, 255, 255, 0.1); }
    .step-minus { color: #e94560; border-right: 1px solid rgba(255, 255, 255, 0.04); }
    .step-plus { color: #4ecca3; border-left: 1px solid rgba(255, 255, 255, 0.04); }

    .step-count {
      width: 30px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.9);
      height: 36px;
      line-height: 36px;
      background: rgba(255, 255, 255, 0.015);
      transition: color 150ms ease;
    }

    .step-count.zero { color: rgba(255, 255, 255, 0.15); }

    /* ===== SEPARATORE tra gruppi ===== */
    .sep {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 4px 8px;
    }

    /* ===== ORDER BAR ===== */
    .order-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(10, 14, 22, 0.96);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 50;
    }

    /* Riga superiore: tavolo + nome */
    .order-top {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      margin-bottom: 4px;
    }

    /* Riga inferiore: totale + ordina */
    .order-bottom {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .field-group {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 5px 8px;
      flex-shrink: 0;
      transition: border-color 200ms ease;
    }

    .field-group.error {
      border-color: #e94560;
      animation: shake 300ms ease;
    }

    @keyframes shake {
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }

    .field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      color: rgba(240, 244, 248, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field-group input[type="number"] {
      width: 40px;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      -moz-appearance: textfield;
    }

    .field-group input[type="number"]::-webkit-outer-spin-button,
    .field-group input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .field-group input[type="number"]::placeholder { color: rgba(255, 255, 255, 0.15); }

    .field-group input[type="text"] {
      width: 110px;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }

    .field-group input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.12); }

    .order-summary {
      flex: 1;
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }

    .order-total {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(22px, 5vw, 30px);
      color: #4ecca3;
      line-height: 1;
      transition: color 150ms ease;
    }

    .order-total.empty { color: rgba(78, 204, 163, 0.25); }

    .order-count {
      font-size: 11px;
      font-weight: 600;
      color: rgba(240, 244, 248, 0.35);
      line-height: 1;
      min-height: 13px;
    }

    .btn-order {
      padding: 14px 24px;
      background: rgba(78, 204, 163, 0.12);
      border: 2px solid rgba(78, 204, 163, 0.3);
      border-radius: 10px;
      color: #4ecca3;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: clamp(15px, 3.5vw, 18px);
      letter-spacing: 0.06em;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 120ms ease;
      flex-shrink: 0;
    }

    .btn-order:active:not(.disabled) {
      transform: scale(0.95);
      background: rgba(78, 204, 163, 0.3);
      border-color: #4ecca3;
    }

    .btn-order.disabled { opacity: 0.25; pointer-events: none; }

    /* ===== OVERLAYS ===== */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .overlay.visible { opacity: 1; pointer-events: auto; }
    .overlay-success { background: rgba(78, 204, 163, 0.93); }
    .overlay-error { background: rgba(233, 69, 96, 0.93); }

    .overlay-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(64px, 20vw, 130px);
      line-height: 1;
      color: #fff;
      margin-bottom: 8px;
    }

    .overlay-text {
      font-weight: 700;
      font-size: clamp(18px, 4.5vw, 30px);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fff;
    }

    .overlay-sub {
      font-size: clamp(14px, 3vw, 20px);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 6px;
    }

    /* ===== BANNER DISCONNESSIONE ===== */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px 20px;
      background: #e94560;
      color: #fff;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 200;
      transform: translateY(-100%);
      transition: transform 300ms ease;
    }

    .offline-banner.visible { transform: translateY(0); }

    /* ===== BANNER STAMPANTE OFFLINE ===== */
    .printer-alert {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 20px;
      background: #ffd93d;
      color: #1a1a2e;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 190;
      transform: translateY(-100%);
      transition: transform 300ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .printer-alert.visible { transform: translateY(0); }

    .printer-alert .alert-icon {
      font-size: 16px;
      line-height: 1;
    }

    .btn-esci {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 900;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10, 14, 23, 0.9);
      color: #64748b;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 150ms ease;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(8px);
    }
    .btn-esci:hover { color: #e94560; border-color: rgba(233,69,96,0.3); }
  </style>
</head>
<body>
  <button class="btn-esci" onclick="localStorage.removeItem('sagrapp_role');sessionStorage.removeItem('sagrapp_token');window.location.href='/'">Esci</button>

  <!-- Banner disconnessione -->
  <div class="offline-banner" id="offlineBanner">CONNESSIONE PERSA</div>
  <div class="printer-alert" id="printerAlert">
    <span class="alert-icon">&#9888;</span>
    <span id="printerAlertText">Stampante offline</span>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="header-title">Cassa Bar</span>
      <span class="header-last-order" id="lastOrder"></span>
    </div>
    <span class="header-status" id="headerStatus">
      <span class="status-led" id="statusLed"></span>
      <span id="statusText">...</span>
    </span>
  </header>

  <!-- Lista bevande — singola colonna scrollabile -->
  <div class="menu-wrapper" id="beverageList"></div>

  <!-- Barra ordine -->
  <div class="order-bar">
    <!-- Riga superiore: tavolo + nome -->
    <div class="order-top">
      <div class="field-group" id="tableField">
        <span class="field-label">Tav</span>
        <input type="number" id="tableInput" inputmode="numeric" min="1" max="99" placeholder="&mdash;">
      </div>
      <div class="field-group">
        <span class="field-label">Nome</span>
        <input type="text" id="nameInput" placeholder="opzionale" autocomplete="off">
      </div>
    </div>
    <!-- Riga inferiore: totale + ordina -->
    <div class="order-bottom">
      <div class="order-summary">
        <span class="order-count" id="orderCount"></span>
        <span class="order-total empty" id="orderTotal">&euro; 0.00</span>
      </div>
      <button class="btn-order disabled" id="btnOrder" onclick="submitOrder()">ORDINA</button>
    </div>
  </div>

  <!-- Overlay successo -->
  <div class="overlay overlay-success" id="overlay-success">
    <div class="overlay-number" id="successNumber"></div>
    <div class="overlay-text">Ordine creato</div>
    <div class="overlay-sub" id="successSub"></div>
  </div>

  <!-- Overlay errore -->
  <div class="overlay overlay-error" id="overlay-error">
    <div class="overlay-number">!</div>
    <div class="overlay-text" id="errorText">Errore</div>
    <div class="overlay-sub" id="errorSub"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ===== BEVANDE — stessi ID e prezzi del server (config.js) =====
    const BEVERAGES = [
      // Birra
      { id: 'birra_spina', name: 'Birra alla spina', price: 3.50, group: 'Birra' },
      // Vini sfusi
      { id: 'vino_bianco_ombra', name: 'Vino ombra bianco', price: 1.00, group: 'Vini sfusi' },
      { id: 'vino_rosso_ombra', name: 'Vino ombra rosso', price: 1.00 },
      { id: 'vino_bianco_mezzo', name: 'Vino bianco sfuso 1/2L', price: 3.00 },
      { id: 'vino_rosso_mezzo', name: 'Vino rosso sfuso 1/2L', price: 3.00 },
      { id: 'vino_bianco_trequarti', name: 'Vino bianco sfuso 3/4L', price: 4.00 },
      { id: 'vino_rosso_trequarti', name: 'Vino rosso sfuso 3/4L', price: 4.00 },
      // Bottiglie
      { id: 'prosecco', name: 'Prosecco Superiore DOCG', price: 9.00, group: 'Bottiglie' },
      { id: 'cabernet', name: 'Bottiglia Cabernet', price: 7.50 },
      // Acqua
      { id: 'acqua_naturale', name: 'Acqua naturale 1/2L', price: 1.00, group: 'Acqua' },
      { id: 'acqua_frizzante', name: 'Acqua frizzante 1/2L', price: 1.00 },
      // Lattine
      { id: 'the_pesca', name: 'The alla pesca', price: 2.30, group: 'Lattine' },
      { id: 'the_limone', name: 'The al limone', price: 2.30 },
      { id: 'coca_cola', name: 'Coca Cola', price: 2.30 },
      { id: 'coca_zero', name: 'Coca Cola Zero', price: 2.30 },
      { id: 'fanta', name: 'Fanta', price: 2.30 },
    ];

    // Quantita' per ogni bevanda
    const quantities = {};
    BEVERAGES.forEach(b => { quantities[b.id] = 0; });

    let connected = false;
    let submitting = false;

    // --- Genera HTML della lista bevande ---
    function renderBeverages() {
      let html = '';
      BEVERAGES.forEach(bev => {
        // Se ha un campo group, inserisci la label del gruppo + separatore prima
        if (bev.group) {
          // Separatore visivo tra gruppi (non prima del primo)
          if (html !== '') html += '<div class="sep"></div>';
          html += `<div class="group-label">${bev.group}</div>`;
        }
        html += `
          <div class="menu-row" id="card-${bev.id}">
            <span class="row-name">${bev.name}</span>
            <span class="row-price">\u20AC${bev.price.toFixed(2)}</span>
            <div class="row-stepper">
              <button class="step-btn step-minus" onclick="changeQty('${bev.id}', -1)">\u2212</button>
              <span class="step-count zero" id="qty-${bev.id}">0</span>
              <button class="step-btn step-plus" onclick="changeQty('${bev.id}', 1)">+</button>
            </div>
          </div>`;
      });
      return html;
    }

    document.getElementById('beverageList').innerHTML = renderBeverages();

    // --- Logica quantita' ---
    function changeQty(id, delta) {
      if (!connected || submitting) return;
      quantities[id] = Math.max(0, quantities[id] + delta);

      const countEl = document.getElementById(`qty-${id}`);
      countEl.textContent = quantities[id];
      countEl.classList.toggle('zero', quantities[id] === 0);

      const card = document.getElementById(`card-${id}`);
      card.classList.toggle('active', quantities[id] > 0);

      updateOrderBar();
    }

    // --- Calcola totale ---
    function calcOrder() {
      let totalItems = 0;
      let total = 0;
      BEVERAGES.forEach(bev => {
        totalItems += quantities[bev.id];
        total += quantities[bev.id] * bev.price;
      });
      return { totalItems, total };
    }

    function updateOrderBar() {
      const { totalItems, total } = calcOrder();

      const countEl = document.getElementById('orderCount');
      const totalEl = document.getElementById('orderTotal');
      const btnOrder = document.getElementById('btnOrder');

      countEl.textContent = totalItems > 0
        ? `${totalItems} bevand${totalItems === 1 ? 'a' : 'e'}`
        : '';

      totalEl.textContent = `\u20AC ${total.toFixed(2)}`;
      totalEl.classList.toggle('empty', totalItems === 0);

      const tableValue = document.getElementById('tableInput').value;
      btnOrder.classList.toggle('disabled', totalItems === 0 || !tableValue);
    }

    // --- Invio ordine ---
    async function submitOrder() {
      if (!connected || submitting) return;

      const tableInput = document.getElementById('tableInput');
      const table = parseInt(tableInput.value);

      if (!table || table < 1) {
        const field = document.getElementById('tableField');
        field.classList.add('error');
        setTimeout(() => field.classList.remove('error'), 400);
        tableInput.focus();
        return;
      }

      const items = BEVERAGES
        .filter(bev => quantities[bev.id] > 0)
        .map(bev => ({ id: bev.id, qty: quantities[bev.id] }));

      if (items.length === 0) return;

      const { total } = calcOrder();
      const customerName = document.getElementById('nameInput').value.trim() || null;

      submitting = true;

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            table,
            items,
            customer_name: customerName,
            // Identifica l'ordine come proveniente dalla cassa bar
            source: 'bar',
          }),
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('successNumber').textContent = `#${data.order_number}`;
          document.getElementById('successSub').textContent =
            `Tavolo ${data.table} \u2014 \u20AC ${data.total.toFixed(2)}`;
          showOverlay('success');

          const lastEl = document.getElementById('lastOrder');
          lastEl.textContent = `Ultimo: #${data.order_number}`;
          lastEl.classList.add('visible');

          resetOrder();
        } else {
          document.getElementById('errorText').textContent = 'Errore';
          document.getElementById('errorSub').textContent = data.error || 'Errore sconosciuto';
          showOverlay('error');
        }
      } catch (err) {
        document.getElementById('errorText').textContent = 'Errore di rete';
        document.getElementById('errorSub').textContent = 'Verifica la connessione';
        showOverlay('error');
      }

      submitting = false;
    }

    function resetOrder() {
      BEVERAGES.forEach(bev => {
        quantities[bev.id] = 0;
        document.getElementById(`qty-${bev.id}`).textContent = '0';
        document.getElementById(`qty-${bev.id}`).classList.add('zero');
        document.getElementById(`card-${bev.id}`).classList.remove('active');
      });
      document.getElementById('tableInput').value = '';
      document.getElementById('nameInput').value = '';
      updateOrderBar();
    }

    function showOverlay(type) {
      const el = document.getElementById(`overlay-${type}`);
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 2500);
    }

    // --- Socket.IO ---
    const socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    const offlineBanner = document.getElementById('offlineBanner');
    const statusLed = document.getElementById('statusLed');
    const statusText = document.getElementById('statusText');
    const headerStatus = document.getElementById('headerStatus');

    socket.on('connect', () => {
      connected = true;
      socket.emit('register', { role: 'cassa' });
      offlineBanner.classList.remove('visible');
      statusLed.classList.add('on');
      statusLed.classList.remove('off');
      headerStatus.classList.add('online');
      headerStatus.classList.remove('offline');
      statusText.textContent = 'Connesso';
    });

    socket.on('disconnect', () => {
      connected = false;
      offlineBanner.classList.add('visible');
      statusLed.classList.remove('on');
      statusLed.classList.add('off');
      headerStatus.classList.remove('online');
      headerStatus.classList.add('offline');
      statusText.textContent = 'Offline';
    });

    // --- Stampante offline: alert + beep ---
    const printerAlert = document.getElementById('printerAlert');
    const printerAlertText = document.getElementById('printerAlertText');

    // Beep audio per alert stampante (Web Audio API, senza file esterni)
    function beepAlert() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch (e) { /* Audio non supportato */ }
    }

    // Ascolta lo stato delle stampanti dal proxy
    // La cassa bar monitora la stampante #4 (ricevuta bar .206) e #2 (comanda bevande .204)
    socket.on('printers_status_update', (statuses) => {
      // Filtra solo le stampanti rilevanti per il bar (id 2 e 4)
      const barPrinterIds = [2, 4];
      const offlinePrinters = statuses.filter(s => barPrinterIds.includes(s.id) && !s.online);
      if (offlinePrinters.length > 0) {
        const names = offlinePrinters.map(p => p.name || `Stampante ${p.id}`).join(', ');
        printerAlertText.textContent = 'Stampante offline: ' + names;
        printerAlert.classList.add('visible');
        beepAlert();
      } else {
        printerAlert.classList.remove('visible');
      }
    });

    // Richiedi controllo stampanti dopo connessione
    socket.on('connect', () => {
      setTimeout(() => socket.emit('request_printer_check'), 2000);
    });

    document.getElementById('tableInput').addEventListener('input', updateOrderBar);
  </script>
</body>
</html>
