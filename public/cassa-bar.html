<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SagrApp — Cassa Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060a12;
      color: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== LAYOUT PRINCIPALE: 70% piatti + 30% colonna ordine ===== */
    .app-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .menu-area {
      flex: 7;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
    }

    .order-column {
      flex: 3;
      min-width: 320px;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.015);
    }

    /* ===== TAB BAR ===== */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .tab-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(240, 244, 248, 0.45);
      padding: 10px 18px;
    }

    .tab-spacer { flex: 1; }

    .tab-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #6c7a89;
    }

    .tab-status.online { color: #4ecca3; }
    .tab-status.offline { color: #e94560; }

    .status-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6c7a89;
      transition: all 200ms ease;
    }

    .status-led.on { background: #4ecca3; box-shadow: 0 0 6px #4ecca3; }
    .status-led.off { background: #e94560; box-shadow: 0 0 6px #e94560; }

    /* ===== AREA SCROLLABILE MENU ===== */
    .menu-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 10px 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .menu-scroll::-webkit-scrollbar { width: 6px; }
    .menu-scroll::-webkit-scrollbar-track { background: transparent; }
    .menu-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .section-header {
      padding: 12px 8px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(78, 204, 163, 0.5);
    }

    .section-header:first-child { padding-top: 4px; }

    .sep {
      height: 1px;
      background: rgba(255, 255, 255, 0.05);
      margin: 6px 8px;
    }

    /* ===== RIGA PIATTO ===== */
    .menu-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1.5px solid transparent;
      transition: all 120ms ease;
      min-height: 44px;
    }

    .menu-row:active { background: rgba(255, 255, 255, 0.03); }

    .menu-row.active {
      background: rgba(78, 204, 163, 0.06);
      border-color: rgba(78, 204, 163, 0.2);
    }

    .menu-row.exhausted {
      opacity: 0.45;
      pointer-events: none;
    }

    .menu-row.exhausted .row-stepper { visibility: hidden; }

    .row-exhausted-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .row-name {
      flex: 1;
      font-weight: 500;
      font-size: 14px;
      color: rgba(240, 244, 248, 0.75);
      line-height: 1.2;
      min-width: 0;
    }

    .menu-row.active .row-name { color: #f0f4f8; font-weight: 600; }

    .row-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      color: rgba(78, 204, 163, 0.5);
      white-space: nowrap;
      min-width: 52px;
      text-align: right;
    }

    .menu-row.active .row-price { color: #4ecca3; }

    /* ===== STEPPER ===== */
    .row-stepper {
      display: flex;
      align-items: center;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .step-btn {
      width: 40px;
      height: 38px;
      background: rgba(255, 255, 255, 0.02);
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 80ms ease;
      line-height: 1;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .step-btn:active { background: rgba(255, 255, 255, 0.1); }
    .step-minus { color: #e94560; border-right: 1px solid rgba(255, 255, 255, 0.04); }
    .step-plus { color: #4ecca3; border-left: 1px solid rgba(255, 255, 255, 0.04); }

    .step-count {
      width: 32px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.9);
      height: 38px;
      line-height: 38px;
      background: rgba(255, 255, 255, 0.015);
      transition: color 150ms ease;
    }

    .step-count.zero { color: rgba(255, 255, 255, 0.12); }

    /* ===== COLONNA ORDINE ===== */
    .order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .order-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 16px;
      color: rgba(240, 244, 248, 0.5);
      letter-spacing: 0.02em;
    }

    .order-last {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: rgba(78, 204, 163, 0.5);
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .order-last.visible { opacity: 1; }

    /* ===== FORM ORDINE ===== */
    .order-form {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .form-field {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 6px 10px;
      transition: border-color 200ms ease;
    }

    .form-field:focus-within { border-color: rgba(78, 204, 163, 0.3); }
    .form-field.flex-1 { flex: 1; }

    .form-field.error {
      border-color: #e94560;
      animation: shake 300ms ease;
    }

    @keyframes shake {
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }

    .field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      color: rgba(240, 244, 248, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .form-field input[type="text"] {
      flex: 1;
      width: 100%;
      min-width: 0;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
    }

    .form-field input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.12); }

    .form-field input[type="number"] {
      width: 44px;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
      -moz-appearance: textfield;
    }

    .form-field input[type="number"]::-webkit-outer-spin-button,
    .form-field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .form-field input[type="number"]::placeholder { color: rgba(255, 255, 255, 0.12); }

    /* ===== RIEPILOGO ORDINE ===== */
    .order-summary-label {
      padding: 10px 16px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(240, 244, 248, 0.25);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      flex-shrink: 0;
    }

    .order-items-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.06) transparent;
    }

    .order-items-scroll::-webkit-scrollbar { width: 4px; }
    .order-items-scroll::-webkit-scrollbar-track { background: transparent; }
    .order-items-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

    .order-empty {
      padding: 24px 16px;
      text-align: center;
      font-size: 13px;
      color: rgba(240, 244, 248, 0.15);
      font-style: italic;
    }

    .order-item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      transition: background 100ms ease;
    }

    .order-item-row:hover { background: rgba(255, 255, 255, 0.02); }

    .order-item-qty {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 13px;
      color: #4ecca3;
      min-width: 26px;
    }

    .order-item-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: rgba(240, 244, 248, 0.7);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .order-item-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 12px;
      color: rgba(240, 244, 248, 0.4);
      white-space: nowrap;
    }

    .order-item-remove {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid rgba(233, 69, 96, 0.2);
      background: rgba(233, 69, 96, 0.06);
      color: #e94560;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 100ms ease;
      touch-action: manipulation;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .order-item-remove:active {
      background: rgba(233, 69, 96, 0.2);
      transform: scale(0.9);
    }

    /* ===== FOOTER ORDINE ===== */
    .order-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .totals-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-row.grand-total .total-label {
      font-size: 14px;
      font-weight: 700;
      color: rgba(240, 244, 248, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .total-row.grand-total .total-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 800;
      color: #4ecca3;
    }

    .total-row.grand-total .total-value.empty {
      color: rgba(78, 204, 163, 0.2);
    }

    /* ===== TOGGLE POS ===== */
    .pos-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px 12px;
    }
    .pos-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(240, 244, 248, 0.4);
      flex: 1;
    }
    .pos-toggle {
      position: relative;
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 200ms ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .pos-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 200ms ease;
    }
    .pos-toggle.active {
      background: rgba(251, 191, 36, 0.2);
      border-color: #fbbf24;
    }
    .pos-toggle.active::after {
      left: 22px;
      background: #fbbf24;
    }
    .pos-toggle.active + .pos-label {
      color: #fbbf24;
    }

    .btn-order {
      width: 100%;
      padding: 16px 20px;
      background: rgba(78, 204, 163, 0.12);
      border: 2px solid rgba(78, 204, 163, 0.3);
      border-radius: 10px;
      color: #4ecca3;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-order:active:not(.disabled) {
      transform: scale(0.97);
      background: rgba(78, 204, 163, 0.3);
      border-color: #4ecca3;
    }

    .btn-order.disabled { opacity: 0.2; pointer-events: none; }

    /* ===== OVERLAYS ===== */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .overlay.visible { opacity: 1; pointer-events: auto; }
    .overlay-success { background: rgba(78, 204, 163, 0.95); }
    .overlay-error { background: rgba(233, 69, 96, 0.95); }

    .overlay-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: clamp(64px, 18vw, 130px);
      line-height: 1;
      color: #fff;
      margin-bottom: 8px;
    }

    .overlay-text {
      font-weight: 700;
      font-size: clamp(18px, 4vw, 30px);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fff;
    }

    .overlay-sub {
      font-size: clamp(14px, 2.5vw, 20px);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 6px;
    }

    /* ===== BANNERS ===== */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px 20px;
      background: #e94560;
      color: #fff;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 2000;
      transform: translateY(-100%);
      transition: transform 300ms ease;
    }

    .offline-banner.visible { transform: translateY(0); }

    .printer-alert {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 20px;
      background: #ffd93d;
      color: #1a1a2e;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 1900;
      transform: translateY(-100%);
      transition: transform 300ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .printer-alert.visible { transform: translateY(0); }
    .printer-alert .alert-icon { font-size: 16px; line-height: 1; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .order-column { min-width: 280px; }
    }

    @media (max-width: 700px) {
      .app-shell {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }
      .menu-area {
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        min-height: 50vh;
      }
      .order-column {
        min-width: 100%;
        max-width: 100%;
        min-height: 50vh;
      }
    }

    .btn-esci {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 900;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10, 14, 23, 0.9);
      color: #64748b;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 150ms ease;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(8px);
    }
    .btn-esci:hover { color: #e94560; border-color: rgba(233,69,96,0.3); }
  </style>
</head>
<body>
  <button class="btn-esci" onclick="localStorage.removeItem('sagrapp_role');sessionStorage.removeItem('sagrapp_token');window.location.href='/'">Esci</button>

  <div class="offline-banner" id="offlineBanner">CONNESSIONE PERSA</div>
  <div class="printer-alert" id="printerAlert">
    <span class="alert-icon">&#9888;</span>
    <span id="printerAlertText">Stampante offline</span>
  </div>

  <div class="app-shell">

    <!-- AREA MENU (70%, sinistra) -->
    <div class="menu-area">
      <div class="tab-bar">
        <span class="tab-title">Cassa Bar</span>
        <span class="tab-spacer"></span>
        <span class="tab-status" id="tabStatus">
          <span class="status-led" id="statusLed"></span>
          <span id="statusText">...</span>
        </span>
      </div>
      <div class="menu-scroll" id="beverageList"></div>
    </div>

    <!-- COLONNA ORDINE (30%, destra) -->
    <div class="order-column">
      <div class="order-header">
        <span class="order-number">ORDINE</span>
        <span class="order-last" id="lastOrder"></span>
      </div>

      <div class="order-form">
        <div class="form-field flex-1">
          <span class="field-label">Nome</span>
          <input type="text" id="nameInput" placeholder="opzionale" autocomplete="off">
        </div>
        <div class="form-field flex-1" id="tableField">
          <span class="field-label">Tav</span>
          <input type="number" id="tableInput" inputmode="numeric" min="1" max="99" placeholder="&mdash;">
        </div>
      </div>

      <!-- Toggle POS -->
      <div class="pos-row">
        <div class="pos-toggle" id="posToggle" onclick="togglePos()"></div>
        <span class="pos-label" id="posLabel">POS</span>
      </div>

      <div class="order-summary-label">Riepilogo</div>
      <div class="order-items-scroll" id="orderItemsList">
        <div class="order-empty">Nessuna bevanda selezionata</div>
      </div>

      <div class="order-footer">
        <div class="totals-block">
          <div class="total-row grand-total">
            <span class="total-label">Totale</span>
            <span class="total-value empty" id="grandTotal">&euro; 0,00</span>
          </div>
        </div>
        <button class="btn-order disabled" id="btnOrder" onclick="submitOrder()">ORDINA</button>
      </div>
    </div>

  </div>

  <!-- Overlay successo -->
  <div class="overlay overlay-success" id="overlay-success">
    <div class="overlay-number" id="successNumber"></div>
    <div class="overlay-text">Ordine creato</div>
    <div class="overlay-sub" id="successSub"></div>
  </div>

  <!-- Overlay errore -->
  <div class="overlay overlay-error" id="overlay-error">
    <div class="overlay-number">!</div>
    <div class="overlay-text" id="errorText">Errore</div>
    <div class="overlay-sub" id="errorSub"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ===== BEVANDE — caricate dal server =====
    var BEVERAGES = [];
    var bevMap = {};
    var quantities = {};

    var connected = false;
    var submitting = false;
    var posActive = false;

    function togglePos() {
      posActive = !posActive;
      document.getElementById('posToggle').classList.toggle('active', posActive);
    }

    // Carica bevande dal server, filtra per disponibilita' e cassa bar
    async function loadMenu() {
      try {
        var res = await fetch('/api/menu');
        var allItems = await res.json();

        BEVERAGES = allItems.filter(function(item) {
          if (!item.casses || !item.casses.includes('cassa_bar')) return false;
          return true;
        });

        bevMap = {};
        BEVERAGES.forEach(function(b) {
          if (!(b.id in quantities)) quantities[b.id] = 0;
          bevMap[b.id] = b;
        });

        document.getElementById('beverageList').innerHTML = renderBeverages();
        // Ripristina quantita' selezionate dopo re-render
        BEVERAGES.forEach(function(bev) {
          if (quantities[bev.id] > 0) {
            var countEl = document.getElementById('qty-' + bev.id);
            if (countEl) { countEl.textContent = quantities[bev.id]; countEl.classList.remove('zero'); }
            var card = document.getElementById('card-' + bev.id);
            if (card) card.classList.add('active');
          }
        });
        updateOrderColumn();
      } catch (err) {
        document.getElementById('beverageList').innerHTML =
          '<div style="padding:40px;text-align:center;color:#64748b">Errore caricamento menu</div>';
      }
    }

    // ===== RENDER MENU =====
    function renderBeverages() {
      if (BEVERAGES.length === 0) {
        return '<div style="padding:40px;text-align:center;color:#64748b">Nessuna bevanda disponibile</div>';
      }
      var html = '<div class="section-header">Bevande</div>';
      BEVERAGES.forEach(function(bev) {
        var exhausted = bev.status === 'exhausted';
        var disabled = bev.available === false;
        var priceFormatted = '\u20AC' + bev.price.toFixed(2).replace('.', ',');
        var tag = disabled ? '<span class="row-exhausted-tag">Non disp.</span>'
          : exhausted ? '<span class="row-exhausted-tag">Esaurito</span>' : '';
        html += '<div class="menu-row' + ((exhausted || disabled) ? ' exhausted' : '') + '" id="card-' + bev.id + '">' +
          '<span class="row-name">' + bev.name + '</span>' +
          tag +
          '<span class="row-price">' + priceFormatted + '</span>' +
          '<div class="row-stepper">' +
            '<button class="step-btn step-minus" onclick="changeQty(\'' + bev.id + '\', -1)">\u2212</button>' +
            '<span class="step-count zero" id="qty-' + bev.id + '">0</span>' +
            '<button class="step-btn step-plus" onclick="changeQty(\'' + bev.id + '\', 1)">+</button>' +
          '</div>' +
        '</div>';
      });
      return html;
    }

    loadMenu();

    // ===== LOGICA QUANTITA =====
    function changeQty(id, delta) {
      if (!connected || submitting) return;
      quantities[id] = Math.max(0, quantities[id] + delta);

      var countEl = document.getElementById('qty-' + id);
      countEl.textContent = quantities[id];
      countEl.classList.toggle('zero', quantities[id] === 0);

      var card = document.getElementById('card-' + id);
      card.classList.toggle('active', quantities[id] > 0);

      updateOrderColumn();
    }

    function removeItem(id) {
      if (submitting) return;
      quantities[id] = 0;
      var countEl = document.getElementById('qty-' + id);
      if (countEl) { countEl.textContent = '0'; countEl.classList.add('zero'); }
      var card = document.getElementById('card-' + id);
      if (card) card.classList.remove('active');
      updateOrderColumn();
    }

    // ===== CALCOLO TOTALE =====
    function calcOrder() {
      var totalItems = 0;
      var total = 0;
      BEVERAGES.forEach(function(bev) {
        totalItems += quantities[bev.id];
        total += quantities[bev.id] * bev.price;
      });
      total = Math.round(total * 100) / 100;
      return { totalItems: totalItems, total: total };
    }

    function formatPrice(value) {
      return '\u20AC ' + value.toFixed(2).replace('.', ',');
    }

    // ===== AGGIORNA COLONNA ORDINE =====
    function updateOrderColumn() {
      var result = calcOrder();
      var totalItems = result.totalItems;
      var total = result.total;

      var listEl = document.getElementById('orderItemsList');
      var selectedItems = BEVERAGES.filter(function(b) { return quantities[b.id] > 0; });

      if (selectedItems.length === 0) {
        listEl.innerHTML = '<div class="order-empty">Nessuna bevanda selezionata</div>';
      } else {
        var html = '';
        selectedItems.forEach(function(item) {
          var linePrice = item.price * quantities[item.id];
          html += '<div class="order-item-row">' +
            '<span class="order-item-qty">' + quantities[item.id] + 'x</span>' +
            '<span class="order-item-name">' + item.name + '</span>' +
            '<span class="order-item-price">' + formatPrice(linePrice) + '</span>' +
            '<button class="order-item-remove" onclick="removeItem(\'' + item.id + '\')">&times;</button>' +
          '</div>';
        });
        listEl.innerHTML = html;
      }

      var grandTotal = document.getElementById('grandTotal');
      grandTotal.textContent = formatPrice(total);
      grandTotal.classList.toggle('empty', totalItems === 0);

      var tableValue = document.getElementById('tableInput').value;
      var canOrder = totalItems > 0 && tableValue;
      document.getElementById('btnOrder').classList.toggle('disabled', !canOrder);
    }

    // ===== INVIO ORDINE =====
    async function submitOrder() {
      if (!connected || submitting) return;

      var tableInput = document.getElementById('tableInput');
      var table = parseInt(tableInput.value);

      if (!table || table < 1) {
        var field = document.getElementById('tableField');
        field.classList.add('error');
        setTimeout(function() { field.classList.remove('error'); }, 400);
        tableInput.focus();
        return;
      }

      var items = BEVERAGES
        .filter(function(bev) { return quantities[bev.id] > 0; })
        .map(function(bev) { return { id: bev.id, qty: quantities[bev.id] }; });

      if (items.length === 0) return;

      var customerName = document.getElementById('nameInput').value.trim() || null;
      submitting = true;
      document.getElementById('btnOrder').classList.add('disabled');

      try {
        var res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            table: table,
            items: items,
            customer_name: customerName,
            source: 'bar',
            payment: posActive ? 'pos' : 'contanti',
          }),
        });
        var data = await res.json();

        if (data.success) {
          document.getElementById('successNumber').textContent = data.order_number;
          document.getElementById('successSub').textContent =
            'Tavolo ' + data.table + ' \u2014 ' + formatPrice(data.total);
          showOverlay('success');

          var lastEl = document.getElementById('lastOrder');
          lastEl.textContent = 'Ultimo: ' + data.order_number;
          lastEl.classList.add('visible');

          resetOrder();
        } else {
          document.getElementById('errorText').textContent = 'Errore';
          document.getElementById('errorSub').textContent = data.error || 'Errore sconosciuto';
          showOverlay('error');
        }
      } catch (err) {
        document.getElementById('errorText').textContent = 'Errore di rete';
        document.getElementById('errorSub').textContent = 'Verifica la connessione';
        showOverlay('error');
      }

      submitting = false;
    }

    function resetOrder() {
      BEVERAGES.forEach(function(bev) {
        quantities[bev.id] = 0;
        var qtyEl = document.getElementById('qty-' + bev.id);
        if (qtyEl) { qtyEl.textContent = '0'; qtyEl.classList.add('zero'); }
        var cardEl = document.getElementById('card-' + bev.id);
        if (cardEl) cardEl.classList.remove('active');
      });
      document.getElementById('tableInput').value = '';
      document.getElementById('nameInput').value = '';
      if (posActive) {
        posActive = false;
        document.getElementById('posToggle').classList.remove('active');
      }
      updateOrderColumn();
    }

    function showOverlay(type) {
      var el = document.getElementById('overlay-' + type);
      el.classList.add('visible');
      setTimeout(function() { el.classList.remove('visible'); }, 2500);
    }

    // ===== SOCKET.IO =====
    var socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    var offlineBanner = document.getElementById('offlineBanner');
    var statusLed = document.getElementById('statusLed');
    var statusText = document.getElementById('statusText');
    var tabStatus = document.getElementById('tabStatus');

    socket.on('connect', function() {
      connected = true;
      socket.emit('register', { role: 'cassa' });
      offlineBanner.classList.remove('visible');
      statusLed.classList.add('on');
      statusLed.classList.remove('off');
      tabStatus.classList.add('online');
      tabStatus.classList.remove('offline');
      statusText.textContent = 'Connesso';
      updateOrderColumn();
    });

    socket.on('disconnect', function() {
      connected = false;
      offlineBanner.classList.add('visible');
      statusLed.classList.remove('on');
      statusLed.classList.add('off');
      tabStatus.classList.remove('online');
      tabStatus.classList.add('offline');
      statusText.textContent = 'Offline';
    });

    var printerAlert = document.getElementById('printerAlert');
    var printerAlertText = document.getElementById('printerAlertText');

    function beepAlert() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch (e) {}
    }

    socket.on('printers_status_update', function(statuses) {
      var barPrinterIds = [2, 4];
      var offlinePrinters = statuses.filter(function(s) {
        return barPrinterIds.includes(s.id) && !s.online;
      });
      if (offlinePrinters.length > 0) {
        var names = offlinePrinters.map(function(p) { return p.name || 'Stampante ' + p.id; }).join(', ');
        printerAlertText.textContent = 'Stampante offline: ' + names;
        printerAlert.classList.add('visible');
        beepAlert();
      } else {
        printerAlert.classList.remove('visible');
      }
    });

    socket.on('connect', function() {
      setTimeout(function() { socket.emit('request_printer_check'); }, 2000);
    });

    // Ricarica menu quando l'admin modifica disponibilita', prezzo, ecc.
    socket.on('menu_updated', function() {
      loadMenu();
    });

    document.getElementById('tableInput').addEventListener('input', updateOrderColumn);
  </script>
</body>
</html>
