<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SagrApp — Cassa Bar</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060a12;
      color: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== LAYOUT PRINCIPALE: 70% piatti + 30% colonna ordine ===== */
    .app-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .menu-area {
      flex: 7;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
    }

    .order-column {
      flex: 3;
      min-width: 320px;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.015);
    }

    /* ===== TAB BAR ===== */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .tab-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(240, 244, 248, 0.45);
      padding: 10px 18px;
    }

    .tab-spacer { flex: 1; }

    .tab-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #6c7a89;
    }

    .tab-status.online { color: #4ecca3; }
    .tab-status.offline { color: #e94560; }

    .status-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6c7a89;
      transition: all 200ms ease;
    }

    .status-led.on { background: #4ecca3; box-shadow: 0 0 6px #4ecca3; }
    .status-led.off { background: #e94560; box-shadow: 0 0 6px #e94560; }

    /* ===== AREA SCROLLABILE MENU ===== */
    .menu-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .menu-scroll::-webkit-scrollbar { width: 6px; }
    .menu-scroll::-webkit-scrollbar-track { background: transparent; }
    .menu-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    /* ===== LAYOUT A COLONNE PER CATEGORIA ===== */
    .category-columns {
      display: flex;
      gap: 12px;
      min-height: 100%;
    }

    .category-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .section-header {
      padding: 8px 8px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #4ecca3;
      border-bottom: 1px solid rgba(78, 204, 163, 0.15);
      text-align: center;
      flex-shrink: 0;
    }

    /* ===== BOX PIATTO ===== */
    .menu-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 8px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 10px;
      transition: all 120ms ease;
      min-height: 90px;
      text-align: center;
    }

    .menu-row:active { background: rgba(255, 255, 255, 0.06); }

    .menu-row.active {
      background: rgba(78, 204, 163, 0.10);
      border-color: rgba(78, 204, 163, 0.35);
    }

    .menu-row.exhausted {
      opacity: 0.4;
      pointer-events: none;
    }

    .menu-row.exhausted .row-stepper { visibility: hidden; }

    .row-exhausted-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(239, 68, 68, 0.18);
      color: #f87171;
      white-space: nowrap;
    }

    .row-name {
      font-weight: 600;
      font-size: 14px;
      color: rgba(240, 244, 248, 0.88);
      line-height: 1.2;
      text-align: center;
    }

    .menu-row.active .row-name { color: #f0f4f8; font-weight: 700; }

    .row-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      color: rgba(78, 204, 163, 0.7);
      white-space: nowrap;
    }

    .menu-row.active .row-price { color: #4ecca3; }

    /* ===== STEPPER ===== */
    .row-stepper {
      display: flex;
      align-items: center;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.10);
      flex-shrink: 0;
    }

    .step-btn {
      width: 36px;
      height: 34px;
      background: rgba(255, 255, 255, 0.04);
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 80ms ease;
      line-height: 1;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .step-btn:active { background: rgba(255, 255, 255, 0.1); }
    .step-minus { color: #e94560; border-right: 1px solid rgba(255, 255, 255, 0.04); }
    .step-plus { color: #4ecca3; border-left: 1px solid rgba(255, 255, 255, 0.04); }

    .step-count {
      width: 28px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.9);
      height: 34px;
      line-height: 34px;
      background: rgba(255, 255, 255, 0.015);
      transition: color 150ms ease;
    }

    .step-count.zero { color: rgba(255, 255, 255, 0.12); }

    /* ===== COLONNA ORDINE ===== */
    .order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .order-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 18px;
      color: rgba(240, 244, 248, 0.7);
      letter-spacing: 0.02em;
    }

    .order-last {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: rgba(78, 204, 163, 0.65);
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .order-last.visible { opacity: 1; }

    /* ===== RIEPILOGO ORDINE ===== */
    .order-summary-label {
      padding: 10px 16px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(240, 244, 248, 0.4);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .order-items-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.06) transparent;
    }

    .order-items-scroll::-webkit-scrollbar { width: 4px; }
    .order-items-scroll::-webkit-scrollbar-track { background: transparent; }
    .order-items-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

    .order-empty {
      padding: 24px 16px;
      text-align: center;
      font-size: 14px;
      color: rgba(240, 244, 248, 0.25);
      font-style: italic;
    }

    .order-item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      transition: background 100ms ease;
    }

    .order-item-row:hover { background: rgba(255, 255, 255, 0.02); }

    .order-item-qty {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 15px;
      color: #4ecca3;
      min-width: 28px;
    }

    .order-item-name {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
      color: rgba(240, 244, 248, 0.85);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .order-item-price {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      color: rgba(240, 244, 248, 0.55);
      white-space: nowrap;
    }

    .order-item-remove {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid rgba(233, 69, 96, 0.2);
      background: rgba(233, 69, 96, 0.06);
      color: #e94560;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 100ms ease;
      touch-action: manipulation;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .order-item-remove:active {
      background: rgba(233, 69, 96, 0.2);
      transform: scale(0.9);
    }

    .order-item-note {
      display: flex; align-items: center; padding: 2px 16px 4px 52px;
    }
    .order-item-note input {
      width: 100%; padding: 4px 8px; border-radius: 4px;
      border: 1px solid rgba(255,217,61,0.2); background: rgba(255,217,61,0.05);
      color: #ffd93d; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; outline: none;
    }
    .order-item-note input::placeholder { color: rgba(255,217,61,0.35); }
    .order-item-note input:focus { border-color: rgba(255,217,61,0.5); }

    /* ===== FOOTER ORDINE ===== */
    .order-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      padding: 14px 16px;
      flex-shrink: 0;
    }

    .totals-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-row.grand-total .total-label {
      font-size: 16px;
      font-weight: 700;
      color: rgba(240, 244, 248, 0.85);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .total-row.grand-total .total-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 26px;
      font-weight: 800;
      color: #4ecca3;
    }

    .total-row.grand-total .total-value.empty {
      color: rgba(78, 204, 163, 0.2);
    }

    /* ===== TOGGLE POS ===== */
    .pos-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px 12px;
    }
    .pos-label {
      font-size: 14px;
      font-weight: 600;
      color: rgba(240, 244, 248, 0.55);
      flex: 1;
    }
    .pos-toggle {
      position: relative;
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 200ms ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .pos-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 200ms ease;
    }
    .pos-toggle.active {
      background: rgba(251, 191, 36, 0.2);
      border-color: #fbbf24;
    }
    .pos-toggle.active::after {
      left: 22px;
      background: #fbbf24;
    }
    .pos-toggle.active + .pos-label {
      color: #fbbf24;
    }

    .btn-order {
      width: 100%;
      padding: 16px 20px;
      background: rgba(78, 204, 163, 0.12);
      border: 2px solid rgba(78, 204, 163, 0.3);
      border-radius: 10px;
      color: #4ecca3;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-order:active:not(.disabled) {
      transform: scale(0.97);
      background: rgba(78, 204, 163, 0.3);
      border-color: #4ecca3;
    }

    .btn-order.disabled { opacity: 0.2; pointer-events: none; }

    /* ===== CAMPO NOME ===== */
    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .name-row .field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(240, 244, 248, 0.4);
      white-space: nowrap;
    }

    .name-row input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #f0f4f8;
      padding: 4px 0;
      user-select: text;
      -webkit-user-select: text;
    }

    .name-row input::placeholder { color: rgba(255, 255, 255, 0.12); }

    /* ===== CALCOLATRICE RESTO ===== */
    .resto-block {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .resto-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 0;
    }

    .resto-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(240, 244, 248, 0.4);
    }

    .resto-input-wrap {
      display: flex;
      align-items: center;
      gap: 3px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 5px 8px;
      cursor: text;
      transition: border-color 150ms ease;
    }

    .resto-input-wrap:focus-within { border-color: rgba(78, 204, 163, 0.3); }

    .resto-euro {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
    }

    .resto-input {
      width: 58px;
      background: none;
      border: none;
      outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: #f0f4f8;
      text-align: right;
      -moz-appearance: textfield;
    }

    .resto-input::-webkit-outer-spin-button,
    .resto-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .resto-input::placeholder { color: rgba(255, 255, 255, 0.12); }

    .dare-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 800;
      color: #4ecca3;
      transition: color 150ms ease;
    }

    .dare-value.zero { color: rgba(78, 204, 163, 0.2); }
    .dare-value.negative { color: #e94560; }

    /* ===== INLINE FEEDBACK ===== */
    .order-progress {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 150ms ease;
    }

    .order-progress.active {
      opacity: 1;
    }

    .order-progress-bar {
      height: 100%;
      width: 0;
      background: #4ecca3;
      border-radius: 2px;
      transition: width 300ms ease;
    }

    .order-progress.active .order-progress-bar {
      width: 70%;
      animation: progress-pulse 800ms ease-in-out infinite alternate;
    }

    .order-progress.done .order-progress-bar {
      width: 100%;
      animation: none;
      transition: width 200ms ease;
    }

    @keyframes progress-pulse {
      from { width: 40%; }
      to { width: 75%; }
    }

    .order-feedback {
      width: 100%;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
      padding: 6px 0;
      border-radius: 6px;
      opacity: 0;
      transform: translateY(-4px);
      transition: all 200ms ease;
    }

    .order-feedback.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .order-feedback.success {
      color: #4ecca3;
      background: rgba(78, 204, 163, 0.08);
    }

    .order-feedback.error {
      color: #e94560;
      background: rgba(233, 69, 96, 0.08);
    }

    /* ===== BANNERS ===== */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px 20px;
      background: #e94560;
      color: #fff;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 2000;
      transform: translateY(-100%);
      transition: transform 300ms ease;
    }

    .offline-banner.visible { transform: translateY(0); }

    /* ===== STAMPANTE OFFLINE — badge compatto nella tab bar ===== */
    .printer-alert {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255, 217, 61, 0.12);
      border: 1px solid rgba(255, 217, 61, 0.3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: #ffd93d;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      animation: pulse-warn 2s ease-in-out infinite;
    }

    .printer-alert.visible { display: flex; }
    .printer-alert .alert-icon { font-size: 12px; line-height: 1; }

    @keyframes pulse-warn {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .order-column { min-width: 280px; }
    }

    @media (max-width: 700px) {
      .app-shell {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }
      .menu-area {
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        min-height: 50vh;
      }
      .order-column {
        min-width: 100%;
        max-width: 100%;
        min-height: 50vh;
      }
    }

    .btn-esci {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 900;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10, 14, 23, 0.9);
      color: #64748b;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 150ms ease;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(8px);
    }
    .btn-esci:hover { color: #e94560; border-color: rgba(233,69,96,0.3); }
  </style>
</head>
<body>
  <button class="btn-esci" onclick="localStorage.removeItem('sagrapp_role');sessionStorage.removeItem('sagrapp_token');sessionStorage.removeItem('admin_token');window.location.href='/'">Esci</button>

  <div class="offline-banner" id="offlineBanner">CONNESSIONE PERSA</div>

  <div class="app-shell">

    <!-- AREA MENU (70%, sinistra) -->
    <div class="menu-area">
      <div class="tab-bar">
        <span class="tab-title">Cassa Bar</span>
        <div class="printer-alert" id="printerAlert">
          <span class="alert-icon">&#9888;</span>
          <span id="printerAlertText">Stampante offline</span>
        </div>
        <span class="tab-spacer"></span>
        <span class="tab-status" id="tabStatus">
          <span class="status-led" id="statusLed"></span>
          <span id="statusText">...</span>
        </span>
      </div>
      <div class="menu-scroll" id="beverageList"></div>
    </div>

    <!-- COLONNA ORDINE (30%, destra) -->
    <div class="order-column">
      <div class="order-header">
        <span class="order-number">ORDINE</span>
        <span class="order-last" id="lastOrder"></span>
      </div>

      <!-- Nome cliente (opzionale) -->
      <div class="name-row">
        <span class="field-label">Nome</span>
        <input type="text" id="nameInput" placeholder="opzionale" autocomplete="off">
      </div>

      <!-- Toggle POS -->
      <div class="pos-row">
        <div class="pos-toggle" id="posToggle" onclick="togglePos()"></div>
        <span class="pos-label" id="posLabel">POS</span>
      </div>

      <div class="order-summary-label">Riepilogo</div>
      <div class="order-items-scroll" id="orderItemsList">
        <div class="order-empty">Nessun articolo selezionato</div>
      </div>

      <div class="order-footer">
        <div class="totals-block">
          <div class="total-row grand-total">
            <span class="total-label">Totale</span>
            <span class="total-value empty" id="grandTotal">&euro; 0,00</span>
          </div>

          <!-- Calcolatrice resto -->
          <div class="resto-block" id="restoBlock" style="display:none">
            <div class="resto-row">
              <span class="resto-label">Ricevuto</span>
              <div class="resto-input-wrap" onclick="document.getElementById('ricevutoInput').focus()">
                <span class="resto-euro">&euro;</span>
                <input type="number" id="ricevutoInput" class="resto-input" inputmode="decimal" min="0" step="0.5" placeholder="0,00">
              </div>
            </div>
            <div class="resto-row">
              <span class="resto-label">Dare</span>
              <span class="dare-value zero" id="dareValue">&euro; &mdash;</span>
            </div>
          </div>
        </div>
        <button class="btn-order disabled" id="btnOrder" onclick="submitOrder()">ORDINA</button>
        <div class="order-progress" id="orderProgress"><div class="order-progress-bar"></div></div>
        <div class="order-feedback" id="orderFeedback"></div>
      </div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ===== BEVANDE — caricate dal server =====
    var BEVERAGES = [];
    var bevMap = {};
    var quantities = {};
    var itemNotes = {};

    var connected = false;
    var submitting = false;
    var posActive = false;
    var currentTotal = 0;

    function togglePos() {
      posActive = !posActive;
      document.getElementById('posToggle').classList.toggle('active', posActive);
      document.getElementById('restoBlock').style.display = (posActive || currentTotal === 0) ? 'none' : '';
      if (!posActive) updateResto();
    }

    function updateResto() {
      var ricevuto = parseFloat(document.getElementById('ricevutoInput').value) || 0;
      var dare = ricevuto - currentTotal;
      var dareEl = document.getElementById('dareValue');
      if (ricevuto <= 0) {
        dareEl.textContent = '\u20AC \u2014';
        dareEl.className = 'dare-value zero';
      } else if (dare < 0) {
        dareEl.textContent = '-\u20AC ' + Math.abs(dare).toFixed(2).replace('.', ',');
        dareEl.className = 'dare-value negative';
      } else {
        dareEl.textContent = '\u20AC ' + dare.toFixed(2).replace('.', ',');
        dareEl.className = 'dare-value' + (dare === 0 ? ' zero' : '');
      }
    }

    // Carica bevande dal server, filtra per disponibilita' e cassa bar
    async function loadMenu() {
      try {
        var res = await fetch('/api/menu');
        var allItems = await res.json();

        BEVERAGES = allItems.filter(function(item) {
          if (!item.casses || !item.casses.includes('cassa_bar')) return false;
          return true;
        });

        bevMap = {};
        BEVERAGES.forEach(function(b) {
          if (!(b.id in quantities)) quantities[b.id] = 0;
          bevMap[b.id] = b;
        });

        document.getElementById('beverageList').innerHTML = renderBeverages();
        // Ripristina quantita' selezionate dopo re-render
        BEVERAGES.forEach(function(bev) {
          if (quantities[bev.id] > 0) {
            var countEl = document.getElementById('qty-' + bev.id);
            if (countEl) { countEl.textContent = quantities[bev.id]; countEl.classList.remove('zero'); }
            var card = document.getElementById('card-' + bev.id);
            if (card) card.classList.add('active');
          }
        });
        updateOrderColumn();
      } catch (err) {
        document.getElementById('beverageList').innerHTML =
          '<div style="padding:40px;text-align:center;color:#64748b">Errore caricamento menu</div>';
      }
    }

    // Sezioni con sotto-gruppi per bevande — colonne bilanciate
    // Se una sezione ha 'filter', usa quella; altrimenti filtra per categoria
    var CATEGORY_SECTIONS = [
      { cat: 'primo',     label: 'Primi' },
      { cat: 'secondo',   label: 'Secondi' },
      { cat: 'speciale',  label: 'Speciale del Giorno' },
      { cat: 'contorno',  label: 'Contorni' },
      { cat: 'condimento',label: 'Condimenti' },
      { cat: 'bevanda', label: 'Vini', filter: function(b) { return b.id.startsWith('vino_'); } },
      { cat: 'bevanda', label: 'Birra & Bottiglie', filter: function(b) { return ['birra_spina','prosecco','cabernet'].indexOf(b.id) >= 0; } },
      { cat: 'bevanda', label: 'Acqua & Bibite', filter: function(b) { return !b.id.startsWith('vino_') && ['birra_spina','prosecco','cabernet','caffe','sgroppino','dolce','caffe_mdg','mdg'].indexOf(b.id) < 0; } },
      { cat: 'bevanda', label: 'Caffè & Dolci', filter: function(b) { return ['caffe','sgroppino','dolce','caffe_mdg','mdg'].indexOf(b.id) >= 0; } },
    ];

    function renderCard(bev) {
      var exhausted = bev.status === 'exhausted';
      var disabled = bev.available === false;
      var priceFormatted = '\u20AC' + bev.price.toFixed(2).replace('.', ',');
      var tag = disabled ? '<span class="row-exhausted-tag">Non disp.</span>'
        : exhausted ? '<span class="row-exhausted-tag">Esaurito</span>' : '';
      return '<div class="menu-row' + ((exhausted || disabled) ? ' exhausted' : '') + '" id="card-' + bev.id + '">' +
        '<span class="row-name">' + bev.name + '</span>' +
        tag +
        '<span class="row-price">' + priceFormatted + '</span>' +
        '<div class="row-stepper">' +
          '<button class="step-btn step-minus" onclick="changeQty(\'' + bev.id + '\', -1)">\u2212</button>' +
          '<span class="step-count zero" id="qty-' + bev.id + '">0</span>' +
          '<button class="step-btn step-plus" onclick="changeQty(\'' + bev.id + '\', 1)">+</button>' +
        '</div>' +
      '</div>';
    }

    // ===== RENDER MENU — colonne verticali per categoria/sotto-gruppo =====
    function renderBeverages() {
      if (BEVERAGES.length === 0) {
        return '<div style="padding:40px;text-align:center;color:#64748b">Nessun articolo disponibile</div>';
      }
      var html = '<div class="category-columns">';
      CATEGORY_SECTIONS.forEach(function(sec) {
        // Se la sezione ha un filtro custom, usa quello; altrimenti filtra per categoria
        var items = sec.filter
          ? BEVERAGES.filter(function(b) { return b.category === sec.cat && sec.filter(b); })
          : BEVERAGES.filter(function(b) { return b.category === sec.cat; });
        if (items.length === 0) return;
        html += '<div class="category-column">';
        html += '<div class="section-header">' + sec.label + '</div>';
        items.forEach(function(bev) { html += renderCard(bev); });
        html += '</div>';
      });
      html += '</div>';
      return html;
    }

    loadMenu();

    // ===== LOGICA QUANTITA =====
    function changeQty(id, delta) {
      if (!connected || submitting) return;
      quantities[id] = Math.max(0, quantities[id] + delta);

      var countEl = document.getElementById('qty-' + id);
      countEl.textContent = quantities[id];
      countEl.classList.toggle('zero', quantities[id] === 0);

      var card = document.getElementById('card-' + id);
      card.classList.toggle('active', quantities[id] > 0);

      updateOrderColumn();
    }

    function setNote(id, value) {
      if (value && value.trim()) { itemNotes[id] = value.trim(); } else { delete itemNotes[id]; }
    }

    function removeItem(id) {
      if (submitting) return;
      quantities[id] = 0;
      delete itemNotes[id];
      var countEl = document.getElementById('qty-' + id);
      if (countEl) { countEl.textContent = '0'; countEl.classList.add('zero'); }
      var card = document.getElementById('card-' + id);
      if (card) card.classList.remove('active');
      updateOrderColumn();
    }

    // ===== CALCOLO TOTALE =====
    function calcOrder() {
      var totalItems = 0;
      var total = 0;
      BEVERAGES.forEach(function(bev) {
        totalItems += quantities[bev.id];
        total += quantities[bev.id] * bev.price;
      });
      total = Math.round(total * 100) / 100;
      return { totalItems: totalItems, total: total };
    }

    function formatPrice(value) {
      return '\u20AC ' + value.toFixed(2).replace('.', ',');
    }

    // ===== AGGIORNA COLONNA ORDINE =====
    function updateOrderColumn() {
      var result = calcOrder();
      var totalItems = result.totalItems;
      var total = result.total;

      var listEl = document.getElementById('orderItemsList');
      var selectedItems = BEVERAGES.filter(function(b) { return quantities[b.id] > 0; });

      if (selectedItems.length === 0) {
        listEl.innerHTML = '<div class="order-empty">Nessuna bevanda selezionata</div>';
      } else {
        var html = '';
        selectedItems.forEach(function(item) {
          var linePrice = item.price * quantities[item.id];
          var noteVal = itemNotes[item.id] || '';
          html += '<div class="order-item-row">' +
            '<span class="order-item-qty">' + quantities[item.id] + 'x</span>' +
            '<span class="order-item-name">' + item.name + '</span>' +
            '<span class="order-item-price">' + formatPrice(linePrice) + '</span>' +
            '<button class="order-item-remove" onclick="removeItem(\'' + item.id + '\')">&times;</button>' +
          '</div>' +
          '<div class="order-item-note">' +
            '<input type="text" placeholder="Nota..." value="' + noteVal.replace(/"/g, '&quot;') + '" onchange="setNote(\'' + item.id + '\', this.value)">' +
          '</div>';
        });
        listEl.innerHTML = html;
      }

      var grandTotal = document.getElementById('grandTotal');
      grandTotal.textContent = formatPrice(total);
      grandTotal.classList.toggle('empty', totalItems === 0);

      currentTotal = total;
      var restoBlock = document.getElementById('restoBlock');
      if (totalItems > 0 && !posActive) {
        restoBlock.style.display = '';
        updateResto();
      } else {
        restoBlock.style.display = 'none';
      }

      var canOrder = totalItems > 0;
      document.getElementById('btnOrder').classList.toggle('disabled', !canOrder);
    }

    // ===== INVIO ORDINE =====
    async function submitOrder() {
      if (!connected || submitting) return;

      var items = BEVERAGES
        .filter(function(bev) { return quantities[bev.id] > 0; })
        .map(function(bev) {
          var entry = { id: bev.id, qty: quantities[bev.id] };
          if (itemNotes[bev.id]) entry.note = itemNotes[bev.id];
          return entry;
        });

      if (items.length === 0) return;

      submitting = true;
      var btnOrder = document.getElementById('btnOrder');
      var progress = document.getElementById('orderProgress');
      var feedback = document.getElementById('orderFeedback');
      btnOrder.classList.add('disabled');

      feedback.classList.remove('visible', 'success', 'error');
      progress.classList.remove('done');
      progress.classList.add('active');

      try {
        var res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            table: 0,
            items: items,
            customer_name: document.getElementById('nameInput').value.trim() || null,
            source: 'bar',
            payment: posActive ? 'pos' : 'contanti',
          }),
        });
        var data = await res.json();

        progress.classList.remove('active');
        progress.classList.add('done');

        if (data.success) {
          var msg = data.order_number + '  ' + formatPrice(data.total);

          // Warning se le stampe non sono partite (proxy offline — job in coda)
          var noPrint = data.prints && !data.prints.receipt;
          if (noPrint) {
            msg += '  ⚠ STAMPA IN CODA';
            feedback.textContent = msg;
            feedback.classList.add('visible', 'error');
            beepAlert();
          } else {
            feedback.textContent = msg;
            feedback.classList.add('visible', 'success');
          }

          var lastEl = document.getElementById('lastOrder');
          lastEl.textContent = 'Ultimo: ' + data.order_number;
          lastEl.classList.add('visible');

          resetOrder();

          setTimeout(function() {
            feedback.classList.remove('visible');
            progress.classList.remove('done');
          }, noPrint ? 6000 : 3000);
        } else {
          feedback.textContent = data.error || 'Errore sconosciuto';
          feedback.classList.add('visible', 'error');
          setTimeout(function() {
            feedback.classList.remove('visible');
            progress.classList.remove('done');
          }, 4000);
        }
      } catch (err) {
        progress.classList.remove('active');
        progress.classList.add('done');
        feedback.textContent = 'Errore di rete';
        feedback.classList.add('visible', 'error');
        setTimeout(function() {
          feedback.classList.remove('visible');
          progress.classList.remove('done');
        }, 4000);
      }

      submitting = false;
    }

    function resetOrder() {
      Object.keys(itemNotes).forEach(function(k) { delete itemNotes[k]; });
      BEVERAGES.forEach(function(bev) {
        quantities[bev.id] = 0;
        var qtyEl = document.getElementById('qty-' + bev.id);
        if (qtyEl) { qtyEl.textContent = '0'; qtyEl.classList.add('zero'); }
        var cardEl = document.getElementById('card-' + bev.id);
        if (cardEl) cardEl.classList.remove('active');
      });
      document.getElementById('ricevutoInput').value = '';
      document.getElementById('nameInput').value = '';
      if (posActive) {
        posActive = false;
        document.getElementById('posToggle').classList.remove('active');
      }
      updateOrderColumn();
    }

    // ===== SOCKET.IO =====
    var socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    var offlineBanner = document.getElementById('offlineBanner');
    var statusLed = document.getElementById('statusLed');
    var statusText = document.getElementById('statusText');
    var tabStatus = document.getElementById('tabStatus');

    socket.on('connect', function() {
      connected = true;
      socket.emit('register', { role: 'cassa' });
      offlineBanner.classList.remove('visible');
      statusLed.classList.add('on');
      statusLed.classList.remove('off');
      tabStatus.classList.add('online');
      tabStatus.classList.remove('offline');
      statusText.textContent = 'Connesso';
      updateOrderColumn();
    });

    socket.on('disconnect', function() {
      connected = false;
      offlineBanner.classList.add('visible');
      statusLed.classList.remove('on');
      statusLed.classList.add('off');
      tabStatus.classList.remove('online');
      tabStatus.classList.add('offline');
      statusText.textContent = 'Offline';
    });

    var printerAlert = document.getElementById('printerAlert');
    var printerAlertText = document.getElementById('printerAlertText');

    function beepAlert() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch (e) {}
    }

    socket.on('printers_status_update', function(statuses) {
      var barPrinterIds = [2, 4];
      var offlinePrinters = statuses.filter(function(s) {
        return barPrinterIds.includes(s.id) && !s.online;
      });
      if (offlinePrinters.length > 0) {
        var names = offlinePrinters.map(function(p) { return p.name || 'Stampante ' + p.id; }).join(', ');
        printerAlertText.textContent = 'Stampante offline: ' + names;
        printerAlert.classList.add('visible');
        beepAlert();
      } else {
        printerAlert.classList.remove('visible');
      }
    });

    socket.on('connect', function() {
      setTimeout(function() { socket.emit('request_printer_check'); }, 2000);
    });

    // Ricarica menu quando l'admin modifica disponibilita', prezzo, ecc.
    socket.on('menu_updated', function() {
      loadMenu();
    });

    document.getElementById('ricevutoInput').addEventListener('input', updateResto);

  </script>
<script src="/js/sidebar.js"></script>
</body>
</html>
