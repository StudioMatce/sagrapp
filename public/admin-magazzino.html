<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SagrApp — Magazzino Materiali</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060a12;
      --card: #111827;
      --border: #1e293b;
      --green: #4ecca3;
      --red: #e94560;
      --yellow: #ffd93d;
      --gray: #6c7a89;
      --cyan: #22d3ee;
      --text: #e2e8f0;
      --text-dim: rgba(226, 232, 240, 0.45);
      --text-mid: rgba(226, 232, 240, 0.65);
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(78, 204, 163, 0.03) 0%, transparent 50%),
        var(--bg);
    }

    /* ===== HEADER ===== */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(6, 10, 18, 0.92);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-weight: 700;
      font-size: 18px;
    }

    .header-title span {
      color: var(--text-dim);
      font-weight: 400;
      font-size: 13px;
      margin-left: 6px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item-count-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    .conn-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gray);
      transition: all 300ms ease;
    }

    .conn-dot.online {
      background: var(--green);
      box-shadow: 0 0 6px rgba(78, 204, 163, 0.5);
    }

    .conn-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(78, 204, 163, 0.3);
      background: rgba(78, 204, 163, 0.08);
      color: var(--green);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 150ms ease;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: rgba(78, 204, 163, 0.15);
      border-color: var(--green);
    }

    .btn-add:active { transform: scale(0.97); }

    /* ===== PAGE CONTENT ===== */
    .page-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }

    /* ===== ITEM ROW ===== */
    .item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      transition: border-color 200ms ease;
    }

    .item-row:hover { border-color: rgba(226, 232, 240, 0.1); }

    .item-row.flash {
      border-color: rgba(78, 204, 163, 0.4);
    }

    .item-row.flash-warn {
      border-color: rgba(255, 217, 61, 0.4);
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 3px;
    }

    .item-threshold-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    /* Quantita' */
    .item-qty {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .qty-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .qty-dot.green { background: var(--green); }
    .qty-dot.yellow { background: var(--yellow); }
    .qty-dot.red { background: var(--red); }

    .qty-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid transparent;
      transition: all 150ms ease;
      white-space: nowrap;
    }

    .qty-display:hover {
      border-color: rgba(226, 232, 240, 0.15);
      background: rgba(255, 255, 255, 0.03);
    }

    .qty-display .sep { color: var(--gray); margin: 0 1px; }
    .qty-display .total { color: var(--gray); }

    .qty-input {
      width: 60px;
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid var(--cyan);
      background: var(--bg);
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    /* Pulsanti +/- */
    .qty-controls {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .qty-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 120ms ease;
      touch-action: manipulation;
    }

    .qty-btn:active { transform: scale(0.93); }

    .qty-btn.minus {
      color: var(--red);
      border-color: rgba(233, 69, 96, 0.2);
    }

    .qty-btn.minus:hover { background: rgba(233, 69, 96, 0.08); }

    .qty-btn.plus {
      color: var(--green);
      border-color: rgba(78, 204, 163, 0.2);
    }

    .qty-btn.plus:hover { background: rgba(78, 204, 163, 0.08); }

    /* Azioni (modifica, elimina) */
    .item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .act-icon {
      width: 32px;
      height: 32px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--gray);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 150ms ease;
    }

    .act-icon:hover {
      border-color: rgba(226, 232, 240, 0.2);
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
    }

    .act-icon.delete:hover {
      border-color: rgba(233, 69, 96, 0.3);
      color: var(--red);
      background: rgba(233, 69, 96, 0.06);
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
      padding: 20px;
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 440px;
      transform: translateY(20px);
      transition: transform 200ms ease;
    }

    .modal-overlay.visible .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-weight: 700;
      font-size: 16px;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--gray);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 150ms ease;
    }

    .modal-close:hover { color: var(--red); border-color: rgba(233, 69, 96, 0.3); }

    .modal-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .field-row {
      display: flex;
      gap: 12px;
    }

    .field-row .field { flex: 1; }

    .field-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      outline: none;
      transition: border-color 150ms ease;
    }

    .field-input:focus { border-color: var(--green); }

    .field-hint {
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-cancel {
      padding: 10px 20px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-mid);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .btn-cancel:hover { border-color: rgba(226, 232, 240, 0.2); color: var(--text); }

    .btn-save {
      padding: 10px 24px;
      border-radius: 6px;
      border: 1px solid var(--green);
      background: var(--green);
      color: var(--bg);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .btn-save:hover { box-shadow: 0 0 16px rgba(78, 204, 163, 0.3); }
    .btn-save:disabled { opacity: 0.4; pointer-events: none; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--gray);
    }

    .empty-state-text {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .empty-state-sub {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ===== CATEGORY TABS ===== */
    .cat-tabs {
      display: flex;
      gap: 6px;
      padding: 16px 16px 0;
      max-width: 800px;
      margin: 0 auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .cat-tabs::-webkit-scrollbar { display: none; }

    .cat-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-mid);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 150ms ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .cat-tab:hover { border-color: rgba(226, 232, 240, 0.15); color: var(--text); }

    .cat-tab.active {
      background: rgba(78, 204, 163, 0.1);
      border-color: rgba(78, 204, 163, 0.3);
      color: var(--green);
    }

    .cat-tab-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-dim);
    }

    .cat-tab.active .cat-tab-count {
      background: rgba(78, 204, 163, 0.15);
      color: var(--green);
    }

    /* ===== CATEGORY SECTION HEADER ===== */
    .cat-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 4px 8px;
      margin-top: 16px;
    }

    .cat-section-header:first-child { margin-top: 0; }

    .cat-section-name {
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--green);
    }

    .cat-section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .cat-section-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
    }

    /* ===== OVERLAY CONNESSIONE PERSA ===== */
    .lost-overlay {
      position: fixed;
      inset: 0;
      background: rgba(233, 69, 96, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms ease;
    }

    .lost-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .lost-text {
      font-weight: 700;
      font-size: clamp(24px, 5vw, 48px);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fff;
    }

    .lost-sub {
      font-size: clamp(13px, 2vw, 18px);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 8px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .item-row { gap: 8px; padding: 12px; flex-wrap: wrap; }
      .item-info { flex-basis: 100%; order: -1; }
      .qty-btn { min-width: 40px; height: 40px; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="page-header">
    <div class="header-left">
      <div class="header-title">Magazzino<span>Materiali e consumabili</span></div>
    </div>
    <div class="header-right">
      <span class="item-count-badge" id="itemCountBadge">--</span>
      <div class="conn-indicator">
        <div class="conn-dot" id="connDot"></div>
        <span class="conn-label" id="connLabel">Offline</span>
      </div>
      <button class="btn-add" id="btnExport" style="border-color:rgba(34,211,238,0.3);background:rgba(34,211,238,0.08);color:var(--cyan)">CSV</button>
      <label class="btn-add" id="btnImport" style="border-color:rgba(255,217,61,0.3);background:rgba(255,217,61,0.08);color:var(--yellow);margin:0;cursor:pointer">
        Importa
        <input type="file" accept=".csv" id="csvFileInput" style="display:none">
      </label>
      <button class="btn-add" id="btnAdd">+ Nuovo</button>
    </div>
  </header>

  <!-- Tab categorie -->
  <div class="cat-tabs" id="catTabs"></div>

  <div class="page-wrap">
    <div id="itemList">
      <div class="empty-state">
        <div class="empty-state-text">Nessun articolo in magazzino</div>
        <div class="empty-state-sub">Usa "+ Nuovo" per aggiungere materiali e consumabili</div>
      </div>
    </div>
  </div>

  <!-- MODAL: Nuovo / Modifica articolo -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Nuovo articolo</div>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label class="field-label">Nome articolo</label>
          <input class="field-input" id="fName" type="text" placeholder="es. Bicchieri plastica">
        </div>
        <div class="field">
          <label class="field-label">Categoria</label>
          <input class="field-input" id="fCategory" type="text" list="categoryList" placeholder="es. Posate, Bevande, Pulizia...">
          <datalist id="categoryList"></datalist>
          <span class="field-hint">Scegli una esistente o scrivi per crearne una nuova</span>
        </div>
        <div class="field-row">
          <div class="field">
            <label class="field-label">Quantita attuale</label>
            <input class="field-input" id="fQty" type="number" min="0" value="0" style="font-family: 'JetBrains Mono', monospace;">
          </div>
          <div class="field">
            <label class="field-label">Quantita totale</label>
            <input class="field-input" id="fTotal" type="number" min="0" value="0" style="font-family: 'JetBrains Mono', monospace;">
          </div>
        </div>
        <div class="field">
          <label class="field-label">Soglia allarme</label>
          <input class="field-input" id="fThreshold" type="number" min="0" placeholder="Opzionale" style="font-family: 'JetBrains Mono', monospace;">
          <span class="field-hint">Lascia vuoto per nessun allarme</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancel">Annulla</button>
        <button class="btn-save" id="btnSave">Salva</button>
      </div>
    </div>
  </div>

  <!-- Overlay connessione persa -->
  <div class="lost-overlay" id="lostOverlay">
    <div class="lost-text">Connessione Persa</div>
    <div class="lost-sub">Riconnessione in corso&hellip;</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // =============================================
    //  AUTH
    // =============================================
    var TOKEN = sessionStorage.getItem('admin_token');
    if (!TOKEN) window.location.href = '/';

    (async function checkAuth() {
      try {
        var res = await fetch('/api/admin/verify?token=' + encodeURIComponent(TOKEN));
        var data = await res.json();
        if (!data.valid) {
          sessionStorage.removeItem('admin_token');
          window.location.href = '/';
        }
      } catch (e) { /* procedi */ }
    })();

    function apiHeaders() {
      return { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN };
    }

    // =============================================
    //  STATO
    // =============================================
    var items = [];       // Array di articoli warehouse
    var editingId = null; // null = nuovo, altrimenti id in modifica
    var activeCategory = 'tutti'; // Filtro categoria attiva

    // =============================================
    //  RENDERING
    // =============================================
    var listEl = document.getElementById('itemList');

    function qtyDotColor(item) {
      if (item.quantity <= 0) return 'red';
      if (item.alert_threshold !== null && item.alert_threshold !== undefined && item.quantity <= item.alert_threshold) return 'yellow';
      return 'green';
    }

    function formatTimestamp(ts) {
      if (!ts) return '';
      var d = new Date(ts);
      return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }) + ' ' +
             d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    }

    function renderRow(item) {
      var dot = qtyDotColor(item);
      var metaParts = [];
      if (item.category) metaParts.push(escapeHtml(item.category));
      if (item.alert_threshold !== null && item.alert_threshold !== undefined) metaParts.push('soglia: ' + item.alert_threshold);
      if (item.updated_at) metaParts.push(formatTimestamp(item.updated_at));

      var html = '<div class="item-row" data-id="' + item.id + '">';

      // Info
      html += '<div class="item-info">';
      html += '<div class="item-name">' + escapeHtml(item.name) + '</div>';
      if (metaParts.length > 0) {
        html += '<div class="item-meta"><span class="item-threshold-label">' + metaParts.join(' · ') + '</span></div>';
      }
      html += '</div>';

      // Quantita'
      html += '<div class="item-qty">';
      html += '<span class="qty-dot ' + dot + '"></span>';
      html += '<span class="qty-display" data-id="' + item.id + '">';
      html += item.quantity;
      if (item.total > 0) html += '<span class="sep">/</span><span class="total">' + item.total + '</span>';
      html += '</span>';
      html += '</div>';

      // Pulsanti +/-
      html += '<div class="qty-controls">';
      html += '<button class="qty-btn minus" data-id="' + item.id + '" data-delta="-5">&minus;5</button>';
      html += '<button class="qty-btn minus" data-id="' + item.id + '" data-delta="-1">&minus;1</button>';
      html += '<button class="qty-btn plus" data-id="' + item.id + '" data-delta="1">+1</button>';
      html += '<button class="qty-btn plus" data-id="' + item.id + '" data-delta="5">+5</button>';
      html += '<button class="qty-btn plus" data-id="' + item.id + '" data-delta="10">+10</button>';
      html += '</div>';

      // Azioni
      html += '<div class="item-actions">';
      html += '<button class="act-icon edit-btn" data-id="' + item.id + '" title="Modifica">&#9998;</button>';
      html += '<button class="act-icon delete delete-btn" data-id="' + item.id + '" title="Elimina">&times;</button>';
      html += '</div>';

      html += '</div>';
      return html;
    }

    // Estrae le categorie uniche dagli articoli, ordinate alfabeticamente
    function getCategories() {
      var cats = {};
      items.forEach(function(i) {
        var cat = i.category || 'Altro';
        if (!cats[cat]) cats[cat] = 0;
        cats[cat]++;
      });
      return Object.keys(cats).sort(function(a, b) {
        // "Altro" sempre in fondo
        if (a === 'Altro') return 1;
        if (b === 'Altro') return -1;
        return a.localeCompare(b, 'it');
      }).map(function(name) { return { name: name, count: cats[name] }; });
    }

    function renderTabs() {
      var categories = getCategories();
      var tabsEl = document.getElementById('catTabs');

      // Se c'è solo una categoria (o zero), nascondi i tab
      if (categories.length <= 1) {
        tabsEl.innerHTML = '';
        return;
      }

      var html = '<button class="cat-tab' + (activeCategory === 'tutti' ? ' active' : '') + '" data-cat="tutti">' +
        'Tutti<span class="cat-tab-count">' + items.length + '</span></button>';

      categories.forEach(function(cat) {
        html += '<button class="cat-tab' + (activeCategory === cat.name ? ' active' : '') + '" data-cat="' + escapeHtml(cat.name) + '">' +
          escapeHtml(cat.name) + '<span class="cat-tab-count">' + cat.count + '</span></button>';
      });

      tabsEl.innerHTML = html;

      // Bind tab clicks
      tabsEl.querySelectorAll('.cat-tab').forEach(function(el) {
        el.addEventListener('click', function() {
          activeCategory = el.dataset.cat;
          renderTabs();
          renderList();
        });
      });
    }

    function renderList() {
      // Filtra per categoria attiva
      var filtered = activeCategory === 'tutti' ? items : items.filter(function(i) {
        return (i.category || 'Altro') === activeCategory;
      });

      document.getElementById('itemCountBadge').textContent = filtered.length + ' / ' + items.length + ' articoli';

      if (filtered.length === 0) {
        listEl.innerHTML =
          '<div class="empty-state">' +
          '<div class="empty-state-text">Nessun articolo in magazzino</div>' +
          '<div class="empty-state-sub">Usa "+ Nuovo" per aggiungere materiali e consumabili</div>' +
          '</div>';
        return;
      }

      // Se siamo su "tutti", raggruppa per categoria con header di sezione
      if (activeCategory === 'tutti') {
        var categories = getCategories();
        var html = '';
        categories.forEach(function(cat) {
          var catItems = filtered.filter(function(i) { return (i.category || 'Altro') === cat.name; });
          if (catItems.length === 0) return;

          html += '<div class="cat-section-header">' +
            '<span class="cat-section-name">' + escapeHtml(cat.name) + '</span>' +
            '<div class="cat-section-line"></div>' +
            '<span class="cat-section-count">' + cat.count + '</span>' +
            '</div>';
          html += catItems.map(renderRow).join('');
        });
        listEl.innerHTML = html;
      } else {
        listEl.innerHTML = filtered.map(renderRow).join('');
      }

      bindEvents();
    }

    function renderAll() {
      renderTabs();
      renderList();
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Flash sulla riga
    function flashRow(id, type) {
      var row = document.querySelector('.item-row[data-id="' + id + '"]');
      if (!row) return;
      var cls = type === 'warn' ? 'flash-warn' : 'flash';
      row.classList.add(cls);
      setTimeout(function() { row.classList.remove(cls); }, 300);
    }

    // Aggiorna solo la parte quantita' di una riga
    function updateRowQty(item) {
      var row = document.querySelector('.item-row[data-id="' + item.id + '"]');
      if (!row) { renderAll(); return; }

      var dot = row.querySelector('.qty-dot');
      if (dot) dot.className = 'qty-dot ' + qtyDotColor(item);

      var display = row.querySelector('.qty-display');
      if (display) {
        var html = '' + item.quantity;
        if (item.total > 0) html += '<span class="sep">/</span><span class="total">' + item.total + '</span>';
        display.innerHTML = html;
      }
    }

    // =============================================
    //  EVENT BINDING
    // =============================================
    function bindEvents() {
      // Pulsanti +/-
      document.querySelectorAll('.qty-btn').forEach(function(el) {
        el.addEventListener('click', function() {
          adjustItem(el.dataset.id, parseInt(el.dataset.delta));
        });
      });

      // Click su quantita' → input per valore esatto
      document.querySelectorAll('.qty-display').forEach(function(el) {
        el.addEventListener('click', function() {
          var id = el.dataset.id;
          var item = items.find(function(i) { return i.id === id; });
          if (!item) return;

          var input = document.createElement('input');
          input.type = 'number';
          input.min = '0';
          input.value = item.quantity;
          input.className = 'qty-input';
          el.replaceWith(input);
          input.focus();
          input.select();

          function save() {
            var val = parseInt(input.value);
            if (isNaN(val) || val < 0) val = item.quantity;
            setItemQty(id, val);

            var span = document.createElement('span');
            span.className = 'qty-display';
            span.dataset.id = id;
            var html = '' + val;
            if (item.total > 0) html += '<span class="sep">/</span><span class="total">' + item.total + '</span>';
            span.innerHTML = html;
            input.replaceWith(span);
            // Ri-aggancia evento
            span.addEventListener('click', function() { renderAll(); });
          }

          input.addEventListener('blur', save);
          input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') input.blur();
            if (e.key === 'Escape') { input.value = item.quantity; input.blur(); }
          });
        });
      });

      // Modifica
      document.querySelectorAll('.edit-btn').forEach(function(el) {
        el.addEventListener('click', function() { openEditModal(el.dataset.id); });
      });

      // Elimina
      document.querySelectorAll('.delete-btn').forEach(function(el) {
        el.addEventListener('click', function() { deleteItem(el.dataset.id); });
      });
    }

    // =============================================
    //  API
    // =============================================
    async function loadItems() {
      try {
        var res = await fetch('/api/warehouse', { headers: apiHeaders() });
        items = await res.json();
        renderAll();
      } catch (e) {
        console.error('Errore caricamento magazzino:', e);
      }
    }

    async function adjustItem(id, delta) {
      var item = items.find(function(i) { return i.id === id; });
      if (!item) return;

      // Aggiornamento ottimistico
      item.quantity = Math.max(0, item.quantity + delta);
      updateRowQty(item);
      flashRow(id, item.alert_threshold !== null && item.quantity <= item.alert_threshold ? 'warn' : 'ok');

      try {
        var res = await fetch('/api/warehouse/' + encodeURIComponent(id) + '/adjust', {
          method: 'POST',
          headers: apiHeaders(),
          body: JSON.stringify({ delta: delta }),
        });
        var updated = await res.json();
        if (updated && updated.id) Object.assign(item, updated);
        updateRowQty(item);
      } catch (e) {
        console.error('Errore adjust:', e);
        loadItems();
      }
    }

    async function setItemQty(id, value) {
      var item = items.find(function(i) { return i.id === id; });
      if (!item) return;

      item.quantity = value;
      updateRowQty(item);
      flashRow(id, 'ok');

      try {
        await fetch('/api/warehouse/' + encodeURIComponent(id), {
          method: 'PUT',
          headers: apiHeaders(),
          body: JSON.stringify({ quantity: value }),
        });
      } catch (e) {
        console.error('Errore set qty:', e);
        loadItems();
      }
    }

    async function deleteItem(id) {
      var item = items.find(function(i) { return i.id === id; });
      if (!item) return;
      if (!confirm('Eliminare "' + item.name + '" dal magazzino?')) return;

      try {
        await fetch('/api/warehouse/' + encodeURIComponent(id), {
          method: 'DELETE',
          headers: apiHeaders(),
        });
        items = items.filter(function(i) { return i.id !== id; });
        renderAll();
      } catch (e) {
        console.error('Errore eliminazione:', e);
      }
    }

    // =============================================
    //  MODAL
    // =============================================
    var modalOverlay = document.getElementById('modalOverlay');

    document.getElementById('btnAdd').addEventListener('click', function() { openNewModal(); });
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('btnCancel').addEventListener('click', closeModal);
    document.getElementById('btnSave').addEventListener('click', handleSave);
    modalOverlay.addEventListener('click', function(e) { if (e.target === modalOverlay) closeModal(); });

    function updateCategoryDatalist() {
      var cats = {};
      items.forEach(function(i) { if (i.category) cats[i.category] = true; });
      var dl = document.getElementById('categoryList');
      dl.innerHTML = Object.keys(cats).sort().map(function(c) {
        return '<option value="' + escapeHtml(c) + '">';
      }).join('');
    }

    function openNewModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Nuovo articolo';
      document.getElementById('fName').value = '';
      document.getElementById('fCategory').value = '';
      document.getElementById('fQty').value = '0';
      document.getElementById('fTotal').value = '0';
      document.getElementById('fThreshold').value = '';
      updateCategoryDatalist();
      modalOverlay.classList.add('visible');
      document.getElementById('fName').focus();
    }

    function openEditModal(id) {
      var item = items.find(function(i) { return i.id === id; });
      if (!item) return;

      editingId = id;
      document.getElementById('modalTitle').textContent = 'Modifica articolo';
      document.getElementById('fName').value = item.name;
      document.getElementById('fCategory').value = item.category || '';
      document.getElementById('fQty').value = item.quantity;
      document.getElementById('fTotal').value = item.total || 0;
      document.getElementById('fThreshold').value = item.alert_threshold !== null && item.alert_threshold !== undefined ? item.alert_threshold : '';
      updateCategoryDatalist();
      modalOverlay.classList.add('visible');
      document.getElementById('fName').focus();
    }

    function closeModal() {
      modalOverlay.classList.remove('visible');
      editingId = null;
    }

    async function handleSave() {
      var name = document.getElementById('fName').value.trim();
      var qty = parseInt(document.getElementById('fQty').value) || 0;
      var total = parseInt(document.getElementById('fTotal').value) || 0;
      var thresholdVal = document.getElementById('fThreshold').value.trim();
      var threshold = thresholdVal !== '' ? parseInt(thresholdVal) : null;

      if (!name) {
        document.getElementById('fName').style.borderColor = 'var(--red)';
        return;
      }
      document.getElementById('fName').style.borderColor = '';

      var category = document.getElementById('fCategory').value.trim() || null;
      var payload = { name: name, quantity: qty, total: total, alert_threshold: threshold, category: category };

      var btn = document.getElementById('btnSave');
      btn.disabled = true;
      btn.textContent = 'Salvataggio...';

      try {
        if (editingId) {
          var res = await fetch('/api/warehouse/' + encodeURIComponent(editingId), {
            method: 'PUT',
            headers: apiHeaders(),
            body: JSON.stringify(payload),
          });
          var updated = await res.json();
          var idx = items.findIndex(function(i) { return i.id === editingId; });
          if (idx >= 0 && updated.id) Object.assign(items[idx], updated);
        } else {
          var res2 = await fetch('/api/warehouse', {
            method: 'POST',
            headers: apiHeaders(),
            body: JSON.stringify(payload),
          });
          if (!res2.ok) {
            var err = await res2.json();
            alert('Errore: ' + (err.error || 'Impossibile creare articolo'));
            return;
          }
          var newItem = await res2.json();
          // Evita duplicato: il socket event 'warehouse_updated' potrebbe averlo gia' aggiunto
          if (!items.find(function(i) { return i.id === newItem.id; })) {
            items.push(newItem);
          }
        }

        closeModal();
        renderAll();
      } catch (e) {
        console.error('Errore salvataggio:', e);
        alert('Errore di rete');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salva';
      }
    }

    // =============================================
    //  CSV EXPORT / IMPORT
    // =============================================
    document.getElementById('btnExport').addEventListener('click', function() {
      window.location.href = '/api/warehouse/export?token=' + encodeURIComponent(TOKEN);
    });

    document.getElementById('csvFileInput').addEventListener('change', async function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var text = await file.text();
      // Rimuovi BOM se presente
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      var lines = text.split('\n').filter(function(l) {
        var t = l.trim();
        // Salta righe vuote, sep=; e righe di sezione (---)
        return t && t !== 'sep=;' && !t.startsWith('---');
      });
      if (lines.length < 2) { alert('CSV vuoto o senza righe dati'); return; }

      // Auto-detect separatore: se l'header contiene ; usa quello, altrimenti ,
      var sep = lines[0].indexOf(';') >= 0 ? ';' : ',';
      var headers = lines[0].split(sep).map(function(h) { return h.trim().toLowerCase().replace(/['"]/g, ''); });
      var rows = [];
      for (var i = 1; i < lines.length; i++) {
        var vals = lines[i].split(sep);
        var row = {};
        headers.forEach(function(h, idx) {
          row[h] = (vals[idx] || '').replace(/^"|"$/g, '').trim();
        });
        if (row.nome) rows.push(row);
      }

      if (rows.length === 0) { alert('Nessun dato valido nel CSV'); return; }
      if (!confirm('Importare ' + rows.length + ' articoli? Gli articoli con lo stesso nome verranno aggiornati.')) return;

      try {
        var res = await fetch('/api/warehouse/import', {
          method: 'POST',
          headers: apiHeaders(),
          body: JSON.stringify({ rows: rows }),
        });
        var data = await res.json();
        if (data.success) {
          alert('Importati ' + data.imported + ' articoli');
          loadItems();
        } else {
          alert('Errore: ' + (data.error || 'Sconosciuto'));
        }
      } catch (err) {
        alert('Errore di rete');
      }
      e.target.value = '';
    });

    // =============================================
    //  SOCKET.IO
    // =============================================
    var socket = io(window.location.origin, {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
    });

    var connDot = document.getElementById('connDot');
    var connLabel = document.getElementById('connLabel');
    var lostOverlay = document.getElementById('lostOverlay');

    socket.on('connect', function() {
      socket.emit('register', { role: 'admin' });
      connDot.classList.add('online');
      connLabel.textContent = 'Online';
      lostOverlay.classList.remove('visible');
    });

    socket.on('disconnect', function() {
      connDot.classList.remove('online');
      connLabel.textContent = 'Offline';
      lostOverlay.classList.add('visible');
    });

    socket.on('warehouse_updated', function(data) {
      if (!data) return;
      // Import massivo: ricarica tutto
      if (data.action === 'bulk_import') { loadItems(); return; }
      if (!data.item) return;

      if (data.action === 'deleted') {
        items = items.filter(function(i) { return i.id !== data.item.id; });
        renderAll();
      } else if (data.action === 'added') {
        if (!items.find(function(i) { return i.id === data.item.id; })) {
          items.push(data.item);
          renderAll();
        }
      } else {
        var idx = items.findIndex(function(i) { return i.id === data.item.id; });
        if (idx >= 0) {
          Object.assign(items[idx], data.item);
          updateRowQty(items[idx]);
          flashRow(data.item.id, 'ok');
        }
      }
    });

    // =============================================
    //  INIT
    // =============================================
    loadItems();
  </script>
<script src="/js/sidebar.js"></script>
</body>
