<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SagrApp — Storico Servizi</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #060a12;
      --bg-surface: #0b1120;
      --bg-raised:  #111827;
      --border:     #1e293b;
      --border-dim: rgba(30,41,59,0.5);
      --green:      #4ecca3;
      --green-dim:  rgba(78,204,163,0.10);
      --red:        #e94560;
      --red-dim:    rgba(233,69,96,0.10);
      --amber:      #fbbf24;
      --amber-dim:  rgba(251,191,36,0.10);
      --indigo:     #818cf8;
      --indigo-dim: rgba(129,140,248,0.10);
      --cyan:       #22d3ee;
      --text:       #e2e8f0;
      --text-dim:   rgba(226,232,240,0.45);
      --text-muted: #475569;
      --radius:     10px;
      --radius-sm:  7px;
    }

    html { font-size: 16px; background: var(--bg); }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    .page-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 56px;
      background: rgba(6,10,18,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .header-title { font-weight: 700; font-size: 1rem; letter-spacing: -0.01em; }
    .sort-toggle { padding:4px 10px; border-radius:4px; border:1px solid var(--border); background:transparent; color:rgba(226,232,240,0.45); font-family:'Outfit',sans-serif; font-size:11px; font-weight:600; cursor:pointer; transition:all 150ms ease; }
    .sort-toggle.active { background:rgba(78,204,163,0.1); border-color:rgba(78,204,163,0.3); color:#4ecca3; }
    .header-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--green); background: var(--green-dim);
      border: 1px solid rgba(78,204,163,0.2); border-radius: 20px; padding: 3px 10px;
    }

    /* ===== BODY ===== */
    .page-body { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ===== EMPTY / ERROR ===== */
    .state-center {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 80px 24px;
      color: var(--text-muted); font-size: 0.9rem;
    }
    .state-center-icon { font-size: 2.5rem; opacity: 0.35; }
    .state-center-title { font-weight: 600; color: var(--text-dim); }
    .state-center-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; text-align: center; }
    .state-error {
      background: var(--red-dim); border: 1px solid rgba(233,69,96,0.2);
      border-radius: var(--radius); padding: 16px 20px; font-size: 0.85rem; color: var(--red);
    }

    /* ===== HERO — RECAP TOTALE ===== */
    .hero-card {
      background: linear-gradient(135deg, rgba(78,204,163,0.06) 0%, rgba(34,211,238,0.04) 100%);
      border: 1px solid rgba(78,204,163,0.18);
      border-radius: 12px;
      padding: 22px 24px;
      margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
      transition: all 200ms ease;
      animation: fadeSlide 400ms ease both;
    }
    .hero-card:hover {
      border-color: rgba(78,204,163,0.35);
      background: linear-gradient(135deg, rgba(78,204,163,0.10) 0%, rgba(34,211,238,0.06) 100%);
    }
    .hero-card:active { transform: scale(0.99); }

    .hero-left { display: flex; flex-direction: column; gap: 4px; }
    .hero-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--green); opacity: 0.8;
    }
    .hero-revenue {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800; font-size: 1.6rem; color: #fff;
      letter-spacing: -0.02em; line-height: 1.1;
    }
    .hero-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; color: var(--text-dim); margin-top: 2px;
    }
    .hero-arrow {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(78,204,163,0.08); border: 1px solid rgba(78,204,163,0.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--green); flex-shrink: 0;
      transition: all 200ms ease;
    }
    .hero-card:hover .hero-arrow {
      background: rgba(78,204,163,0.15); border-color: rgba(78,204,163,0.3);
    }
    .hero-arrow svg { width: 16px; height: 16px; }

    /* ===== GROUP CARD ===== */
    .group-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      border-radius: 12px;
      margin-bottom: 14px;
      overflow: hidden;
      animation: fadeSlide 400ms ease both;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .group-card.deleting { opacity: 0.2; pointer-events: none; transition: opacity 300ms; }

    /* weekend accent strip */
    .group-card.weekend { border-color: rgba(78,204,163,0.12); }

    .group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 10px;
    }
    .group-header-left { display: flex; align-items: center; gap: 10px; }
    .group-title {
      font-weight: 700; font-size: 0.88rem; color: var(--text);
    }
    .group-type-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 4px;
    }
    .group-type-badge.weekend {
      color: var(--green); background: var(--green-dim);
      border: 1px solid rgba(78,204,163,0.15);
    }

    .group-recap-btn {
      font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
      font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-muted); background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 5px 12px; cursor: pointer;
      transition: all 150ms ease; text-decoration: none;
    }
    .group-recap-btn:hover {
      color: var(--green); border-color: rgba(78,204,163,0.3);
      background: var(--green-dim);
    }

    /* day sub-header inside group */
    .day-header {
      padding: 6px 18px;
      font-size: 0.72rem; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.06em;
      border-top: 1px solid var(--border-dim);
    }
    .day-header:first-child { border-top: none; }

    /* ===== TURNO ROW ===== */
    .turno-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 18px;
      cursor: pointer;
      transition: background 150ms ease;
      border-top: 1px solid rgba(30,41,59,0.3);
    }
    .turno-row:hover { background: rgba(255,255,255,0.02); }
    .turno-row:active { background: rgba(255,255,255,0.04); }

    .turno-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
      font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px;
      min-width: 56px; text-align: center; flex-shrink: 0;
    }
    .turno-badge.pranzo {
      color: var(--amber); background: var(--amber-dim);
      border: 1px solid rgba(251,191,36,0.2);
    }
    .turno-badge.cena {
      color: var(--indigo); background: var(--indigo-dim);
      border: 1px solid rgba(129,140,248,0.2);
    }
    .turno-badge.unico {
      color: var(--text-dim); background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-dim);
    }

    .turno-label {
      font-size: 0.78rem; font-weight: 500; color: var(--text-dim);
      flex-shrink: 0; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .turno-revenue {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700; font-size: 0.88rem; color: var(--green);
      margin-left: auto; flex-shrink: 0;
    }

    .turno-orders {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; color: var(--text-muted);
      min-width: 52px; text-align: right; flex-shrink: 0;
    }

    .turno-actions {
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
      margin-left: 4px;
    }

    /* small icon buttons */
    .btn-sm {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: var(--radius-sm);
      border: 1px solid transparent; background: transparent;
      color: var(--text-muted); cursor: pointer;
      transition: all 150ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-sm:hover { border-color: var(--border); background: var(--bg-raised); color: var(--text); }
    .btn-sm svg { width: 13px; height: 13px; pointer-events: none; }
    .btn-sm.dl:hover { color: var(--green); border-color: rgba(78,204,163,0.3); }
    .btn-sm.dl.loading { opacity: 0.4; pointer-events: none; }
    .btn-sm.del:hover { color: var(--red); border-color: rgba(233,69,96,0.3); background: var(--red-dim); }
    .btn-sm.rename:hover { color: var(--cyan); border-color: rgba(34,211,238,0.3); }

    /* ===== GROUP FOOTER ===== */
    .group-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px 12px;
      border-top: 1px solid var(--border-dim);
      background: rgba(255,255,255,0.01);
    }
    .group-footer-left {
      display: flex; align-items: center; gap: 8px;
    }
    .group-dl:hover { background: var(--green-dim) !important; }
    .group-total-label {
      font-size: 0.68rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .group-total-values {
      display: flex; align-items: center; gap: 16px;
    }
    .group-total-revenue {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800; font-size: 0.92rem; color: var(--green);
    }
    .group-total-orders {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; color: var(--text-muted);
    }

    /* ===== RENAME MODAL (inline overlay) ===== */
    .rename-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      animation: fadeIn 150ms ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .rename-modal {
      background: var(--bg-raised); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; width: 340px; max-width: 90vw;
    }
    .rename-modal-title {
      font-weight: 700; font-size: 0.92rem; margin-bottom: 14px;
    }
    .rename-input {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: 'Outfit', sans-serif;
      font-size: 0.88rem; font-weight: 500; outline: none;
      transition: border-color 150ms;
    }
    .rename-input:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(78,204,163,0.12); }
    .rename-btns {
      display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end;
    }
    .rename-btn {
      padding: 8px 18px; border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 150ms;
    }
    .rename-btn.cancel {
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    }
    .rename-btn.cancel:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .rename-btn.save {
      background: var(--green); border: none; color: var(--bg); font-weight: 700;
    }
    .rename-btn.save:hover { box-shadow: 0 0 16px rgba(78,204,163,0.3); }

    /* ===== RICONCILIAZIONE POS — header button ===== */
    .reconcile-btn {
      padding:4px 12px; border-radius:4px; border:1px solid rgba(34,211,238,0.25);
      background:rgba(34,211,238,0.06); color:var(--cyan);
      font-family:'Outfit',sans-serif; font-size:11px; font-weight:600;
      cursor:pointer; transition:all 150ms ease;
    }
    .reconcile-btn:hover { background:rgba(34,211,238,0.12); border-color:rgba(34,211,238,0.4); }

    /* ===== RICONCILIAZIONE POS — modal ===== */
    .rec-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7);
      z-index:300; display:flex; align-items:flex-start; justify-content:center;
      padding:24px 12px; overflow-y:auto;
      animation:fadeIn 150ms ease;
    }
    .rec-modal {
      background:var(--bg-surface); border:1px solid var(--border);
      border-radius:14px; width:100%; max-width:900px;
      margin:auto 0; overflow:hidden;
    }
    .rec-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 22px; border-bottom:1px solid var(--border);
      background:rgba(34,211,238,0.04);
    }
    .rec-title { font-weight:700; font-size:1rem; color:var(--text); }
    .rec-close {
      width:32px; height:32px; border-radius:8px; border:1px solid var(--border);
      background:transparent; color:var(--text-muted); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:1.2rem;
    }
    .rec-close:hover { color:var(--red); border-color:rgba(233,69,96,0.3); }
    .rec-body { padding:20px 22px; }
    .rec-step-label {
      font-size:0.66rem; font-weight:700; letter-spacing:0.08em;
      text-transform:uppercase; color:var(--cyan); margin-bottom:8px;
    }
    .rec-help {
      font-size:0.8rem; color:var(--text-dim); margin-bottom:14px; line-height:1.5;
    }
    .rec-upload-area {
      border:2px dashed var(--border); border-radius:10px;
      padding:32px 20px; text-align:center; cursor:pointer;
      transition:all 150ms; background:var(--bg);
    }
    .rec-upload-area:hover { border-color:var(--cyan); background:rgba(34,211,238,0.03); }
    .rec-upload-area.dragover { border-color:var(--cyan); background:rgba(34,211,238,0.08); }
    .rec-upload-icon { font-size:2rem; opacity:0.5; margin-bottom:8px; }
    .rec-upload-text { font-size:0.85rem; color:var(--text-dim); font-weight:500; }
    .rec-upload-hint { font-size:0.72rem; color:var(--text-muted); margin-top:4px; font-family:'JetBrains Mono', monospace; }
    .rec-textarea {
      width:100%; min-height:80px; max-height:160px; margin-top:10px;
      padding:8px 10px; border-radius:8px; background:var(--bg);
      border:1px solid var(--border); color:var(--text);
      font-family:'JetBrains Mono', monospace; font-size:0.72rem;
      resize:vertical; outline:none;
    }
    .rec-textarea:focus { border-color:var(--cyan); }
    .rec-summary {
      display:grid; grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));
      gap:10px; margin:16px 0;
    }
    .rec-summary-card {
      background:var(--bg); border:1px solid var(--border-dim);
      border-radius:8px; padding:12px 14px;
    }
    .rec-summary-label {
      font-size:0.62rem; font-weight:700; letter-spacing:0.06em;
      text-transform:uppercase; color:var(--text-muted); margin-bottom:4px;
    }
    .rec-summary-value {
      font-family:'JetBrains Mono', monospace;
      font-weight:700; font-size:1rem; color:var(--text);
    }
    .rec-summary-value.green { color:var(--green); }
    .rec-summary-value.amber { color:var(--amber); }
    .rec-summary-value.red { color:var(--red); }
    .rec-session-block {
      margin-bottom:18px; border:1px solid var(--border-dim);
      border-radius:10px; overflow:hidden;
    }
    .rec-session-header {
      padding:10px 14px; background:var(--bg-raised);
      display:flex; align-items:center; justify-content:space-between;
      font-size:0.85rem; font-weight:600;
    }
    .rec-session-meta {
      font-family:'JetBrains Mono', monospace; font-size:0.68rem;
      color:var(--text-muted);
    }
    .rec-row {
      display:grid; grid-template-columns:auto 1fr 1fr auto; gap:10px;
      padding:8px 14px; border-top:1px solid var(--border-dim);
      align-items:center; font-size:0.8rem;
    }
    .rec-row:hover { background:rgba(255,255,255,0.02); }
    .rec-row-tx {
      font-family:'JetBrains Mono', monospace; font-size:0.72rem;
      color:var(--text-dim); line-height:1.4;
    }
    .rec-row-tx .amount { color:var(--green); font-weight:700; }
    .rec-row-select {
      padding:5px 8px; border-radius:6px; background:var(--bg);
      border:1px solid var(--border); color:var(--text);
      font-family:'JetBrains Mono', monospace; font-size:0.72rem;
      width:100%; outline:none;
    }
    .rec-row-select:focus { border-color:var(--cyan); }
    .rec-row-check {
      width:18px; height:18px; cursor:pointer; accent-color:var(--green);
    }
    .rec-confidence {
      font-family:'JetBrains Mono', monospace; font-size:0.6rem;
      font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
      padding:2px 6px; border-radius:4px;
    }
    .rec-confidence.certain { color:var(--green); background:var(--green-dim); }
    .rec-confidence.ambiguous { color:var(--amber); background:var(--amber-dim); }
    .rec-confidence.none { color:var(--red); background:var(--red-dim); }
    .rec-footer {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:14px 22px; border-top:1px solid var(--border);
      background:var(--bg-raised);
    }
    .rec-btn {
      padding:9px 18px; border-radius:8px; font-family:'Outfit',sans-serif;
      font-size:0.85rem; font-weight:600; cursor:pointer;
      border:1px solid var(--border); background:transparent; color:var(--text-muted);
      transition:all 150ms;
    }
    .rec-btn:hover:not(:disabled) { color:var(--text); border-color:rgba(255,255,255,0.2); }
    .rec-btn.primary {
      background:var(--green); color:var(--bg); border-color:var(--green); font-weight:700;
    }
    .rec-btn.primary:hover:not(:disabled) { box-shadow:0 0 16px rgba(78,204,163,0.3); }
    .rec-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .rec-empty {
      text-align:center; padding:32px 12px; color:var(--text-muted);
      font-size:0.85rem;
    }
    .rec-error {
      background:var(--red-dim); border:1px solid rgba(233,69,96,0.25);
      border-radius:8px; padding:10px 14px; color:var(--red);
      font-size:0.8rem; margin-top:10px;
    }
    .rec-success {
      background:var(--green-dim); border:1px solid rgba(78,204,163,0.25);
      border-radius:8px; padding:10px 14px; color:var(--green);
      font-size:0.8rem; margin-top:10px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .page-body { padding: 16px 10px 48px; }
      .hero-revenue { font-size: 1.3rem; }
      .turno-row { gap: 8px; padding: 10px 12px; }
      .turno-label { display: none; }
      .turno-orders { min-width: 44px; }
      .group-header { padding: 12px 14px 8px; }
      .group-footer { padding: 8px 14px 10px; }
      .day-header { padding: 5px 14px; }
      .rec-row { grid-template-columns:auto 1fr; gap:6px; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="header-title">Storico Servizi</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button class="reconcile-btn" onclick="openReconcileModal()" title="Importa CSV SumUp per marcare ordini POS">Riconcilia POS</button>
      <span style="font-size:11px;color:rgba(226,232,240,0.45);font-weight:600">CSV:</span>
      <button class="sort-toggle active" id="sortByCat" onclick="setSortMode('category')">Per categoria</button>
      <button class="sort-toggle" id="sortByAlpha" onclick="setSortMode('alpha')">Alfabetico</button>
    </div>
    <div id="headerBadge" class="header-badge" style="display:none"></div>
  </header>

  <div class="page-body">
    <div id="root"><div class="state-center">Caricamento...</div></div>
  </div>

  <!-- Rename overlay container -->
  <div id="renameOverlay"></div>

  <!-- Reconcile POS overlay container -->
  <div id="reconcileOverlay"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    var TOKEN = sessionStorage.getItem('admin_token');
    var sortMode = 'category';
    window.setSortMode = function(mode) {
      sortMode = mode;
      document.getElementById('sortByCat').classList.toggle('active', mode === 'category');
      document.getElementById('sortByAlpha').classList.toggle('active', mode === 'alpha');
    };
    if (!TOKEN) window.location.href = '/';

    (async function() {
      try {
        var r = await fetch('/api/admin/verify?token=' + encodeURIComponent(TOKEN));
        var d = await r.json();
        if (!d.valid) { sessionStorage.removeItem('admin_token'); window.location.href = '/'; return; }
        loadSerate();
      } catch(e) { loadSerate(); }
    })();

    // ─── helpers ─────────────────────────────────────────────
    var DAYS_FULL = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
    var MONTHS    = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
    var MONTHS_S  = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];

    function parseDate(dateStr) {
      var p = dateStr.split('-');
      return new Date(+p[0], +p[1]-1, +p[2]);
    }
    function fDateFull(dateStr) {
      var d = parseDate(dateStr);
      return DAYS_FULL[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS[d.getMonth()];
    }
    function fDateShort(dateStr) {
      var d = parseDate(dateStr);
      return DAYS_FULL[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS_S[d.getMonth()];
    }
    function fEuro(v) {
      return '\u20AC' + (v||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
    }
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ─── stato ───────────────────────────────────────────────
    var SESSIONS = [];

    // ─── raggruppamento ──────────────────────────────────────
    // Formatta una Date locale come 'YYYY-MM-DD' senza passare per UTC.
    // toISOString() converte in UTC e in Italia (CEST UTC+2) fa retrocedere
    // la data di 1 giorno: mezzanotte locale → 22:00 UTC del giorno prima.
    function formatLocalDate(d) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var dd = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + dd;
    }

    // Raggruppa le sessioni in blocchi: weekend (Sab+Dom) o singole giornate
    function buildGroups() {
      // Raggruppa per data
      var byDate = {};
      var dateOrder = [];
      SESSIONS.forEach(function(s) {
        if (!byDate[s.date]) { byDate[s.date] = []; dateOrder.push(s.date); }
        byDate[s.date].push(s);
      });
      // Ordina date dal piu' recente
      dateOrder.sort(function(a,b) { return b.localeCompare(a); });

      // Identifica i weekend: se Sabato+Domenica adiacenti esistono, raggruppali
      var used = {};
      var groups = [];

      dateOrder.forEach(function(dateStr) {
        if (used[dateStr]) return;
        var d = parseDate(dateStr);
        var day = d.getDay(); // 0=Dom, 6=Sab

        // Prova a formare un weekend
        var satDate = null, sunDate = null;
        if (day === 6) { // Sabato — cerca Domenica
          var sun = new Date(d); sun.setDate(sun.getDate() + 1);
          sunDate = formatLocalDate(sun);
          if (byDate[sunDate]) {
            satDate = dateStr;
          } else {
            sunDate = null; // Nessuna domenica, giorno singolo
          }
        } else if (day === 0) { // Domenica — cerca Sabato
          var sat = new Date(d); sat.setDate(sat.getDate() - 1);
          satDate = formatLocalDate(sat);
          if (byDate[satDate]) {
            sunDate = dateStr;
          } else {
            satDate = null; // Nessun sabato, giorno singolo
          }
        }

        if (satDate && sunDate && !used[satDate] && !used[sunDate]) {
          // Weekend!
          used[satDate] = true;
          used[sunDate] = true;
          var allSessions = (byDate[satDate] || []).concat(byDate[sunDate] || []);
          groups.push({
            type: 'weekend',
            dates: [satDate, sunDate],
            days: [
              { date: satDate, sessions: byDate[satDate] || [] },
              { date: sunDate, sessions: byDate[sunDate] || [] },
            ],
            sessions: allSessions,
          });
        } else {
          // Giorno singolo
          used[dateStr] = true;
          groups.push({
            type: 'single',
            dates: [dateStr],
            days: [{ date: dateStr, sessions: byDate[dateStr] }],
            sessions: byDate[dateStr],
          });
        }
      });

      return groups;
    }

    // ─── render ──────────────────────────────────────────────
    function render() {
      var root = document.getElementById('root');
      if (!SESSIONS.length) {
        root.innerHTML =
          '<div class="state-center">' +

            '<div class="state-center-title">Nessuna serata archiviata</div>' +

      var badge = document.getElementById('headerBadge');

      badge.textContent = SESSIONS.length + ' ' + (SESSIONS.length === 1 ? 'turno' : 'turni');

      var groups = buildGroups();

      var totalRev = 0, totalOrd = 0;
      SESSIONS.forEach(function(s) { totalRev += (s.totalRevenue||0); totalOrd += (s.totalOrders||0); });

      // Hero card
      var html = '<div class="hero-card" onclick="openRecapTotal()">' +
        '<div class="hero-left">' +
          '<div class="hero-label">Bilancio Sagra</div>' +
          '<div class="hero-revenue">' + fEuro(totalRev) + '</div>' +
          '<div class="hero-meta">' + SESSIONS.length + ' turni \u00B7 ' + totalOrd.toLocaleString('it-IT') + ' ordini</div>' +
        '</div>' +
        '<div class="hero-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div>' +
      '</div>';

      // Group cards
      groups.forEach(function(g, gi) {
        var isWeekend = g.type === 'weekend';
        var gTotalRev = 0, gTotalOrd = 0;
        g.sessions.forEach(function(s) { gTotalRev += (s.totalRevenue||0); gTotalOrd += (s.totalOrders||0); });

        // Titolo del gruppo
        var groupTitle;
        if (isWeekend) {
          var sd = parseDate(g.dates[0]), sn = parseDate(g.dates[1]);
          groupTitle = 'Weekend ' + sd.getDate() + '\u2013' + sn.getDate() + ' ' + MONTHS[sd.getMonth()];
        } else {
          groupTitle = fDateFull(g.dates[0]);
        }

        html += '<div class="group-card' + (isWeekend ? ' weekend' : '') + '" style="animation-delay:' + ((gi+1)*60) + 'ms">';

        // Header
        html += '<div class="group-header">' +
          '<div class="group-header-left">' +
            '<div class="group-title">' + esc(groupTitle) + '</div>' +
            (isWeekend ? '<span class="group-type-badge weekend">Weekend</span>' : '') +
          '</div>';
        if (isWeekend) {
          var wIds = g.sessions.map(function(s){return s.id;});
          html += '<a class="group-recap-btn" href="#" onclick="openRecapWeekend([' + wIds.map(function(id){return "\'"+esc(id)+"\'";}).join(',') + '],\'' + esc(groupTitle) + '\'); return false;">Recap</a>';
        }
        html += '</div>';

        // Days
        g.days.forEach(function(day, di) {
          if (isWeekend) {
            html += '<div class="day-header">' + fDateShort(day.date) + '</div>';
          }

          // Turno rows
          day.sessions.forEach(function(s) {
            var turnoClass = s.turno || 'unico';
            var turnoText = s.turno ? s.turno : '\u2014';
            var customLabel = s.label ? s.label : '';

            html += '<div class="turno-row" id="row-' + esc(s.id) + '" onclick="openSessionRecap(\'' + esc(s.id) + '\')">' +
              '<span class="turno-badge ' + esc(turnoClass) + '">' + esc(turnoText) + '</span>' +
              (customLabel ? '<span class="turno-label" title="' + esc(customLabel) + '">' + esc(customLabel) + '</span>' : '') +
              '<span class="turno-revenue">' + fEuro(s.totalRevenue) + '</span>' +
              '<span class="turno-orders">' + (s.totalOrders||0) + ' ord</span>' +
              '<span class="turno-actions" onclick="event.stopPropagation()">' +
                '<button class="btn-sm dl" onclick="downloadReport(\'' + esc(s.id) + '\',\'' + esc(s.date) + '\',this)" title="Scarica CSV">' +
                  '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v8M4 7l4 4 4-4"/><path d="M2 14h12"/></svg>' +
                '</button>' +
                '<button class="btn-sm rename" onclick="openRename(\'' + esc(s.id) + '\',\'' + esc(s.date) + '\')" title="Rinomina">' +
                  '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 2l3 3-8 8H3v-3L11 2z"/></svg>' +
                '</button>' +
                '<button class="btn-sm del" onclick="deleteSerata(\'' + esc(s.id) + '\')" title="Elimina">' +
                  '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 10h8l1-10"/></svg>' +
                '</button>' +
              '</span>' +
            '</div>';
          });
        });

        // Footer con totali + download aggregato
        var gIds = g.sessions.map(function(s){return s.id;});
        var gIdsStr = gIds.map(function(id){return "\'"+esc(id)+"\'";}).join(',');
        html += '<div class="group-footer">' +
          '<div class="group-footer-left">' +
            '<span class="group-total-label">Totale' + (isWeekend ? ' weekend' : '') + '</span>' +
            (g.sessions.length > 1 ? '<button class="btn-sm dl group-dl" onclick="event.stopPropagation(); downloadGroupReport(['+gIdsStr+'],\'' + esc(g.dates[0]) + '\',\'' + esc(groupTitle) + '\',this)" title="Scarica CSV giornata">' +
              '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v8M4 7l4 4 4-4"/><path d="M2 14h12"/></svg>' +
            '</button>' : '') +
          '</div>' +
          '<div class="group-total-values">' +
            '<span class="group-total-orders">' + gTotalOrd + ' ordini</span>' +
            '<span class="group-total-revenue">' + fEuro(gTotalRev) + '</span>' +
          '</div>' +
        '</div>';

        html += '</div>'; // /group-card
      });

      root.innerHTML = html;
    }

    // ─── navigate to recap ───────────────────────────────────
    function openSessionRecap(id) {
      // Naviga al recap della sessione specifica
      window.location.href = '/admin/recap?session=' + encodeURIComponent(id);
    }

    // ─── carica ──────────────────────────────────────────────
    async function loadSerate() {
      try {
        var res = await fetch('/api/admin/sessions', { headers: {'X-Admin-Token': TOKEN} });
        if (res.status === 401) { sessionStorage.removeItem('admin_token'); window.location.href='/'; return; }
        SESSIONS = await res.json();
        // Ordina per data desc, poi closed_at desc
        SESSIONS.sort(function(a,b) {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return b.closed_at - a.closed_at;
        });
        render();
      } catch(e) {
        document.getElementById('root').innerHTML =
          '<div class="state-error">Errore nel caricamento: '+esc(e.message)+'</div>';
      }
    }

    // ─── rinomina (modal) ────────────────────────────────────
    function openRename(id, date) {
      var s = SESSIONS.find(function(x){return x.id===id;});
      var cur = s && s.label ? s.label : fDateFull(date);
      var overlay = document.getElementById('renameOverlay');
      overlay.innerHTML =
        '<div class="rename-overlay" onclick="closeRename()">' +
          '<div class="rename-modal" onclick="event.stopPropagation()">' +
            '<div class="rename-modal-title">Rinomina sessione</div>' +
            '<input class="rename-input" id="renameInput" value="' + esc(cur) + '" maxlength="50" placeholder="Nome sessione">' +
            '<div class="rename-btns">' +
              '<button class="rename-btn cancel" onclick="closeRename()">Annulla</button>' +
              '<button class="rename-btn save" onclick="saveRename(\'' + esc(id) + '\')">Salva</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      setTimeout(function() {
        var inp = document.getElementById('renameInput');
        if (inp) { inp.focus(); inp.select(); }
      }, 50);
      // Invio per salvare, Esc per annullare
      document.getElementById('renameInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') saveRename(id);
        if (e.key === 'Escape') closeRename();
      });
    }

    function closeRename() {
      document.getElementById('renameOverlay').innerHTML = '';
    }

    async function saveRename(id) {
      var inp = document.getElementById('renameInput');
      if (!inp) return;
      var newLabel = inp.value.trim();
      try {
        var res = await fetch('/api/admin/sessions/'+encodeURIComponent(id)+'/label', {
          method: 'PATCH',
          headers: {'Content-Type':'application/json','X-Admin-Token':TOKEN},
          body: JSON.stringify({ label: newLabel }),
        });
        var data = await res.json();
        if (!data.success) throw new Error(data.error || 'Errore');
        var s = SESSIONS.find(function(x){return x.id===id;});
        if (s) s.label = data.label;
        closeRename();
        render();
      } catch(e) {
        alert('Errore rinomina: '+e.message);
      }
    }

    // ─── elimina ─────────────────────────────────────────────
    async function deleteSerata(id) {
      var s = SESSIONS.find(function(x){return x.id===id;});
      var turnoLabel = s && s.turno ? ' (' + s.turno + ')' : '';
      var name = (s && s.label ? s.label : (s ? fDateFull(s.date) : id)) + turnoLabel;
      if (!confirm('Eliminare definitivamente "'+name+'"?\nQuesta azione non \u00E8 reversibile.')) return;

      var row = document.getElementById('row-'+id);
      if (row) row.style.opacity = '0.2';

      try {
        var res = await fetch('/api/admin/sessions/'+encodeURIComponent(id), {
          method: 'DELETE',
          headers: {'X-Admin-Token': TOKEN},
        });
        var data = await res.json();
        if (!data.success) throw new Error(data.error || 'Errore');
        SESSIONS = SESSIONS.filter(function(x){return x.id!==id;});
        render();
      } catch(e) {
        if (row) row.style.opacity = '1';
        alert('Errore eliminazione: '+e.message);
      }
    }

    // ─── download report ─────────────────────────────────────
    async function downloadReport(id, dateStr, btn) {
      btn.classList.add('loading');
      try {
        var res = await fetch('/api/admin/sessions/'+id+'/recap', { headers:{'X-Admin-Token':TOKEN} });
        if (!res.ok) throw new Error('Errore '+res.status);
        var r = await res.json();

        var s = SESSIONS.find(function(x){return x.id===id;});
        var titolo = s && s.label ? s.label : fDateFull(dateStr);
        if (s && s.turno) titolo += ' (' + s.turno + ')';

        var SEP = ';';
        var csvVal = function(v) {
          var str = String(v == null ? '' : v);
          if (str.indexOf(SEP) >= 0 || str.indexOf('"') >= 0 || str.indexOf('\n') >= 0)
            return '"' + str.replace(/"/g, '""') + '"';
          return str;
        };
        var fNum = function(v) { return (v||0).toFixed(2).replace('.', ','); };
        var rows = [];

        rows.push('SAGRAPP - REPORT SERATA');
        rows.push('Serata' + SEP + csvVal(titolo));
        rows.push('Data' + SEP + fDateFull(dateStr));
        rows.push('');

        rows.push('RIEPILOGO');
        rows.push('Voce' + SEP + 'Valore');
        rows.push('Incasso totale' + SEP + fNum(r.totalRevenue));
        rows.push('Ordini totali' + SEP + (r.totalOrders||0));
        rows.push('Coperti' + SEP + (r.totalCoperti||0));
        rows.push('Ordini asporto' + SEP + (r.totalAsporto||0));
        rows.push('Sconti applicati' + SEP + fNum(r.discountTotal || 0));
        var omTot = r.courtesy && r.courtesy.total ? r.courtesy.total : {count:0, realValue:0};
        rows.push('Omaggi (n. ordini)' + SEP + (omTot.count || 0));
        rows.push('Omaggi (valore)' + SEP + fNum(omTot.realValue || 0));
        if (r.totalCost > 0) {
          rows.push('Costo materie' + SEP + fNum(r.totalCost));
          rows.push('Netto' + SEP + fNum(r.grossMargin));
        }
        rows.push('');

        rows.push('INCASSO PER CASSA');
        rows.push('Cassa' + SEP + 'Incasso');
        var nomi = {principale:'Cassa Generale', bar:'Cassa Bar', casetta:'Casetta'};
        if (r.revenueByCassa) {
          Object.entries(r.revenueByCassa).forEach(function(e) {
            rows.push(csvVal(nomi[e[0]]||e[0]) + SEP + fNum(e[1]));
          });
        }
        rows.push('');

        rows.push('METODO PAGAMENTO');
        rows.push('Metodo' + SEP + 'Lordo' + SEP + 'Commissioni' + SEP + 'Netto');
        var contanti = r.revenueByPayment && r.revenueByPayment.contanti ? r.revenueByPayment.contanti : 0;
        var pos = r.revenueByPayment && r.revenueByPayment.pos ? r.revenueByPayment.pos : 0;
        var posComm = r.posCommission || 0;
        rows.push('Contanti' + SEP + fNum(contanti) + SEP + fNum(0) + SEP + fNum(contanti));
        rows.push('POS (carta)' + SEP + fNum(pos) + SEP + fNum(posComm) + SEP + fNum(pos - posComm));
        rows.push('Totale' + SEP + fNum(contanti + pos) + SEP + fNum(posComm) + SEP + fNum(contanti + pos - posComm));
        rows.push('');

        rows.push('OMAGGI DETTAGLIO');
        rows.push('Tipo' + SEP + 'Ordini' + SEP + 'Valore');
        var omN = {sponsor:'Sponsor', don_pierino:'Don Pierino', amici:'Amici'};
        ['sponsor','don_pierino','amici'].forEach(function(t) {
          var om = r.courtesy ? r.courtesy[t] : null;
          rows.push(csvVal(omN[t]||t) + SEP + (om ? om.count : 0) + SEP + fNum(om ? om.realValue : 0));
        });
        rows.push('');

        if (r.salesRanking && r.salesRanking.length > 0) {
          rows.push('CLASSIFICA VENDITE' + (sortMode === 'alpha' ? ' (ordine alfabetico)' : ' (per categoria)'));
          var hasCost = r.salesRanking.some(function(i){ return i.totalCost > 0; });
          var catLabels = { primo:'PRIMI', secondo:'SECONDI', speciale:'SPECIALI', contorno:'CONTORNI', condimento:'CONDIMENTI', bevanda:'BEVANDE' };
          var csvRanking = r.salesRanking.slice();
          if (sortMode === 'alpha') csvRanking.sort(function(a,b){ return (a.name||'').localeCompare(b.name||'','it'); });
          var currentCsvCat = null;
          var totQty = 0, totRev = 0, totCost = 0;
          var num = 0;
          if (sortMode === 'alpha') {
            rows.push('#' + SEP + 'Piatto' + SEP + 'Categoria' + SEP + 'Quantita' + SEP + 'Incasso' + (hasCost ? SEP + 'Costo' + SEP + 'Margine' : ''));
          }
          csvRanking.forEach(function(item) {
            var cat = item.category || 'altro';
            if (sortMode === 'category' && cat !== currentCsvCat) {
              currentCsvCat = cat;
              rows.push('');
              rows.push(catLabels[cat] || cat.toUpperCase());
              rows.push('#' + SEP + 'Piatto' + SEP + 'Quantita' + SEP + 'Incasso' + (hasCost ? SEP + 'Costo' + SEP + 'Margine' : ''));
            }
            num++;
            totQty += item.qty; totRev += item.revenue; totCost += (item.totalCost||0);
            var row;
            if (sortMode === 'alpha') {
              row = num + SEP + csvVal(item.name) + SEP + csvVal(catLabels[cat]||cat) + SEP + item.qty + SEP + fNum(item.revenue);
            } else {
              row = num + SEP + csvVal(item.name) + SEP + item.qty + SEP + fNum(item.revenue);
            }
            if (hasCost) {
              row += SEP + fNum(item.totalCost||0) + SEP + fNum(item.revenue - (item.totalCost||0));
            }
            rows.push(row);
          });
          rows.push('');
          var totRow = '' + SEP + 'TOTALE' + SEP + (sortMode === 'alpha' ? SEP : '') + totQty + SEP + fNum(totRev);
          if (hasCost) totRow += SEP + fNum(totCost) + SEP + fNum(totRev - totCost);
          rows.push(totRow);
          rows.push('');
        }

        rows.push('Generato da SagrApp' + SEP + new Date().toLocaleString('it-IT'));

        var csv = '\uFEFF' + 'sep=;\n' + rows.join('\n');
        var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'sagrapp-report-'+dateStr+'.csv';
        document.body.appendChild(a);
        a.click();
        setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);

        btn.classList.remove('loading');
      } catch(e) {
        btn.classList.remove('loading');
        alert('Errore download: '+e.message);
      }
    }

        rows.push('Omaggi (n. ordini)' + SEP + (omTot.count || 0));
        rows.push('Omaggi (valore)' + SEP + fNum(omTot.realValue || 0));
        if (r.totalCost > 0) {
          rows.push('Costo materie' + SEP + fNum(r.totalCost));
          rows.push('Netto' + SEP + fNum(r.grossMargin));
        }
        rows.push('');

        rows.push('INCASSO PER CASSA');
        rows.push('Cassa' + SEP + 'Incasso');
        var nomi = {principale:'Cassa Generale', bar:'Cassa Bar', casetta:'Casetta'};
        if (r.revenueByCassa) {
          Object.entries(r.revenueByCassa).forEach(function(e) {
            rows.push(csvVal(nomi[e[0]]||e[0]) + SEP + fNum(e[1]));
          });
        }
        rows.push('');

        rows.push('METODO PAGAMENTO');
        rows.push('Metodo' + SEP + 'Lordo' + SEP + 'Commissioni' + SEP + 'Netto');
        var contanti = r.revenueByPayment && r.revenueByPayment.contanti ? r.revenueByPayment.contanti : 0;
        var pos = r.revenueByPayment && r.revenueByPayment.pos ? r.revenueByPayment.pos : 0;
        var posComm = r.posCommission || 0;
        rows.push('Contanti' + SEP + fNum(contanti) + SEP + fNum(0) + SEP + fNum(contanti));
        rows.push('POS (carta)' + SEP + fNum(pos) + SEP + fNum(posComm) + SEP + fNum(pos - posComm));
        rows.push('Totale' + SEP + fNum(contanti + pos) + SEP + fNum(posComm) + SEP + fNum(contanti + pos - posComm));
        rows.push('');

        rows.push('OMAGGI DETTAGLIO');
        rows.push('Tipo' + SEP + 'Ordini' + SEP + 'Valore');
        var omN = {sponsor:'Sponsor', don_pierino:'Don Pierino', amici:'Amici'};
        ['sponsor','don_pierino','amici'].forEach(function(t) {
          var om = r.courtesy ? r.courtesy[t] : null;
          rows.push(csvVal(omN[t]||t) + SEP + (om ? om.count : 0) + SEP + fNum(om ? om.realValue : 0));
        });
        rows.push('');

        if (r.salesRanking && r.salesRanking.length > 0) {
          rows.push('CLASSIFICA VENDITE' + (sortMode === 'alpha' ? ' (ordine alfabetico)' : ' (per categoria)'));
          var hasCost = r.salesRanking.some(function(i){ return i.totalCost > 0; });
          var catLabels = { primo:'PRIMI', secondo:'SECONDI', speciale:'SPECIALI', contorno:'CONTORNI', condimento:'CONDIMENTI', bevanda:'BEVANDE' };
          var csvRanking = r.salesRanking.slice();
          if (sortMode === 'alpha') csvRanking.sort(function(a,b){ return (a.name||'').localeCompare(b.name||'','it'); });
          var currentCsvCat = null;
          var totQty = 0, totRev = 0, totCost = 0;
          var num = 0;
          if (sortMode === 'alpha') {
            rows.push('#' + SEP + 'Piatto' + SEP + 'Categoria' + SEP + 'Quantita' + SEP + 'Incasso' + (hasCost ? SEP + 'Costo' + SEP + 'Margine' : ''));
          }
          csvRanking.forEach(function(item) {
            var cat = item.category || 'altro';
            if (sortMode === 'category' && cat !== currentCsvCat) {
              currentCsvCat = cat;
              rows.push('');
              rows.push(catLabels[cat] || cat.toUpperCase());
              rows.push('#' + SEP + 'Piatto' + SEP + 'Quantita' + SEP + 'Incasso' + (hasCost ? SEP + 'Costo' + SEP + 'Margine' : ''));
            }
            num++;
            totQty += item.qty; totRev += item.revenue; totCost += (item.totalCost||0);
            var row;
            if (sortMode === 'alpha') {
              row = num + SEP + csvVal(item.name) + SEP + csvVal(catLabels[cat]||cat) + SEP + item.qty + SEP + fNum(item.revenue);
            } else {
              row = num + SEP + csvVal(item.name) + SEP + item.qty + SEP + fNum(item.revenue);
            }
            if (hasCost) {
              row += SEP + fNum(item.totalCost||0) + SEP + fNum(item.revenue - (item.totalCost||0));
            }
            rows.push(row);
          });
          rows.push('');
          var totRow = '' + SEP + 'TOTALE' + SEP + (sortMode === 'alpha' ? SEP : '') + totQty + SEP + fNum(totRev);
          if (hasCost) totRow += SEP + fNum(totCost) + SEP + fNum(totRev - totCost);
          rows.push(totRow);
          rows.push('');
        }

        rows.push('Generato da SagrApp' + SEP + new Date().toLocaleString('it-IT'));

        var csv = '\uFEFF' + 'sep=;\n' + rows.join('\n');
        var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'sagrapp-report-' + dateStr + '-aggregato.csv';
        document.body.appendChild(a);
        a.click();
        setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
        btn.classList.remove('loading');
      } catch(e) {
        btn.classList.remove('loading');
        alert('Errore download: '+e.message);
      }
    }

    // ─── RICONCILIAZIONE POS ─────────────────────────────────
    // Stato del modal: passo 1 (upload), 2 (preview), 3 (applicato)
    var RECONCILE_STATE = { csvText: '', preview: null };

    function openReconcileModal() {
      RECONCILE_STATE = { csvText: '', preview: null };
      renderReconcileModal();
    }

    function closeReconcileModal() {
      document.getElementById('reconcileOverlay').innerHTML = '';
    }

    function renderReconcileModal() {
      var overlay = document.getElementById('reconcileOverlay');
      var bodyHtml;
      if (!RECONCILE_STATE.preview) {
        // Step 1: upload
        bodyHtml =
          '<div class="rec-step-label">Step 1 di 2 · Carica il CSV SumUp</div>' +
          '<div class="rec-help">Scarica il CSV delle transazioni dalla dashboard SumUp (Storico transazioni → Esporta CSV). Puoi caricare un unico CSV con tutto il weekend: il sistema matcha automaticamente le transazioni ai turni archiviati per importo e orario.</div>' +
          '<div class="rec-upload-area" id="recUploadArea" onclick="document.getElementById(\'recFileInput\').click()">' +
            '<div class="rec-upload-icon">📄</div>' +
            '<div class="rec-upload-text">Trascina qui il file CSV o clicca per selezionarlo</div>' +
            '<div class="rec-upload-hint">.csv · max 5MB</div>' +
          '</div>' +
          '<input type="file" id="recFileInput" accept=".csv,text/csv" style="display:none" onchange="handleReconcileFile(this.files[0])">' +
          '<div style="margin-top:14px;font-size:0.72rem;color:var(--text-muted)">In alternativa, incolla qui il contenuto del CSV:</div>' +
          '<textarea class="rec-textarea" id="recPasteArea" placeholder="Data,Ora,Importo,ID Transazione,Stato..."></textarea>' +
          '<div id="recError"></div>';
      } else {
        bodyHtml = renderReconcilePreview();
      }

      overlay.innerHTML =
        '<div class="rec-overlay" onclick="if(event.target===this)closeReconcileModal()">' +
          '<div class="rec-modal" onclick="event.stopPropagation()">' +
            '<div class="rec-header">' +
              '<div class="rec-title">Riconciliazione POS · CSV SumUp</div>' +
              '<button class="rec-close" onclick="closeReconcileModal()">×</button>' +
            '</div>' +
            '<div class="rec-body">' + bodyHtml + '</div>' +
            renderReconcileFooter() +
          '</div>' +
        '</div>';

      // Drag & drop setup
      var area = document.getElementById('recUploadArea');
      if (area) {
        area.addEventListener('dragover', function(e){ e.preventDefault(); area.classList.add('dragover'); });
        area.addEventListener('dragleave', function(){ area.classList.remove('dragover'); });
        area.addEventListener('drop', function(e){
          e.preventDefault();
          area.classList.remove('dragover');
          if (e.dataTransfer.files && e.dataTransfer.files[0]) handleReconcileFile(e.dataTransfer.files[0]);
        });
      }
    }

    function renderReconcileFooter() {
      if (!RECONCILE_STATE.preview) {
        // Step 1 footer
        return '<div class="rec-footer">' +
          '<div></div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="rec-btn" onclick="closeReconcileModal()">Annulla</button>' +
            '<button class="rec-btn primary" onclick="submitReconcileCSV()">Analizza CSV</button>' +
          '</div>' +
        '</div>';
      }
      // Step 2 footer
      var nConfirmed = countConfirmedProposals();
      return '<div class="rec-footer">' +
        '<div style="font-size:0.78rem;color:var(--text-muted)"><strong>' + nConfirmed + '</strong> match da confermare</div>' +
        '<div style="display:flex;gap:8px">' +
          '<button class="rec-btn" onclick="RECONCILE_STATE.preview=null; renderReconcileModal()">← Indietro</button>' +
          '<button class="rec-btn primary"' + (nConfirmed === 0 ? ' disabled' : '') + ' onclick="applyReconcile()">Applica ' + nConfirmed + ' aggiornamenti</button>' +
        '</div>' +
      '</div>';
    }

    function countConfirmedProposals() {
      var n = 0;
      if (!RECONCILE_STATE.preview) return n;
      (RECONCILE_STATE.preview.sessions || []).forEach(function(s) {
        (s.proposals || []).forEach(function(p) {
          if (p._confirmed && p.selectedOrderId) n++;
        });
      });
      return n;
    }

    function handleReconcileFile(file) {
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        showRecError('File troppo grande (max 5MB)');
        return;
      }
      var reader = new FileReader();
      reader.onload = function(e) {
        RECONCILE_STATE.csvText = e.target.result;
        document.getElementById('recPasteArea').value = e.target.result.slice(0, 5000);
      };
      reader.readAsText(file);
    }

    function showRecError(msg) {
      var el = document.getElementById('recError');
      if (el) el.innerHTML = '<div class="rec-error">' + esc(msg) + '</div>';
    }

    async function submitReconcileCSV() {
      var csv = RECONCILE_STATE.csvText || (document.getElementById('recPasteArea') || {}).value;
      if (!csv || csv.trim().length < 10) { showRecError('Carica o incolla un CSV valido'); return; }
      try {
        var res = await fetch('/api/admin/reconcile-pos/preview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
          body: JSON.stringify({ csv: csv, windowMinutes: 5 }),
        });
        var data = await res.json();
        if (!res.ok) { showRecError(data.error || 'Errore analisi CSV'); return; }
        // Inizializza _confirmed per ogni proposta basato sul livello di confidence
        (data.sessions || []).forEach(function(s) {
          (s.proposals || []).forEach(function(p) {
            // Auto-conferma solo i match certi; gli ambigui richiedono check manuale
            p._confirmed = (p.confidence === 'certain');
          });
        });
        RECONCILE_STATE.preview = data;
        renderReconcileModal();
      } catch(e) {
        showRecError('Errore di rete: ' + e.message);
      }
    }

    function renderReconcilePreview() {
      var p = RECONCILE_STATE.preview;
      if (!p) return '';
      var html =
        '<div class="rec-step-label">Step 2 di 2 · Conferma i match</div>' +
        '<div class="rec-help">Trovate <strong>' + p.transactions + '</strong> transazioni SumUp. Spunta le proposte da confermare. I match certi sono già selezionati. Per i match ambigui, scegli l\'ordine corretto dal menu a tendina.</div>';

      // Sommario
      var totalProposals = 0, certain = 0, ambiguous = 0;
      (p.sessions || []).forEach(function(s) {
        s.proposals.forEach(function(pr) {
          totalProposals++;
          if (pr.confidence === 'certain') certain++;
          else if (pr.confidence === 'ambiguous') ambiguous++;
        });
      });
      var orphans = (p.orphans || []).length;

      html += '<div class="rec-summary">' +
        '<div class="rec-summary-card"><div class="rec-summary-label">Transazioni</div><div class="rec-summary-value">' + p.transactions + '</div></div>' +
        '<div class="rec-summary-card"><div class="rec-summary-label">Match certi</div><div class="rec-summary-value green">' + certain + '</div></div>' +
        '<div class="rec-summary-card"><div class="rec-summary-label">Ambigui</div><div class="rec-summary-value amber">' + ambiguous + '</div></div>' +
        '<div class="rec-summary-card"><div class="rec-summary-label">Orfani</div><div class="rec-summary-value red">' + orphans + '</div></div>' +
      '</div>';

      if (!p.sessions || p.sessions.length === 0) {
        html += '<div class="rec-empty">Nessuna sessione archiviata corrisponde alle transazioni del CSV.<br>Controlla che le serate siano state chiuse correttamente.</div>';
        return html;
      }

      // Per ogni sessione, mostra le proposte
      p.sessions.forEach(function(sess, si) {
        var turnoLabel = sess.turno ? sess.turno.toUpperCase() : '—';
        html += '<div class="rec-session-block">' +
          '<div class="rec-session-header">' +
            '<div><span class="turno-badge ' + esc(sess.turno || 'unico') + '" style="margin-right:8px">' + esc(turnoLabel) + '</span>' + esc(fDateFull(sess.date)) + (sess.label ? ' · ' + esc(sess.label) : '') + '</div>' +
            '<div class="rec-session-meta">' + sess.currentPosCount + ' POS attuali · ' + fEuro(sess.currentPosTotal) + '</div>' +
          '</div>';

        sess.proposals.forEach(function(pr, pi) {
          var txDate = new Date(pr.sumup.timestamp);
          var txTime = ('0'+txDate.getHours()).slice(-2) + ':' + ('0'+txDate.getMinutes()).slice(-2);
          var txDateStr = txDate.getDate() + '/' + (txDate.getMonth()+1);
          var confClass = pr.confidence;
          var confLabel = pr.confidence === 'certain' ? 'Certo' : (pr.confidence === 'ambiguous' ? 'Ambiguo' : 'Nessuno');

          html += '<div class="rec-row">' +
            '<input type="checkbox" class="rec-row-check" ' + (pr._confirmed ? 'checked' : '') + ' onchange="toggleReconcileRow(' + si + ',' + pi + ', this.checked)">' +
            '<div class="rec-row-tx">' +
              '<span class="amount">' + fEuro(pr.sumup.amount) + '</span> · ' + esc(txDateStr) + ' ' + esc(txTime) +
              (pr.sumup.transactionId ? '<br><span style="font-size:0.66rem;color:var(--text-muted)">ID: ' + esc(pr.sumup.transactionId.slice(0,20)) + '</span>' : '') +
            '</div>' +
            '<div>' + renderCandidateSelect(si, pi, pr) + '</div>' +
            '<span class="rec-confidence ' + confClass + '">' + confLabel + '</span>' +
          '</div>';
        });

        html += '</div>';
      });

      // Orfani
      if (orphans > 0) {
        html += '<div style="margin-top:14px;font-size:0.78rem;color:var(--text-muted)"><strong>' + orphans + ' transazioni orfane</strong> non hanno trovato corrispondenza (verranno ignorate). Possibili cause: ordini annullati, finestra temporale troppo stretta, oppure transazioni di test.</div>';
      }

      html += '<div id="recError"></div>';
      return html;
    }

    function renderCandidateSelect(si, pi, proposal) {
      if (!proposal.candidates || proposal.candidates.length === 0) {
        return '<span style="font-size:0.72rem;color:var(--text-muted);font-style:italic">Nessun ordine candidato</span>';
      }
      var html = '<select class="rec-row-select" onchange="setReconcileSelection(' + si + ',' + pi + ', this.value)">';
      proposal.candidates.forEach(function(c) {
        var oDate = new Date(c.created_at);
        var oTime = ('0'+oDate.getHours()).slice(-2) + ':' + ('0'+oDate.getMinutes()).slice(-2);
        var alreadyPos = c.payment === 'pos' ? ' [già POS]' : '';
        var labelParts = ['#' + c.id, oTime, 'tav.' + c.table, fEuro(c.total)];
        if (c.customer_name) labelParts.push(esc(c.customer_name));
        html += '<option value="' + c.id + '"' + (c.id === proposal.selectedOrderId ? ' selected' : '') + '>' + labelParts.join(' · ') + alreadyPos + '</option>';
      });
      html += '</select>';
      return html;
    }

    function toggleReconcileRow(si, pi, checked) {
      var p = RECONCILE_STATE.preview;
      if (!p || !p.sessions[si] || !p.sessions[si].proposals[pi]) return;
      p.sessions[si].proposals[pi]._confirmed = checked;
      // Aggiorna solo il footer (per il contatore)
      var footer = document.querySelector('.rec-footer');
      if (footer) footer.outerHTML = renderReconcileFooter();
    }

    function setReconcileSelection(si, pi, orderId) {
      var p = RECONCILE_STATE.preview;
      if (!p || !p.sessions[si] || !p.sessions[si].proposals[pi]) return;
      p.sessions[si].proposals[pi].selectedOrderId = parseInt(orderId, 10);
    }

    async function applyReconcile() {
      var p = RECONCILE_STATE.preview;
      if (!p) return;
      var confirmations = [];
      p.sessions.forEach(function(s) {
        s.proposals.forEach(function(pr) {
          if (pr._confirmed && pr.selectedOrderId) {
            confirmations.push({
              sessionId: s.sessionId,
              orderId: pr.selectedOrderId,
              transactionId: pr.sumup.transactionId || null,
            });
          }
        });
      });
      if (confirmations.length === 0) return;
      try {
        var res = await fetch('/api/admin/reconcile-pos/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
          body: JSON.stringify({ confirmations: confirmations }),
        });
        var data = await res.json();
        if (!res.ok) { alert('Errore: ' + (data.error || 'sconosciuto')); return; }
        var msg = 'Aggiornati ' + data.updatedOrders + ' ordini in ' + data.updatedSessions + ' sessioni.';
        if (data.errors && data.errors.length > 0) {
          msg += '\n\nErrori: ' + data.errors.length;
        }
        alert(msg);
        closeReconcileModal();
        // Ricarica le sessioni per riflettere eventuali cambiamenti
        loadSerate();
      } catch(e) {
        alert('Errore di rete: ' + e.message);
      }
    }

    // Esporta funzioni su window per compatibilità PJAX (sidebar wrappa in IIFE)
    window.downloadReport = downloadReport;
    window.deleteSerata = deleteSerata;
    window.openRename = openRename;
    window.closeRename = closeRename;
    window.saveRename = saveRename;
    window.openRecapTotal = openRecapTotal;
    window.openRecapWeekend = openRecapWeekend;
    window.openSessionRecap = openSessionRecap;
    window.downloadGroupReport = downloadGroupReport;
    window.openReconcileModal = openReconcileModal;
    window.closeReconcileModal = closeReconcileModal;
    window.handleReconcileFile = handleReconcileFile;
    window.submitReconcileCSV = submitReconcileCSV;
    window.toggleReconcileRow = toggleReconcileRow;
    window.setReconcileSelection = setReconcileSelection;
    window.applyReconcile = applyReconcile;
  </script>
<script src="/js/sidebar.js"></script>
</body>
</html>
