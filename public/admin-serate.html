<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SagrApp — Storico Serate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #060a12;
      --bg-surface: #0c1220;
      --bg-raised:  #111827;
      --border:     #1e293b;
      --border-dim: rgba(30,41,59,0.6);
      --green:      #4ecca3;
      --green-dim:  rgba(78,204,163,0.12);
      --red:        #e94560;
      --red-dim:    rgba(233,69,96,0.1);
      --text:       #e2e8f0;
      --text-dim:   rgba(226,232,240,0.5);
      --text-muted: #475569;
      --radius:     10px;
    }

    html { font-size: 16px; background: var(--bg); }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    .page-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 56px;
      background: rgba(6,10,18,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .header-title { font-weight: 700; font-size: 1rem; letter-spacing: -0.01em; }
    .header-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--green); background: var(--green-dim);
      border: 1px solid rgba(78,204,163,0.2); border-radius: 20px; padding: 3px 10px;
    }

    /* ===== BODY ===== */
    .page-body { max-width: 1040px; margin: 0 auto; padding: 28px 24px 60px; }

    /* ===== EMPTY / ERROR ===== */
    .state-center {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 80px 24px;
      color: var(--text-muted); font-size: 0.9rem;
    }
    .state-center-icon { font-size: 2.5rem; opacity: 0.4; }
    .state-center-title { font-weight: 600; color: var(--text-dim); }
    .state-center-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; text-align: center; }
    .state-error {
      background: var(--red-dim); border: 1px solid rgba(233,69,96,0.2);
      border-radius: var(--radius); padding: 16px 20px; font-size: 0.85rem; color: var(--red);
    }

    /* ===== TABELLA ===== */
    .serate-table {
      width: 100%; border-collapse: separate; border-spacing: 0 6px;
    }
    .serate-table thead th {
      font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
      padding: 0 12px 8px; text-align: left;
    }
    .serate-row {
      background: var(--bg-surface); border: 1px solid var(--border-dim);
      border-radius: var(--radius);
      transition: border-color 200ms, background 200ms;
      animation: fadeIn 300ms ease both;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .serate-row:hover { border-color: rgba(78,204,163,0.2); background: #0d1626; }
    .serate-row.deleting { opacity: 0.3; pointer-events: none; transition: opacity 300ms; }

    .serate-row td { padding: 13px 12px; vertical-align: middle; }
    .serate-row td:first-child { border-radius: var(--radius) 0 0 var(--radius); padding-left: 16px; }
    .serate-row td:last-child  { border-radius: 0 var(--radius) var(--radius) 0; padding-right: 12px; }

    /* indice */
    .col-idx {
      font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
      color: var(--text-muted); font-weight: 700; width: 28px; text-align: right;
    }

    /* colonna data / nome */
    .col-data { min-width: 170px; }
    .data-name {
      font-weight: 600; font-size: 0.88rem; line-height: 1.3;
    }
    .data-sub {
      font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
      color: var(--text-muted); margin-top: 2px;
    }

    /* rename inline */
    .rename-row { display: flex; align-items: center; gap: 6px; }
    .rename-input {
      background: var(--bg-raised); border: 1px solid rgba(78,204,163,0.4);
      border-radius: 6px; color: var(--text); font-family: 'Outfit', sans-serif;
      font-size: 0.85rem; font-weight: 600; padding: 4px 8px;
      outline: none; width: 160px;
    }
    .rename-input:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(78,204,163,0.15); }
    .btn-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px; border: 1px solid transparent;
      background: transparent; cursor: pointer; flex-shrink: 0;
      transition: all 150ms ease; color: var(--text-muted);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-icon:hover { border-color: var(--border); background: var(--bg-raised); color: var(--text); }
    .btn-icon.edit:hover { color: var(--green); border-color: rgba(78,204,163,0.3); }
    .btn-icon.save { color: var(--green); }
    .btn-icon.save:hover { background: var(--green-dim); border-color: rgba(78,204,163,0.4); }
    .btn-icon.cancel:hover { color: var(--red); border-color: rgba(233,69,96,0.3); }
    .btn-icon svg { width: 13px; height: 13px; pointer-events: none; }

    /* incasso */
    .col-incasso { min-width: 170px; }
    .incasso-val {
      font-family: 'JetBrains Mono', monospace; font-size: 0.92rem;
      font-weight: 700; color: var(--green);
    }
    .bar-track {
      height: 3px; background: rgba(255,255,255,0.06);
      border-radius: 2px; margin-top: 6px; overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), rgba(78,204,163,0.4));
      border-radius: 2px;
      transition: width 600ms cubic-bezier(0.4,0,0.2,1);
    }

    /* metriche */
    .col-num { text-align: center; min-width: 68px; }
    .metric-val {
      font-family: 'JetBrains Mono', monospace; font-size: 0.92rem;
      font-weight: 700; display: block;
    }
    .metric-lbl {
      font-size: 0.6rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      display: block; margin-top: 2px;
    }

    /* top piatto */
    .col-top { min-width: 130px; }
    .top-name {
      font-size: 0.8rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px;
    }
    .top-qty { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text-muted); margin-top: 2px; }
    .top-none { font-size: 0.78rem; color: var(--text-muted); font-style: italic; }

    /* azioni */
    .col-actions { text-align: right; white-space: nowrap; }
    .actions-group { display: inline-flex; align-items: center; gap: 6px; }

    .btn-dl {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 11px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg-raised);
      color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; cursor: pointer; transition: all 150ms ease;
    }
    .btn-dl:hover { border-color: rgba(78,204,163,0.35); color: var(--green); background: var(--green-dim); }
    .btn-dl:active { transform: scale(0.96); }
    .btn-dl.loading { opacity: 0.55; pointer-events: none; }
    .btn-dl svg { width: 12px; height: 12px; }

    .btn-del {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg-raised);
      color: var(--text-muted); cursor: pointer; transition: all 150ms ease;
    }
    .btn-del:hover { border-color: rgba(233,69,96,0.4); color: var(--red); background: var(--red-dim); }
    .btn-del:active { transform: scale(0.93); }
    .btn-del svg { width: 13px; height: 13px; pointer-events: none; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 700px) {
      .page-body { padding: 18px 12px 40px; }
      .col-top, .hide-m { display: none; }
      .col-incasso { min-width: 110px; }
      .incasso-val { font-size: 0.82rem; }
      .rename-input { width: 120px; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="header-title">Storico Serate</div>
    <div id="headerBadge" class="header-badge" style="display:none"></div>
  </header>

  <div class="page-body">
    <div id="root"><div class="state-center">Caricamento...</div></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    var TOKEN = sessionStorage.getItem('admin_token');
    if (!TOKEN) window.location.href = '/';

    (async function() {
      try {
        var r = await fetch('/api/admin/verify?token=' + encodeURIComponent(TOKEN));
        var d = await r.json();
        if (!d.valid) { sessionStorage.removeItem('admin_token'); window.location.href = '/'; return; }
        loadSerate();
      } catch(e) { loadSerate(); }
    })();

    // ─── helpers ─────────────────────────────────────────────
    var DAYS   = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
    var MONTHS = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];

    function fDate(dateStr) {
      var p = dateStr.split('-');
      var d = new Date(+p[0], +p[1]-1, +p[2]);
      return DAYS[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + p[0];
    }
    function fTime(ts) {
      return 'Chiusa ' + new Date(ts).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    }
    function fEuro(v) {
      return '€' + (v||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
    }
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ─── stato sessioni in memoria (per aggiornamenti senza reload) ──
    var SESSIONS = [];

    // ─── render ──────────────────────────────────────────────
    function render() {
      var root = document.getElementById('root');
      if (!SESSIONS.length) {
        root.innerHTML =
          '<div class="state-center">' +
            '<div class="state-center-icon">📋</div>' +
            '<div class="state-center-title">Nessuna serata archiviata</div>' +
            '<div class="state-center-sub">Le serate vengono salvate al termine<br>di ogni turno tramite Chiusura Turno.</div>' +
          '</div>';
        return;
      }

      var badge = document.getElementById('headerBadge');
      badge.style.display = '';
      badge.textContent = SESSIONS.length + ' ' + (SESSIONS.length === 1 ? 'serata' : 'serate');

      var maxRev = Math.max.apply(null, SESSIONS.map(function(s){ return s.totalRevenue||0; }));

      var rows = SESSIONS.map(function(s, i) {
        var pct   = maxRev > 0 ? Math.round((s.totalRevenue/maxRev)*100) : 0;
        var label = s.label || fDate(s.date);
        var topH  = s.topPiatto
          ? '<div class="top-name" title="'+esc(s.topPiatto)+'">'+esc(s.topPiatto)+'</div>' +
            '<div class="top-qty">'+(s.topPiattoQty||0)+' venduti</div>'
          : '<div class="top-none">—</div>';

        return '<tr class="serate-row" id="row-'+esc(s.id)+'" style="animation-delay:'+(i*40)+'ms">' +
          '<td class="col-idx">'+(i+1)+'</td>' +
          '<td class="col-data">' +
            '<div id="name-'+esc(s.id)+'" class="rename-row">' +
              '<span class="data-name">'+esc(label)+'</span>' +
              '<button class="btn-icon edit" onclick="startRename(\''+esc(s.id)+'\',\''+esc(s.date)+'\')" title="Rinomina">' +
                '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">' +
                  '<path d="M11 2l3 3-8 8H3v-3L11 2z"/>' +
                '</svg>' +
              '</button>' +
            '</div>' +
            '<div class="data-sub">'+fTime(s.closed_at)+'</div>' +
          '</td>' +
          '<td class="col-incasso">' +
            '<div class="incasso-val">'+fEuro(s.totalRevenue)+'</div>' +
            '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div>' +
          '</td>' +
          '<td class="col-num">' +
            '<span class="metric-val">'+(s.totalOrders||0)+'</span>' +
            '<span class="metric-lbl">ordini</span>' +
          '</td>' +
          '<td class="col-num hide-m">' +
            '<span class="metric-val">'+(s.totalCoperti||0)+'</span>' +
            '<span class="metric-lbl">coperti</span>' +
          '</td>' +
          '<td class="col-top hide-m">'+topH+'</td>' +
          '<td class="col-actions">' +
            '<div class="actions-group">' +
              '<button class="btn-dl" onclick="downloadReport(\''+esc(s.id)+'\',\''+esc(s.date)+'\',this)">' +
                '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">' +
                  '<path d="M8 2v8M4 7l4 4 4-4"/><path d="M2 14h12"/>' +
                '</svg>' +
                ' Scarica' +
              '</button>' +
              '<button class="btn-del" onclick="deleteSerata(\''+esc(s.id)+'\')" title="Elimina serata">' +
                '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">' +
                  '<path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 10h8l1-10"/>' +
                '</svg>' +
              '</button>' +
            '</div>' +
          '</td>' +
        '</tr>';
      }).join('');

      root.innerHTML =
        '<table class="serate-table">' +
          '<thead><tr>' +
            '<th></th>' +
            '<th>Serata</th>' +
            '<th>Incasso</th>' +
            '<th style="text-align:center">Ordini</th>' +
            '<th style="text-align:center" class="hide-m">Coperti</th>' +
            '<th class="hide-m">Top Piatto</th>' +
            '<th></th>' +
          '</tr></thead>' +
          '<tbody>'+rows+'</tbody>' +
        '</table>';
    }

    // ─── carica ──────────────────────────────────────────────
    async function loadSerate() {
      try {
        var res = await fetch('/api/admin/sessions', { headers: {'X-Admin-Token': TOKEN} });
        if (res.status === 401) { sessionStorage.removeItem('admin_token'); window.location.href='/'; return; }
        SESSIONS = await res.json();
        render();
      } catch(e) {
        document.getElementById('root').innerHTML =
          '<div class="state-error">Errore nel caricamento: '+esc(e.message)+'</div>';
      }
    }

    // ─── rinomina inline ─────────────────────────────────────
    function startRename(id, date) {
      var s = SESSIONS.find(function(x){return x.id===id;});
      var cell = document.getElementById('name-'+id);
      if (!cell) return;
      var cur = s && s.label ? s.label : fDate(date);
      cell.innerHTML =
        '<input class="rename-input" id="ri-'+esc(id)+'" value="'+esc(cur)+'" maxlength="50">' +
        '<button class="btn-icon save" onclick="saveRename(\''+esc(id)+'\')" title="Salva">'+
          '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M2 8l4 4 8-8"/></svg>'+
        '</button>' +
        '<button class="btn-icon cancel" onclick="cancelRename(\''+esc(id)+'\',\''+esc(date)+'\')" title="Annulla">'+
          '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 3l10 10M13 3L3 13"/></svg>'+
        '</button>';
      var inp = document.getElementById('ri-'+id);
      inp.focus(); inp.select();
      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') saveRename(id);
        if (e.key === 'Escape') cancelRename(id, date);
      });
    }

    async function saveRename(id) {
      var inp = document.getElementById('ri-'+id);
      if (!inp) return;
      var newLabel = inp.value.trim();
      try {
        var res = await fetch('/api/admin/sessions/'+encodeURIComponent(id)+'/label', {
          method: 'PATCH',
          headers: {'Content-Type':'application/json','X-Admin-Token':TOKEN},
          body: JSON.stringify({ label: newLabel }),
        });
        var data = await res.json();
        if (!data.success) throw new Error(data.error || 'Errore');
        // Aggiorna stato locale
        var s = SESSIONS.find(function(x){return x.id===id;});
        if (s) s.label = data.label;
        render();
      } catch(e) {
        alert('Errore rinomina: '+e.message);
        var s2 = SESSIONS.find(function(x){return x.id===id;});
        cancelRename(id, s2 ? s2.date : '');
      }
    }

    function cancelRename(id, date) {
      var s = SESSIONS.find(function(x){return x.id===id;});
      var cell = document.getElementById('name-'+id);
      if (!cell) return;
      var label = s && s.label ? s.label : fDate(date || (s && s.date) || '');
      cell.innerHTML =
        '<span class="data-name">'+esc(label)+'</span>' +
        '<button class="btn-icon edit" onclick="startRename(\''+esc(id)+'\',\''+(s?esc(s.date):'')+'\''+')" title="Rinomina">'+
          '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 2l3 3-8 8H3v-3L11 2z"/></svg>'+
        '</button>';
    }

    // ─── elimina ─────────────────────────────────────────────
    async function deleteSerata(id) {
      var s = SESSIONS.find(function(x){return x.id===id;});
      var name = s && s.label ? s.label : (s ? fDate(s.date) : id);
      if (!confirm('Eliminare definitivamente "'+name+'"?\nQuesta azione non è reversibile.')) return;

      var row = document.getElementById('row-'+id);
      if (row) row.classList.add('deleting');

      try {
        var res = await fetch('/api/admin/sessions/'+encodeURIComponent(id), {
          method: 'DELETE',
          headers: {'X-Admin-Token': TOKEN},
        });
        var data = await res.json();
        if (!data.success) throw new Error(data.error || 'Errore');
        SESSIONS = SESSIONS.filter(function(x){return x.id!==id;});
        render();
      } catch(e) {
        if (row) row.classList.remove('deleting');
        alert('Errore eliminazione: '+e.message);
      }
    }

    // ─── download report ─────────────────────────────────────
    async function downloadReport(id, dateStr, btn) {
      btn.classList.add('loading');
      btn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v8M4 7l4 4 4-4"/><path d="M2 14h12"/></svg> ...';

      try {
        var res = await fetch('/api/admin/sessions/'+id+'/recap', { headers:{'X-Admin-Token':TOKEN} });
        if (!res.ok) throw new Error('Errore '+res.status);
        var r = await res.json();

        var s = SESSIONS.find(function(x){return x.id===id;});
        var titolo = s && s.label ? s.label : fDate(dateStr);
        var sep = '─'.repeat(48);
        var lines = [
          'SAGRAPP — REPORT SERATA', sep,
          'Serata:  '+titolo,
          'Data:    '+fDate(dateStr),
          sep, '',
          'RIEPILOGO',
          '  Incasso totale:  '+fEuro(r.totalRevenue),
          '  Ordini totali:   '+(r.totalOrders||0),
          '  Coperti:         '+(r.totalCoperti||0),
          '  Ordini asporto:  '+(r.totalAsporto||0),
        ];
        if (r.discountTotal>0) lines.push('  Sconti:          '+fEuro(r.discountTotal));
        lines.push('');

        if (r.revenueByCassa) {
          lines.push('INCASSO PER CASSA');
          var nomi={principale:'Cassa Generale',bar:'Cassa Bar',casetta:'Casetta'};
          Object.entries(r.revenueByCassa).forEach(function(e){
            lines.push('  '+(nomi[e[0]]||e[0])+': '+fEuro(e[1]));
          });
          lines.push('');
        }
        if (r.revenueByPayment) {
          lines.push('METODO PAGAMENTO');
          Object.entries(r.revenueByPayment).forEach(function(e){
            lines.push('  '+(e[0]==='pos'?'POS (carta)':'Contanti')+': '+fEuro(e[1]));
          });
          lines.push('');
        }
        if (r.courtesy && r.courtesy.total && r.courtesy.total.count>0) {
          lines.push('OMAGGI');
          var omN={sponsor:'Sponsor',don_pierino:'Don Pierino',amici:'Amici'};
          ['sponsor','don_pierino','amici'].forEach(function(t){
            var om=r.courtesy[t];
            if(om&&om.count>0) lines.push('  '+(omN[t]||t)+': '+om.count+' ordini — val. '+fEuro(om.realValue));
          });
          lines.push('');
        }
        if (r.salesRanking && r.salesRanking.length>0) {
          lines.push('CLASSIFICA VENDITE');
          r.salesRanking.forEach(function(item,i){
            var rank=('  '+(i+1)+'.').slice(-4);
            lines.push(rank+' '+item.name+': '+item.qty+' pz — '+fEuro(item.revenue));
          });
          lines.push('');
        }
        lines.push(sep);
        lines.push('Generato da SagrApp — '+new Date().toLocaleString('it-IT'));

        var text = lines.join('\n');
        // Scarica via data URI — compatibile Safari macOS/iOS
        var dataUri = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
        var a = document.createElement('a');
        a.href = dataUri;
        a.download = 'sagrapp-report-'+dateStr+'.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        btn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8l4 4 8-8"/></svg> OK';
        setTimeout(function(){
